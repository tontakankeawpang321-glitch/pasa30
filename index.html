<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Crow Studio - Classic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Anuphan:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1e293b;
            --paper: #f4f1ea;
            --border: #d1cfc7;
        }
        body {
            font-family: 'Lora', 'Anuphan', serif;
            background-color: var(--paper);
            color: var(--ink);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            overflow-x: hidden;
        }
        /* Classic Header Line */
        .header-line {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--ink), transparent);
            margin: 1.5rem 0;
            opacity: 0.3;
        }
        /* Stamp Button - Classic Style */
        .stamp-btn {
            position: relative;
            background: transparent;
            border-radius: 50%;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--ink);
            overflow: hidden; 
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 0 0 4px transparent;
        }
        .stamp-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid var(--paper);
            border-radius: 50%;
            z-index: 10;
            pointer-events: none;
        }
        .stamp-btn:active {
            transform: scale(0.92);
            filter: contrast(1.4) brightness(0.8);
        }
        .stamp-btn:hover {
            border-width: 3px;
            box-shadow: 0 8px 16px rgba(30, 41, 59, 0.15);
        }
        .stamp-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            filter: sepia(0.2) contrast(1.1) grayscale(0.2);
            mix-blend-mode: multiply;
            transition: all 0.3s ease;
        }
        .stamp-btn:hover img {
            filter: sepia(0) contrast(1.2) grayscale(0);
            transform: scale(1.1);
        }
        /* Chatbot & Translate UI */
        .glass-panel {
            background: rgba(244, 241, 234, 0.98);
            border: 1px solid var(--ink);
            box-shadow: 8px 8px 0px rgba(30, 41, 59, 0.1);
        }
        .chat-input, .search-input, .translate-input {
            border: 1px solid var(--ink);
            background: transparent;
        }
        .search-input {
            border-top: none;
            border-left: none;
            border-right: none;
            border-bottom: 1px solid rgba(30, 41, 59, 0.3);
            transition: border-color 0.3s ease;
        }
        .search-input:focus {
            border-bottom: 2px solid var(--ink);
        }
        
        /* Custom Select */
        select.classic-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231e293b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right .7rem top 50%;
            background-size: .65rem auto;
            padding-right: 2rem;
        }

        /* Grid for Dictionary */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        @media (min-width: 640px) {
            .grid-container { grid-template-columns: repeat(5, 1fr); }
        }
        @media (min-width: 1024px) {
            .grid-container { grid-template-columns: repeat(6, 1fr); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-entry { animation: fadeIn 0.4s ease forwards; }

        /* Bottom Nav Safe Area */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="min-h-screen pt-8 md:pt-20 pb-24 md:pb-32">

    <div class="max-w-4xl mx-auto px-4 md:px-6">
        
        <!-- ============================================== -->
        <!-- VIEW 1: VOCABULARY (คลังคำศัพท์)                  -->
        <!-- ============================================== -->
        <div id="view-vocab" class="fade-entry block">
            <header class="text-center mb-10 md:mb-12">
                <h2 class="text-xs uppercase tracking-[0.5em] mb-4 opacity-60 font-bold text-slate-500">Est. 2025</h2>
                <h1 class="text-5xl md:text-7xl font-bold mb-2 tracking-tight italic">Crow Studio</h1>
                <div class="header-line"></div>
                <p class="text-sm md:text-lg italic opacity-70 mb-8">
                    A Library of Endless Languages
                </p>

                <!-- Search Bar -->
                <div class="max-w-md mx-auto relative group">
                    <svg class="w-4 h-4 absolute left-2 top-3 opacity-40 group-focus-within:opacity-80 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" placeholder="Search archives..." class="search-input w-full py-2 pl-9 pr-4 outline-none italic text-sm text-center font-serif placeholder:text-slate-400">
                </div>
            </header>

            <section class="grid-container mb-12" id="language-grid"></section>
        </div>

        <!-- ============================================== -->
        <!-- VIEW 2: TRANSLATE (แปลภาษา)                      -->
        <!-- ============================================== -->
        <div id="view-translate" class="fade-entry hidden">
            <header class="text-center mb-6 md:mb-8">
                <h1 class="text-3xl md:text-5xl font-bold mb-2 tracking-tight italic">แปลภาษา</h1>
                <div class="header-line"></div>
                
                <!-- ปุ่มอัปโหลดรูปภาพเพื่อแปลภาษา -->
                <div class="flex justify-center mt-6 mb-4 fade-entry">
                    <button id="btn-image-translate" class="flex flex-col items-center justify-center w-20 h-20 md:w-24 md:h-24 rounded-full border-2 border-dashed border-slate-400 text-slate-600 hover:text-slate-800 hover:border-slate-800 hover:bg-slate-200/50 transition-all bg-white/50 shadow-sm" title="เลือกรูปภาพเพื่อแปลภาษา">
                        <svg class="w-7 h-7 md:w-8 md:h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span class="text-[9px] md:text-[10px] font-bold uppercase tracking-wider">สแกนรูปภาพ</span>
                    </button>
                    <!-- ซ่อน input file ไว้ ใช้เรียกผ่านปุ่มแทน -->
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                </div>
            </header>

            <div class="glass-panel rounded-2xl p-3 md:p-6 mx-auto max-w-3xl">
                
                <!-- Language Select Controls -->
                <div class="flex items-center justify-between bg-white/40 border border-slate-300 rounded-lg p-2 mb-4">
                    <select id="lang-source" class="classic-select bg-transparent outline-none flex-1 text-center font-bold text-sm md:text-base cursor-pointer py-1.5 md:py-2 text-slate-800">
                        <option value="th">Thai</option>
                        <option value="en">English</option>
                        <!-- Populated by JS -->
                    </select>
                    
                    <button id="btn-swap-lang" class="p-2 hover:bg-slate-200/50 rounded-full mx-1 md:mx-2 transition-colors border border-slate-300 bg-white shadow-sm" title="สลับภาษา">
                        <svg class="w-4 h-4 md:w-5 md:h-5 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                        </svg>
                    </button>
                    
                    <select id="lang-target" class="classic-select bg-transparent outline-none flex-1 text-center font-bold text-sm md:text-base cursor-pointer py-1.5 md:py-2 text-slate-800">
                        <option value="en">English</option>
                        <option value="th">Thai</option>
                        <!-- Populated by JS -->
                    </select>
                </div>

                <!-- Input / Output Areas -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                    <!-- Source Input -->
                    <div class="relative flex flex-col">
                        <textarea id="text-source" class="w-full h-36 md:h-48 p-4 pb-16 bg-white/60 border border-slate-300 rounded-xl outline-none resize-none text-base md:text-xl placeholder:text-slate-400 placeholder:italic focus:border-slate-500 transition-colors shadow-inner" placeholder="ป้อนข้อความ..."></textarea>
                        
                        <!-- ปุ่มไมโครโฟนพิมพ์ด้วยเสียง -->
                        <button id="btn-mic" class="absolute bottom-3 left-3 bg-slate-200 text-slate-700 p-2.5 rounded-full hover:bg-slate-300 active:scale-95 transition-all shadow-sm z-10" title="พิมพ์ด้วยเสียง">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                            </svg>
                        </button>

                        <button id="btn-translate" class="absolute bottom-3 right-3 bg-slate-800 text-white px-4 py-2.5 md:px-5 rounded-full text-xs font-bold uppercase tracking-wider hover:bg-slate-700 active:scale-95 transition-all shadow-md z-10">
                            แปลภาษา
                        </button>
                    </div>
                    
                    <!-- Target Output -->
                    <div class="relative flex flex-col">
                        <div id="text-target" class="w-full h-36 md:h-48 p-4 pb-16 bg-slate-100/50 border border-slate-300 rounded-xl overflow-y-auto text-base md:text-xl text-slate-800 italic shadow-inner">
                            <span class="text-slate-400 opacity-60">คำแปลจะปรากฏที่นี่...</span>
                        </div>
                        
                        <!-- ปุ่มฟังเสียง (Text-to-Speech) -->
                        <button id="btn-speak-target" class="absolute bottom-3 left-3 bg-slate-200 text-slate-700 p-2.5 rounded-full hover:bg-slate-300 active:scale-95 transition-all shadow-sm z-10" title="อ่านออกเสียงคำแปล">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                            </svg>
                        </button>

                        <!-- Loading Indicator -->
                        <div id="translate-loading" class="hidden absolute inset-0 bg-slate-100/80 rounded-xl flex items-center justify-center z-20">
                            <svg class="animate-spin h-8 w-8 text-slate-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Shared Footer -->
        <footer class="text-center py-8 md:py-12 opacity-40 border-t border-slate-300 mt-8 md:mt-12">
            <p class="text-[10px] uppercase tracking-[0.3em]">
                &copy; 2025 Crow Studio &bull; Archive Reference
            </p>
        </footer>
    </div>

    <!-- Chat Interface -->
    <div id="chat-widget" class="fixed bottom-20 md:bottom-24 right-4 md:right-6 z-50 flex flex-col items-end">
        <div id="chat-box" class="hidden w-[calc(100vw-2rem)] sm:w-[320px] h-[350px] md:h-[400px] mb-4 rounded-lg overflow-hidden glass-panel flex flex-col shadow-2xl">
            <div class="p-3 md:p-4 border-b border-slate-300 flex items-center justify-between bg-slate-100/50">
                <span class="text-xs font-bold tracking-tighter uppercase italic">Librarian Assistant</span>
                <button onclick="toggleChat()" class="text-xl leading-none hover:opacity-50">×</button>
            </div>
            
            <div id="chat-window" class="flex-1 p-4 md:p-6 overflow-y-auto space-y-4 text-sm italic leading-relaxed bg-white/30">
                <div class="text-slate-500">
                    "ยินดีต้อนรับสู่หอจดหมายเหตุ Crow Studio มีข้อมูลส่วนไหนที่คุณต้องการให้ผมค้นหาให้เป็นพิเศษไหมครับ?"
                </div>
            </div>

            <div class="p-3 md:p-4 border-t border-slate-200">
                <div class="flex items-center space-x-2">
                    <input type="text" id="user-input" placeholder="เขียนข้อความ..." class="chat-input flex-1 outline-none text-xs px-3 py-2 rounded border-slate-300">
                    <button id="send-btn" class="font-bold text-xs hover:underline uppercase text-slate-800">ส่ง</button>
                </div>
            </div>
        </div>

        <button onclick="toggleChat()" class="bg-slate-800 text-white w-12 h-12 md:w-14 md:h-14 rounded-full shadow-2xl hover:bg-slate-700 active:scale-90 transition-all flex items-center justify-center border-[3px] border-white/20">
            <svg id="fab-icon" class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
        </button>
    </div>

    <!-- ============================================== -->
    <!-- BOTTOM NAVIGATION BAR                            -->
    <!-- ============================================== -->
    <nav class="fixed bottom-0 left-0 w-full bg-[#f4f1ea] border-t border-slate-300 z-50 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div class="flex justify-around items-center h-14 md:h-16 max-w-md mx-auto">
            <!-- Tab 1: Vocab -->
            <button onclick="switchTab('vocab')" id="tab-btn-vocab" class="flex-1 flex flex-col items-center justify-center h-full opacity-100 transition-all text-slate-800">
                <svg class="w-5 h-5 md:w-6 md:h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                </svg>
                <span class="text-[10px] font-bold">คำศัพท์ 30 วัน</span>
            </button>
            
            <!-- Tab 2: Translate -->
            <button onclick="switchTab('translate')" id="tab-btn-translate" class="flex-1 flex flex-col items-center justify-center h-full opacity-40 transition-all hover:opacity-70 text-slate-800">
                <svg class="w-5 h-5 md:w-6 md:h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
                </svg>
                <span class="text-[10px] font-bold">แปลภาษา</span>
            </button>
        </div>
    </nav>

    <script>
        // --- 1. Data & State Setup ---
        const languages = [
            { id: 'th', name: 'Thailand', transCode: 'th', url: 'eng/thai30.html' },
            { id: 'us', name: 'USA', transCode: 'en',  url: 'https://tontakankeawpang321-glitch.github.io/pasa30/eng/us30.html' },
            { id: 'gb', name: 'Britain', transCode: 'en',url: 'eng/uk30.html' },
            { id: 'cn', name: 'China', transCode: 'zh', url: 'eng/Ch30.html' },
            { id: 'jp', name: 'Japan', transCode: 'ja',  url: 'eng/Jp30.html' },
            { id: 'kr', name: 'Korea', transCode: 'ko',url: 'eng/ko.html' },
            { id: 'vn', name: 'Vietnam', transCode: 'vi', url: 'eng/vien30.html' },
            { id: 'mm', name: 'Myanmar', transCode: 'my',url: 'eng/Ma30.html' },
            { id: 'kh', name: 'Cambodia', transCode: 'km',url: 'eng/cambodian30.html' },
            { id: 'ru', name: 'Russia', transCode: 'ru', url: 'eng/rusia30.html' },
            { id: 'de', name: 'Germany', transCode: 'de',url: 'eng/germany30.html' },
            { id: 'es', name: 'Spain', transCode: 'es', url: 'eng/spain30.html' },
            { id: 'fr', name: 'France', transCode: 'fr', url: 'eng/freanch30.html' },
            { id: 'it', name: 'Italy', transCode: 'it', url: 'eng/italy30.html' },
            { id: 'in', name: 'India', transCode: 'hi', url: 'eng/india30.html' },
            { id: 'id', name: 'Indonesia', transCode: 'id', url: 'eng/indoenesia30.html' },
            { id: 'pt', name: 'Portugal', transCode: 'pt', url: 'eng/protukas30.html' },
            { id: 'nl', name: 'Netherlands', transCode: 'nl', url: 'eng/netherland30.html' },
            { id: 'tr', name: 'Turkey', transCode: 'tr', url: 'eng/turky30.html' },
            { id: 'sa', name: 'Saudi Arabia', transCode: 'ar', url: 'eng/saui30.html' },
            { id: 'br', name: 'Brazil', transCode: 'pt', url: 'eng/brazile30.html' },
            { id: 'se', name: 'Sweden', transCode: 'sv', url: 'eng/sweden30.html' },
            { id: 'pl', name: 'Poland', transCode: 'pl', url: 'eng/poland30.html.html' },
            { id: 'ph', name: 'Philippines', transCode: 'tl', url: 'eng/philipinn30.html' },
        ];

        // --- 2. Navigation Logic ---
        function switchTab(tabId) {
            const viewVocab = document.getElementById('view-vocab');
            const viewTranslate = document.getElementById('view-translate');
            const btnVocab = document.getElementById('tab-btn-vocab');
            const btnTranslate = document.getElementById('tab-btn-translate');

            if (tabId === 'vocab') {
                viewVocab.classList.remove('hidden');
                viewTranslate.classList.add('hidden');
                btnVocab.classList.replace('opacity-40', 'opacity-100');
                btnTranslate.classList.replace('opacity-100', 'opacity-40');
            } else if (tabId === 'translate') {
                viewVocab.classList.add('hidden');
                viewTranslate.classList.remove('hidden');
                btnTranslate.classList.replace('opacity-40', 'opacity-100');
                btnVocab.classList.replace('opacity-100', 'opacity-40');
            }
        }

        // --- 3. Vocabulary Grid Setup ---
        const grid = document.getElementById('language-grid');
        const searchInput = document.getElementById('searchInput');

        function renderGrid(dataToRender) {
            if (grid) {
                if (dataToRender.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-10 opacity-50 italic text-sm">No archives found.</div>`;
                    return;
                }
                grid.innerHTML = dataToRender.map(lang => `
                    <div class="flex flex-col items-center space-y-2 fade-entry">
                        <a href="${lang.url}" target="_blank" class="stamp-btn w-full max-w-[80px]">
                            <img src="https://flagcdn.com/w160/${lang.id}.png" alt="${lang.name}">
                        </a>
                        <span class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-50 text-center">${lang.name}</span>
                    </div>
                `).join('');
            }
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredLanguages = languages.filter(lang => 
                lang.name.toLowerCase().includes(searchTerm)
            );
            renderGrid(filteredLanguages);
        });

        renderGrid(languages);

        // --- 4. Translate Feature Setup ---
        const selSource = document.getElementById('lang-source');
        const selTarget = document.getElementById('lang-target');
        const btnSwap = document.getElementById('btn-swap-lang');
        const textSource = document.getElementById('text-source');
        const textTarget = document.getElementById('text-target');
        const btnTranslate = document.getElementById('btn-translate');
        const translateLoading = document.getElementById('translate-loading');

        // --- Image Translation Logic (OCR + Translate) ---
        const btnImageTranslate = document.getElementById('btn-image-translate');
        const imageUpload = document.getElementById('image-upload');

        if(btnImageTranslate && imageUpload) {
            btnImageTranslate.addEventListener('click', () => {
                imageUpload.click(); // เปิดหน้าต่างเลือกไฟล์/กล้อง
            });

            imageUpload.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // รีเซ็ตค่า input เพื่อให้เลือกไฟล์เดิมซ้ำได้ถ้ายกเลิก
                e.target.value = '';

                // แสดงสถานะกำลังโหลด
                textSource.value = '';
                textTarget.innerHTML = '';
                textSource.placeholder = "กำลังวิเคราะห์ข้อความจากรูปภาพ...";
                translateLoading.classList.remove('hidden');

                try {
                    // 1. อ่านไฟล์รูปภาพให้อยู่ในรูปแบบ Base64
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

                    const base64String = base64Data.split(',')[1];
                    const mimeType = file.type;

                    // 2. เตรียมข้อมูลสำหรับส่งไปให้ AI ดึงข้อความและแปลภาษา
                    const apiKey = ""; // API key รับจากระบบอัตโนมัติ
                    const sourceLangName = selSource.options[selSource.selectedIndex].text;
                    const targetLangName = selTarget.options[selTarget.selectedIndex].text;
                    
                    const prompt = `Extract all text from this image. Then, translate the extracted text from ${sourceLangName} to ${targetLangName}. Return a JSON object with exactly two keys: "extractedText" (the original text found in the image) and "translatedText" (the translated text). If no text is found, return empty strings.`;

                    const payload = {
                        contents: [{
                            role: "user",
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: mimeType, data: base64String } }
                            ]
                        }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    extractedText: { type: "STRING" },
                                    translatedText: { type: "STRING" }
                                }
                            }
                        }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        if (response.status === 403) throw new Error("403 Forbidden");
                        throw new Error("API Error");
                    }

                    const result = await response.json();
                    
                    // นำผลลัพธ์ที่ได้มาแสดงผล
                    const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (textResponse) {
                        const parsed = JSON.parse(textResponse);
                        textSource.value = parsed.extractedText || "ไม่พบข้อความในรูปภาพ";
                        textTarget.innerText = parsed.translatedText || "ไม่สามารถแปลข้อความได้";
                    } else {
                        throw new Error("No text generated");
                    }

                } catch (error) {
                    console.error("Image translation error:", error);
                    textSource.value = "เกิดข้อผิดพลาดในการอ่านรูปภาพ";
                    
                    if (error.message.includes("403")) {
                        textTarget.innerHTML = `<span class="text-red-500">ข้อผิดพลาด 403: กรุณาใส่ API Key ของ Gemini ในโค้ด (บรรทัด const apiKey = "") หากนำไปรันบนเซิร์ฟเวอร์ของคุณเอง</span>`;
                    } else {
                        textTarget.innerHTML = `<span class="text-red-500">ไม่สามารถเชื่อมต่อระบบวิเคราะห์รูปภาพได้</span>`;
                    }
                } finally {
                    textSource.placeholder = "ป้อนข้อความ...";
                    translateLoading.classList.add('hidden');
                }
            });
        }

        function populateLangDropdowns() {
            const uniqueLangs = [];
            const map = new Map();
            for (const item of languages) {
                if(!map.has(item.transCode)){
                    map.set(item.transCode, true);
                    uniqueLangs.push({ code: item.transCode, name: item.name });
                }
            }
            uniqueLangs.sort((a,b) => a.name.localeCompare(b.name));
            let optionsHTML = '';
            uniqueLangs.forEach(l => {
                optionsHTML += `<option value="${l.code}">${l.name}</option>`;
            });
            selSource.innerHTML = `<option value="th">Thailand</option><option value="en">English (US/UK)</option>` + optionsHTML;
            selTarget.innerHTML = `<option value="en">English (US/UK)</option><option value="th">Thailand</option>` + optionsHTML;
        }
        
        populateLangDropdowns();

        btnSwap.addEventListener('click', () => {
            const tempVal = selSource.value;
            selSource.value = selTarget.value;
            selTarget.value = tempVal;
            if(textSource.value.trim() && textTarget.innerText.trim() !== 'คำแปลจะปรากฏที่นี่...') {
                const tempText = textSource.value;
                textSource.value = textTarget.innerText;
                textTarget.innerHTML = tempText;
            }
        });

        btnTranslate.addEventListener('click', async () => {
            const textToTranslate = textSource.value.trim();
            if (!textToTranslate) return;

            const fromLang = selSource.value;
            const toLang = selTarget.value;

            translateLoading.classList.remove('hidden');
            textTarget.innerHTML = '';

            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(textToTranslate)}&langpair=${fromLang}|${toLang}`);
                const data = await res.json();
                
                if (data.responseData && data.responseData.translatedText) {
                    textTarget.innerText = data.responseData.translatedText;
                } else {
                    textTarget.innerHTML = `<span class="text-red-500">เกิดข้อผิดพลาดในการแปลภาษา</span>`;
                }
            } catch (error) {
                textTarget.innerHTML = `<span class="text-red-500">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์แปลภาษาได้</span>`;
            } finally {
                translateLoading.classList.add('hidden');
            }
        });

        // --- 4.1 Speech to Text (พิมพ์ด้วยเสียง) ---
        const btnMic = document.getElementById('btn-mic');
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = function() {
                btnMic.classList.remove('bg-slate-200', 'text-slate-700');
                btnMic.classList.add('bg-red-500', 'text-white', 'animate-pulse');
                textSource.placeholder = "กำลังฟังเสียงของคุณ...";
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                textSource.value += (textSource.value ? ' ' : '') + transcript;
            };

            recognition.onerror = function(event) {
                console.error("เกิดข้อผิดพลาดในการรับเสียง", event.error);
                resetMicUI();
            };

            recognition.onend = function() {
                resetMicUI();
            };

            btnMic.addEventListener('click', () => {
                let langCode = selSource.value;
                if (langCode === 'th') langCode = 'th-TH';
                else if (langCode === 'en') langCode = 'en-US';
                
                recognition.lang = langCode;

                try {
                    recognition.start();
                } catch (e) {
                    recognition.stop();
                }
            });
        } else if (btnMic) {
            btnMic.style.display = 'none';
        }

        function resetMicUI() {
            if (btnMic) {
                btnMic.classList.add('bg-slate-200', 'text-slate-700');
                btnMic.classList.remove('bg-red-500', 'text-white', 'animate-pulse');
            }
            textSource.placeholder = "ป้อนข้อความ...";
        }

        // --- 4.2 Text to Speech (อ่านออกเสียงข้อความที่แปลแล้ว) ---
        const btnSpeakTarget = document.getElementById('btn-speak-target');
        if (btnSpeakTarget) {
            btnSpeakTarget.addEventListener('click', () => {
                const textToSpeak = textTarget.innerText.trim();
                if (!textToSpeak || textToSpeak === 'คำแปลจะปรากฏที่นี่...') return;

                let langCode = selTarget.value;
                // ปรับรหัสภาษาให้ API ออกเสียงได้ตรงตามประเทศ
                if (langCode === 'th') langCode = 'th-TH';
                else if (langCode === 'en') langCode = 'en-US';
                else if (langCode === 'zh') langCode = 'zh-CN';
                else if (langCode === 'ja') langCode = 'ja-JP';

                // ใช้ Web Speech API (TTS ในตัวเบราว์เซอร์ ใช้ฟรีและเป็นของ Google หากรันบน Chrome/Android)
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(textToSpeak);
                    utterance.lang = langCode;
                    utterance.rate = 0.9;
                    
                    // ใส่แอนิเมชันกระพริบสีฟ้าให้ปุ่มเวลาอ่าน
                    btnSpeakTarget.classList.add('bg-blue-500', 'text-white', 'animate-pulse');
                    btnSpeakTarget.classList.remove('bg-slate-200', 'text-slate-700');
                    
                    utterance.onend = () => {
                        btnSpeakTarget.classList.remove('bg-blue-500', 'text-white', 'animate-pulse');
                        btnSpeakTarget.classList.add('bg-slate-200', 'text-slate-700');
                    };
                    
                    utterance.onerror = () => {
                        btnSpeakTarget.classList.remove('bg-blue-500', 'text-white', 'animate-pulse');
                        btnSpeakTarget.classList.add('bg-slate-200', 'text-slate-700');
                    };

                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("เบราว์เซอร์ของคุณไม่รองรับระบบเสียงอ่าน (Text-to-Speech)");
                }
            });
        }

        // --- 5. Chatbot Setup ---
        const WORKER_URL = "https://winter-sun-5411.tontakankeawpang.workers.dev";
        const chatBox = document.getElementById('chat-box');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let isOpen = false;

        window.toggleChat = function() {
            isOpen = !isOpen;
            if (chatBox) {
                chatBox.classList.toggle('hidden', !isOpen);
                if (isOpen && userInput) userInput.focus();
            }
        };

        async function fetchAIResponse(message, retries = 5, delay = 1000) {
            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    if (response.status === 429 && retries > 0) {
                        await new Promise(r => setTimeout(r, delay));
                        return fetchAIResponse(message, retries - 1, delay * 2);
                    }
                    throw new Error('Worker Error');
                }

                const data = await response.json();
                return data.text || "ขออภัยครับ Librarian ไม่พบข้อมูลที่ต้องการ";
            } catch (error) {
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, delay));
                    return fetchAIResponse(message, retries - 1, delay * 2);
                }
                return "การเชื่อมต่อกับหอจดหมายเหตุขัดข้อง... 📡";
            }
        }

        function appendMessage(text, role) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} fade-entry`;
            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'px-4 py-2 bg-slate-200 rounded-lg text-slate-800 text-xs shadow-sm mb-2' 
                : 'px-0 py-2 text-slate-600 text-sm italic leading-relaxed mb-2';
            bubble.textContent = (role === 'user' ? '' : '"') + text + (role === 'user' ? '' : '"');
            div.appendChild(bubble);
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            const loading = document.createElement('div');
            loading.className = 'text-[10px] opacity-40 italic';
            loading.textContent = 'กำลังค้นหาจดหมายเหตุ...';
            chatWindow.appendChild(loading);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const aiResponse = await fetchAIResponse(text);
            loading.remove();
            appendMessage(aiResponse, 'bot');
        }

        if (sendBtn) sendBtn.addEventListener('click', handleSend);
        if (userInput) userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
