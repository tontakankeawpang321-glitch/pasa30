<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chloe 3D – Voice Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0b0f;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --accent: #7c6fff;
            --accent2: #ff6fa8;
            --text: #e8e8f0;
            --muted: #5a5a72;
            --user-bubble: #7c6fff;
            --bot-bubble: rgba(255,255,255,0.06);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100svh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Canvas ── */
        #canvas-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* ── Start Overlay ── */
        #start-overlay {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        #start-overlay.fade-out { opacity: 0; pointer-events: none; }

        .start-avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 0 40px rgba(124,111,255,0.4);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #start-overlay h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #start-overlay p { color: var(--muted); font-size: 0.875rem; max-width: 280px; line-height: 1.6; }

        /* API Key input */
        .api-input-wrap {
            width: 100%; max-width: 320px;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .api-input-wrap label { font-size: 0.75rem; color: var(--muted); text-align: left; }
        .api-input-wrap input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.65rem 0.9rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .api-input-wrap input:focus { border-color: var(--accent); }
        .api-input-wrap input::placeholder { color: var(--muted); }

        /* Model select */
        .model-select-wrap {
            width: 100%; max-width: 320px;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .model-select-wrap label { font-size: 0.75rem; color: var(--muted); text-align: left; }
        .model-select-wrap select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.65rem 0.9rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            cursor: pointer;
        }
        .model-select-wrap select option { background: #1a1a2e; }

        #start-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            padding: 0.75rem 2.5rem;
            border-radius: 50px;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(124,111,255,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        #start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,111,255,0.5); }
        #start-btn:active { transform: scale(0.96); }

        /* ── Main UI ── */
        #ui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #ui-layer.visible { opacity: 1; }

        /* Header */
        .header {
            padding: 1.25rem 1.5rem 0.5rem;
            background: linear-gradient(to bottom, rgba(10,11,15,0.9) 60%, transparent);
            text-align: center;
        }
        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

        /* Chat */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1rem 6rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            pointer-events: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        #chat-history::-webkit-scrollbar { width: 4px; }
        #chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .bubble {
            max-width: 78%;
            padding: 0.6rem 0.9rem;
            font-size: 0.85rem;
            line-height: 1.5;
            border-radius: 14px;
            animation: bubbleIn 0.25s ease;
        }
        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .bubble.user {
            background: var(--user-bubble);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bubble.bot {
            background: var(--bot-bubble);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Typing indicator */
        .typing-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            background: var(--muted);
            border-radius: 50%;
            margin: 0 2px;
            animation: dot-bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-bounce {
            0%,80%,100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-5px); opacity: 1; }
        }

        /* Bottom bar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 1rem 1.5rem 1.5rem;
            background: linear-gradient(to top, rgba(10,11,15,0.95) 60%, transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            pointer-events: auto;
        }

        #status-text {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.04em;
            height: 1rem;
            transition: color 0.3s;
        }
        #status-text.active { color: var(--accent2); }

        #mic-btn {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(124,111,255,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        #mic-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(124,111,255,0.6); }
        #mic-btn:active { transform: scale(0.93); }
        #mic-btn.listening {
            animation: pulse-mic 1.2s infinite;
            background: linear-gradient(135deg, #ff4d6d, #ff9a3c);
            box-shadow: 0 0 25px rgba(255,77,109,0.5);
        }
        @keyframes pulse-mic {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,77,109,0.5); }
            50% { box-shadow: 0 0 0 14px rgba(255,77,109,0); }
        }
    </style>
</head>
<body>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- Start Overlay -->
<div id="start-overlay">
    <div class="start-avatar">🤖</div>
    <h2>Chloe 3D</h2>
    <p>Your AI voice companion. Enter your OpenRouter API key to begin.</p>

    <div class="api-input-wrap">
        <label for="api-key-input">OpenRouter API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-or-v1-..." autocomplete="off" spellcheck="false">
    </div>

    <div class="model-select-wrap">
        <label for="model-select">AI Model</label>
        <select id="model-select">
            <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Free)</option>
            <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Free)</option>
            <option value="google/gemma-3-27b-it:free">Gemma 3 27B (Free)</option>
            <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
            <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
        </select>
    </div>

    <button id="start-btn">Start Chatting</button>
</div>

<!-- Main UI -->
<div id="ui-layer">
    <div class="header">
        <h1>Chloe 3D</h1>
        <div class="subtitle">Voice Assistant · OpenRouter</div>
    </div>

    <div id="chat-history">
        <div class="bubble bot">Hi! I'm Chloe. Press the mic and let's chat! 👋</div>
    </div>

    <div class="bottom-bar">
        <div id="status-text">Ready</div>
        <button id="mic-btn" title="Hold to speak">🎤</button>
    </div>
</div>

<script>
// ─────────────────────────────────────────
// 1. THREE.JS AVATAR
// ─────────────────────────────────────────
let scene, camera, renderer, avatar, headGroup, mouth, leftEye, rightEye;
let isSpeaking = false;
let animTime = 0;

function init3D() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a0b0f, 6, 20);

    camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 6);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const d1 = new THREE.DirectionalLight(0x7c6fff, 1.2);
    d1.position.set(4, 5, 4); scene.add(d1);
    const d2 = new THREE.DirectionalLight(0xff6fa8, 0.6);
    d2.position.set(-4, 3, 4); scene.add(d2);

    // Grid floor
    const grid = new THREE.GridHelper(24, 24, 0x1a1a2e, 0x12121e);
    grid.position.y = -1; scene.add(grid);

    // ── Avatar ──
    avatar = new THREE.Group();
    avatar.position.y = -0.5;

    const skin   = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.45, metalness: 0.05 });
    const shirt  = new THREE.MeshStandardMaterial({ color: 0xe8e0ff, roughness: 0.85 });
    const hair   = new THREE.MeshStandardMaterial({ color: 0x1a0a05, roughness: 0.9 });

    // Torso
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.68, 0.58, 1.3, 32), shirt);
    torso.position.y = -0.65; avatar.add(torso);

    // Neck
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.21, 0.4, 32), skin);
    neck.position.y = 0.1; avatar.add(neck);

    // Head group
    headGroup = new THREE.Group();
    headGroup.position.y = 0.5;
    avatar.add(headGroup);

    // Head
    headGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.55, 32, 32), skin));

    // Hair
    const hairMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.57, 32, 32, 0, Math.PI * 2, 0, Math.PI / 1.7), hair
    );
    hairMesh.position.y = 0.06; headGroup.add(hairMesh);

    // Nose
    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.055, 0.17, 16), skin);
    nose.position.set(0, -0.05, 0.53);
    nose.rotation.x = Math.PI / 6;
    headGroup.add(nose);

    // Eyes
    const eyeW = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const pupM = new THREE.MeshBasicMaterial({ color: 0x0a0a18 });

    function makeEye(x) {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), eyeW));
        const pup = new THREE.Mesh(new THREE.SphereGeometry(0.036, 16, 16), pupM);
        pup.position.z = 0.06; g.add(pup);
        g.position.set(x, 0.1, 0.48);
        return g;
    }
    leftEye  = makeEye(-0.2); headGroup.add(leftEye);
    rightEye = makeEye( 0.2); headGroup.add(rightEye);

    // Mouth
    mouth = new THREE.Mesh(
        new THREE.PlaneGeometry(0.18, 0.025),
        new THREE.MeshBasicMaterial({ color: 0x5a1515 })
    );
    mouth.position.set(0, -0.22, 0.525); headGroup.add(mouth);

    scene.add(avatar);
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    (function loop() {
        requestAnimationFrame(loop);
        animTime += 0.016;

        avatar.position.y = -0.5 + Math.sin(animTime * 1.5) * 0.02;
        avatar.rotation.y  = Math.sin(animTime * 0.5) * 0.05;
        headGroup.rotation.y = Math.sin(animTime * 0.8) * 0.1;
        headGroup.rotation.z = Math.sin(animTime * 1.2) * 0.02;

        let targetX = Math.sin(animTime * 0.5) * 0.05;

        // Blink
        if (Math.random() > 0.997) {
            leftEye.scale.y = rightEye.scale.y = 0.05;
            setTimeout(() => { leftEye.scale.y = rightEye.scale.y = 1; }, 140);
        }

        // Lip sync
        if (isSpeaking) {
            targetX += Math.sin(animTime * 8) * 0.03;
            const s = Math.sin(animTime * 25) * 0.5 + Math.sin(animTime * 15) * 0.5;
            const target = 1 + Math.max(0, s) * 6;
            mouth.scale.y += (target - mouth.scale.y) * 0.3;
        } else {
            mouth.scale.y += (1 - mouth.scale.y) * 0.2;
        }

        headGroup.rotation.x += (targetX - headGroup.rotation.x) * 0.1;
        renderer.render(scene, camera);
    })();
}

// ─────────────────────────────────────────
// 2. OPENROUTER API
// ─────────────────────────────────────────
let openRouterKey = '';
let selectedModel = 'meta-llama/llama-3.3-70b-instruct:free';
const conversationHistory = [];

async function askOpenRouter(userText) {
    conversationHistory.push({ role: 'user', content: userText });

    const body = {
        model: selectedModel,
        messages: [
            {
                role: 'system',
                content: "You are a 3D virtual assistant named Chloe — warm, friendly, and conversational. Reply in natural, concise American English (2–3 sentences max). No Markdown or special characters."
            },
            ...conversationHistory
        ],
        max_tokens: 200,
        temperature: 0.8
    };

    try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${openRouterKey}`,
                'HTTP-Referer': window.location.href,
                'X-Title': 'Chloe 3D'
            },
            body: JSON.stringify(body)
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            console.error('OpenRouter error:', err);
            if (res.status === 401) return "Hmm, that API key doesn't seem right. Please refresh and try again.";
            if (res.status === 429) return "I'm getting a lot of requests right now — give me a second and try again!";
            return "Something went wrong on my end. Try again?";
        }

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content?.trim() || "I didn't catch that. Can you try again?";
        conversationHistory.push({ role: 'assistant', content: reply });
        return reply;
    } catch (e) {
        console.error('Network error:', e);
        return "Oops — I lost my connection. Please check your internet and try again.";
    }
}

// ─────────────────────────────────────────
// 3. BROWSER TTS
// ─────────────────────────────────────────
function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();

    const utt = new SpeechSynthesisUtterance(text);
    utt.lang  = 'en-US';
    utt.rate  = 1.0;
    utt.pitch = 1.1;

    const voices = speechSynthesis.getVoices();
    const female = voices.find(v =>
        v.lang === 'en-US' &&
        (v.name.includes('Female') || v.name.includes('Samantha') ||
         v.name.includes('Zira')   || v.name.includes('Google US English'))
    );
    if (female) utt.voice = female;

    utt.onstart = () => { isSpeaking = true; setStatus('Speaking…'); };
    utt.onend   = () => { isSpeaking = false; setStatus('Ready'); };
    utt.onerror = () => { isSpeaking = false; setStatus('Ready'); };
    speechSynthesis.speak(utt);
}

if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ─────────────────────────────────────────
// 4. SPEECH RECOGNITION
// ─────────────────────────────────────────
let recognition, isListening = false;

function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition not supported. Please use Chrome.'); return; }

    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add('listening');
        setStatus('Listening…', true);
    };

    recognition.onresult = async (e) => {
        const text = e.results[0][0].transcript;
        stopListenUI();
        appendBubble('user', text);
        setStatus('Thinking…', true);
        showTyping();

        const reply = await askOpenRouter(text);
        hideTyping();
        appendBubble('bot', reply);
        setStatus('Ready');
        speakText(reply);
    };

    recognition.onerror = (e) => {
        stopListenUI();
        if (e.error === 'not-allowed') setStatus('Mic access denied.', true);
        else if (e.error === 'no-speech') setStatus('No speech detected.', true);
        else setStatus('Try again.', true);
    };

    recognition.onend = () => { if (isListening) stopListenUI(); };
}

function stopListenUI() {
    isListening = false;
    micBtn.classList.remove('listening');
}

// ─────────────────────────────────────────
// 5. UI HELPERS
// ─────────────────────────────────────────
const statusEl   = document.getElementById('status-text');
const chatEl     = document.getElementById('chat-history');
const micBtn     = document.getElementById('mic-btn');
const uiLayer    = document.getElementById('ui-layer');
const startOverlay = document.getElementById('start-overlay');
let typingBubble = null;

function setStatus(msg, active = false) {
    statusEl.textContent = msg;
    statusEl.classList.toggle('active', active);
}

function appendBubble(who, text) {
    const d = document.createElement('div');
    d.className = `bubble ${who}`;
    d.textContent = text;
    chatEl.appendChild(d);
    chatEl.scrollTop = chatEl.scrollHeight;
    return d;
}

function showTyping() {
    typingBubble = document.createElement('div');
    typingBubble.className = 'bubble bot typing-dots';
    typingBubble.innerHTML = '<span></span><span></span><span></span>';
    chatEl.appendChild(typingBubble);
    chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
    if (typingBubble) { typingBubble.remove(); typingBubble = null; }
}

// ─────────────────────────────────────────
// 6. INIT & EVENTS
// ─────────────────────────────────────────
window.onload = () => {
    init3D();
    initRecognition();
};

document.getElementById('start-btn').addEventListener('click', () => {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key) {
        document.getElementById('api-key-input').style.borderColor = '#ff4d6d';
        return;
    }
    openRouterKey  = key;
    selectedModel  = document.getElementById('model-select').value;

    // Unlock TTS on mobile
    if ('speechSynthesis' in window) speechSynthesis.speak(new SpeechSynthesisUtterance(''));

    startOverlay.classList.add('fade-out');
    setTimeout(() => {
        startOverlay.style.display = 'none';
        uiLayer.classList.add('visible');
    }, 500);
});

micBtn.addEventListener('click', () => {
    if (isListening) { recognition.stop(); return; }
    try {
        recognition.start();
    } catch (e) {
        // Already started or other error — reinitialize and retry
        initRecognition();
        try { recognition.start(); } catch (_) {}
    }
});
</script>
</body>
</html>
