<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท่องโปรตุเกส — Daily Portuguese Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --pt-blue: #003da5;
            --pt-yellow: #fcd116;
            --pt-red: #ed2939;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            /* พื้นหลังสีครีมอุ่นๆ สลับลายกระเบื้องจางๆ */
            background-color: #fffaf0;
            background-image: 
                radial-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(135deg, #fff7ed 0%, #eff6ff 100%);
            background-size: 40px 40px, 100% 100%;
            background-attachment: fixed;
        }

        h1, h2, h3, .font-accent {
            font-family: 'Outfit', sans-serif;
        }

        .font-portuguese {
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.01em;
        }

        /* Custom scrollbar - โทนน้ำเงินพรีเมียม */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #1d4ed8; }

        /* Animations */
        .calendar-day { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .calendar-day:hover { 
            transform: translateY(-6px) scale(1.02); 
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1), 0 8px 10px -6px rgba(59, 130, 246, 0.1); 
        }

        .tile-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0l20 20-20 20L0 20z' fill='%233b82f6' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating-mascot { animation: float 4s ease-in-out infinite; }

        .today-glow {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2), 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-10 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-5xl space-y-8">
        
        <!-- Header Section -->
        <header class="bg-white/90 backdrop-blur-xl rounded-[2.5rem] p-8 md:p-10 shadow-2xl shadow-blue-900/5 border border-white flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 tile-pattern opacity-100"></div>
            
            <div class="flex items-center gap-6 relative z-10">
                <div class="text-6xl md:text-7xl floating-mascot">🐣</div>
                <div>
                    <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-700 via-blue-600 to-indigo-600 mb-2 italic">
                        Daily Português
                    </h1>
                    <p class="text-slate-500 font-semibold flex items-center gap-2">
                        <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-md text-xs uppercase tracking-tighter">Level 1</span>
                        พิชิตโปรตุเกสวันละ 20 คำ กับน้องนก! 🇵🇹
                    </p>
                </div>
            </div>

            <!-- Dashboard -->
            <div class="flex items-center gap-4 relative z-10">
                <div class="bg-gradient-to-br from-amber-400 to-orange-500 p-1 rounded-3xl shadow-lg shadow-orange-200">
                    <div class="bg-white/10 backdrop-blur-md rounded-[1.4rem] px-6 py-4 flex items-center gap-4 text-white">
                        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-2xl shadow-inner">
                            🏆
                        </div>
                        <div>
                            <p class="text-[10px] font-bold uppercase tracking-widest opacity-80">Progresso</p>
                            <p class="text-2xl font-black">
                                <span id="summary-completed">0</span><span class="text-sm opacity-70 font-medium"> / <span id="summary-total">30</span> Dias</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Calendar -->
        <main class="bg-white/80 backdrop-blur-lg rounded-[3rem] p-6 md:p-10 shadow-2xl shadow-blue-900/5 border border-white">
            
            <div class="flex flex-col sm:flex-row justify-between items-center mb-10 gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg">

                    </div>
                    <h2 id="month-year-display" class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">Month Year</h2>
                </div>
                
                <div class="flex gap-3 bg-slate-100 p-2 rounded-3xl">
                    <button onclick="changeMonth(-1)" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white shadow-sm hover:bg-blue-600 hover:text-white transition-all active:scale-90">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-6 h-12 flex items-center justify-center rounded-2xl bg-white shadow-sm hover:bg-blue-600 hover:text-white font-bold transition-all active:scale-90 text-sm">
                        Hoje (วันนี้)
                    </button>
                    <button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white shadow-sm hover:bg-blue-600 hover:text-white transition-all active:scale-90">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-3 md:gap-5 mb-4 text-center font-black text-slate-400 text-xs uppercase tracking-[0.2em]">

        </main>

        <footer class="text-center pb-10">

    </div>

    <!-- Modal Vocab -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">

        <div class="relative w-full max-w-4xl bg-slate-50 rounded-[3rem] shadow-3xl flex flex-col max-h-[90vh] overflow-hidden border-[8px] border-white">
            <!-- Modal Header -->
            <div class="px-8 py-8 bg-white border-b border-slate-100 flex justify-between items-center relative">
                <div class="flex items-center gap-5">
                    <div class="text-5xl">🇵🇹</div>
                    <div>
                        <h3 id="dialog-title" class="text-3xl font-black text-blue-900 italic">Data</h3>

                    </div>
                </div>

            </div>

            </div>
            
            <!-- Footer -->

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const TH_MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        let appState = { completedDates: [] };

        function loadState() {
            const saved = localStorage.getItem('portuguese_tracker_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('portuguese_tracker_v1', JSON.stringify(appState));
        }

        // --- Portuguese Vocabulary Pool ---
        const vocabPool = [
            { word: "Olá (โอ-ล่า)", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "Olá! Como você está? (สวัสดี! สบายดีไหม?)" },
            { word: "Bom dia (บง ดี-อา)", meaning: "อรุณสวัสดิ์", english: "Good morning", icon: "☀️", example: "Bom dia para todos. (อรุณสวัสดิ์ทุกคน)" },
            { word: "Obrigado (โอ-บรี-ก้า-ดู)", meaning: "ขอบคุณ (ชาย)", english: "Thank you (m)", icon: "🙏", example: "Muito obrigado pela ajuda. (ขอบคุณมากสำหรับความช่วยเหลือ)" },
            { word: "Obrigada (โอ-บรี-ก้า-ด้า)", meaning: "ขอบคุณ (หญิง)", english: "Thank you (f)", icon: "🙏", example: "Obrigada, você é muito gentil. (ขอบคุณค่ะ คุณใจดีมาก)" },
            { word: "Por favor (ปอร์ ฟา-วอร์)", meaning: "ได้โปรด / กรุณา", english: "Please", icon: "✨", example: "Um café, por favor. (ขอกาแฟแก้วนึงครับ/ค่ะ)" },
            { word: "Desculpe (เดส-กูล-เป)", meaning: "ขอโทษ", english: "Sorry", icon: "🙇", example: "Desculpe o atraso. (ขอโทษที่มาสาย)" },
            { word: "Sim (ซิง)", meaning: "ใช่", english: "Yes", icon: "✅", example: "Sim, eu quero. (ใช่ ฉันต้องการ)" },

            { word: "Com licença (กง ลี-เซน-ซ่า)", meaning: "ขออนุญาต", english: "Excuse me", icon: "🚶", example: "Com licença, posso passar? (ขอโทษนะคะ ขอทางหน่อยได้ไหม?)" },
            { word: "Tchau (เชา)", meaning: "ลาก่อน", english: "Bye", icon: "👋", example: "Tchau! Até amanhã. (บาย! เจอกันพรุ่งนี้)" },
            { word: "Quanto custa? (กวาน-ตู กุ๊ส-ต่า?)", meaning: "ราคาเท่าไหร่?", english: "How much?", icon: "💰", example: "Quanto custa este livro? (หนังสือเล่มนี้ราคาเท่าไหร่?)" },
            { word: "Onde fica...? (อง-เด ฟี-ก่า...?)", meaning: "อยู่ที่ไหน...?", english: "Where is...?", icon: "📍", example: "Onde fica o banheiro? (ห้องน้ำอยู่ที่ไหน?)" },
            { word: "Eu não entendo (เอว เนา เอน-เตน-ดู)", meaning: "ฉันไม่เข้าใจ", english: "I don't understand", icon: "❓", example: "Desculpe, eu não entendo português. (ขอโทษค่ะ ฉันไม่เข้าใจภาษาโปรตุเกส)" },
            { word: "Você fala inglês? (โว-เซ ฟา-ล่า อิง-เกลซ?)", meaning: "คุณพูดอังกฤษไหม?", english: "Do you speak English?", icon: "🗣️", example: "Olá, você fala inglês? (สวัสดี คุณพูดภาษาอังกฤษไหม?)" },
            { word: "Água (อา-กว้า)", meaning: "น้ำ", english: "Water", icon: "💧", example: "Eu preciso de água. (ฉันต้องการน้ำ)" },

            { word: "Amanhã (อา-มา-ญา)", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "🌅", example: "Até amanhã! (เจอกันพรุ่งนี้!)" },
            { word: "Agora (อา-กอ-ร่า)", meaning: "ตอนนี้", english: "Now", icon: "⏰", example: "Eu preciso ir agora. (ฉันต้องไปเดี๋ยวนี้)" },
            { word: "Feliz (เฟ-ลิซ)", meaning: "มีความสุข", english: "Happy", icon: "😊", example: "Estou muito feliz hoje. (วันนี้ฉันมีความสุขมาก)" },
            { word: "Triste (ตรีส-เต)", meaning: "เศร้า", english: "Sad", icon: "😢", example: "Não fique triste. (อย่าเศร้าไปเลย)" },
            { word: "Cansado (กาน-ซา-ดู)", meaning: "เหนื่อย", english: "Tired", icon: "😫", example: "Eu estou muito cansado. (ฉันเหนื่อยมาก)" },
            { word: "Fome (โฟ-เม)", meaning: "หิว", english: "Hungry", icon: "😋", example: "Eu estou com muita fome. (ฉันหิวมากเลย)" },
            { word: "Bonito (โบ-นี-ตู)", meaning: "สวย/หล่อ", english: "Beautiful/Handsome", icon: "✨", example: "O pôr do sol é bonito. (พระอาทิตย์ตกสวยงามมาก)" },
            { word: "Grande (แกรน-เด)", meaning: "ใหญ่", english: "Big", icon: "🐘", example: "Esta cidade é muito grande. (เมืองนี้ใหญ่มาก)" },
            { word: "Pequeno (เป-เก-นู)", meaning: "เล็ก", english: "Small", icon: "🐜", example: "Um gato pequeno. (แมวตัวเล็ก)" },
            { word: "Novo (โน-วู)", meaning: "ใหม่", english: "New", icon: "🆕", example: "Eu tenho um carro novo. (ฉันมีรถคันใหม่)" },
            { word: "Velho (เวล-ยู)", meaning: "เก่า", english: "Old", icon: "👴", example: "Este livro é muito velho. (หนังสือเล่มนี้เก่ามาก)" },
            { word: "Bom (บง)", meaning: "ดี", english: "Good", icon: "👍", example: "Isso é muito bom. (นั่นดีมาก)" },
            { word: "Ruim (คู-อิง)", meaning: "แย่", english: "Bad", icon: "👎", example: "O tempo está ruim hoje. (วันนี้อากาศแย่)" },
            { word: "Cerveja (เซร์-เว-ช่า)", meaning: "เบียร์", english: "Beer", icon: "🍺", example: "Uma cerveja gelada, por favor. (ขอเบียร์เย็นๆ แก้วนึงครับ)" },
            { word: "Vinho (วี-ญู)", meaning: "ไวน์", english: "Wine", icon: "🍷", example: "Portugal tem vinhos excelentes. (โปรตุเกสมีไวน์ที่ยอดเยี่ยม)" },
            { word: "Praia (ไปร-ย่า)", meaning: "ชายหาด", english: "Beach", icon: "🏖️", example: "Vamos à praia? (ไปทะเลกันไหม?)" },
            { word: "Sol (โซล)", meaning: "พระอาทิตย์", english: "Sun", icon: "☀️", example: "O sol está muito forte. (แดดแรงมาก)" },
            { word: "Amor (อา-มอร์)", meaning: "ความรัก", english: "Love", icon: "❤️", example: "O amor é tudo. (ความรักคือทุกอย่าง)" },
            { word: "Saudade (เซา-ดา-เด)", meaning: "ความคิดถึง (ลึกซึ้ง)", english: "Longing", icon: "🥺", example: "Sinto saudade de você. (ฉันคิดถึงคุณ)" },

            { word: "Devagar (เด-วา-การ์)", meaning: "ช้า", english: "Slow", icon: "🐢", example: "Fale mais devagar, por favor. (กรุณาพูดช้าลงหน่อย)" },
            { word: "Simples (ซิม-เปลส)", meaning: "ง่ายๆ", english: "Simple", icon: "🌱", example: "A vida é simples. (ชีวิตนั้นเรียบง่าย)" },
            { word: "Difícil (ดี-ฟี-ซิล)", meaning: "ยาก", english: "Difficult", icon: "🧠", example: "Português não é difícil. (ภาษาโปรตุเกสไม่ยาก)" },
            { word: "Ajudar (อา-ชู-ดาร์)", meaning: "ช่วย", english: "Help", icon: "🆘", example: "Você pode me ajudar? (คุณช่วยฉันหน่อยได้ไหม?)" },
            { word: "Dormir (ดอร์-มีร์)", meaning: "นอน", english: "Sleep", icon: "😴", example: "Eu preciso dormir agora. (ฉันต้องนอนแล้ว)" }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            return shuffleArray(vocabPool).slice(0, VOCAB_PER_SESSION);
        }

        // --- Calendar Logic ---
        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Empty Slots
            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="p-4 rounded-[1.5rem] bg-slate-50 border border-dashed border-slate-200 opacity-30"></div>`;
            }

            let completedThisMonth = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (isCompleted) completedThisMonth++;

                let styleClasses = "calendar-day relative flex flex-col items-center justify-center p-4 md:p-6 rounded-[1.8rem] border-2 cursor-pointer select-none min-h-[100px] md:min-h-[130px] ";
                let contentHTML = `<span class="text-2xl md:text-3xl font-black">${day}</span>`;

                if (isCompleted) {
                    styleClasses += "bg-amber-50 border-amber-200 text-amber-600";
                    contentHTML += `<div class="absolute -top-2 -right-2 w-8 h-8 bg-amber-400 text-white rounded-full flex items-center justify-center shadow-lg text-sm">✓</div>`;
                    contentHTML += `<i class="ph-fill ph-crown text-amber-200 text-3xl mt-2 opacity-50"></i>`;
                } else if (isToday) {
                    styleClasses += "bg-blue-600 border-transparent text-white today-glow z-10 scale-105";
                    contentHTML += `<span class="text-[10px] font-bold mt-2 uppercase tracking-tighter bg-white/20 px-3 py-1 rounded-full">Hoje</span>`;
                } else {
                    const dayOfWeek = new Date(year, month, day).getDay();
                    const colorClass = (dayOfWeek === 0) ? "text-red-500" : (dayOfWeek === 6 ? "text-blue-500" : "text-slate-700");
                    styleClasses += `bg-white border-slate-50 hover:border-blue-200 ${colorClass}`;
                    contentHTML += `<i class="ph-duotone ph-student text-slate-100 text-3xl mt-2"></i>`;
                }

                grid.innerHTML += `<div class="${styleClasses}" onclick="openDayDialog(${year}, ${month}, ${day})">${contentHTML}</div>`;
            }

            document.getElementById('summary-completed').innerText = completedThisMonth;
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `${day} ${MONTH_NAMES[month]} ${year}`;
            
            const content = document.getElementById('dialog-content');
            content.innerHTML = '';
            
            const list = getRandomVocab();
            list.forEach((v, i) => {
                const wordOnly = v.word.split(' (')[0];
                content.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] border-2 border-white shadow-sm hover:shadow-md hover:border-blue-100 transition-all group relative">
                        <button onclick="speak('${wordOnly}')" class="absolute top-4 right-4 w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all">
                            <i class="ph-fill ph-speaker-high"></i>
                        </button>
                        <div class="flex items-center gap-4 mb-3">
                            <span class="text-3xl">${v.icon}</span>
                            <h4 class="text-xl font-black text-slate-800 font-portuguese">${v.word}</h4>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-4">
                            <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg text-xs font-bold">🇹🇭 ${v.meaning}</span>
                            <span class="bg-slate-50 text-slate-500 px-3 py-1 rounded-lg text-xs font-bold font-accent">🇬🇧 ${v.english}</span>
                        </div>
                        <div class="bg-slate-50/80 p-4 rounded-xl text-sm text-slate-600 italic leading-relaxed border-l-4 border-blue-200">
                            "${v.example}"
                        </div>
                    </div>
                `;
            });

            const btn = document.getElementById('btn-complete-day');
            if (isCompleted) {
                btn.innerHTML = `<i class="ph-bold ph-star"></i> ทบทวนแล้ว`;
                btn.className = "flex-[2] px-10 py-4 bg-amber-500 text-white font-black rounded-2xl shadow-xl shadow-amber-100 hover:bg-amber-600 transition-all flex items-center justify-center gap-2 text-lg";
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-check-circle"></i> เรียนเสร็จแล้ว!`;
                btn.className = "flex-[2] px-10 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2 text-lg";
                btn.onclick = markComplete;
            }

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
                showToast();
            }
            closeDialog();
        }

        function showToast() {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-900 text-white px-8 py-4 rounded-full shadow-2xl z-[100] animate-bounce font-bold flex items-center gap-3 border-2 border-white";
            toast.innerHTML = `🎉 Parabéns! (ยินดีด้วย!) คุณเก่งขึ้นอีกนิดแล้ว`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function speak(text) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=pt&client=tw-ob`;
            new Audio(url).play().catch(() => {
                if ('speechSynthesis' in window) {
                    const msg = new SpeechSynthesisUtterance(text);
                    msg.lang = 'pt-PT';
                    window.speechSynthesis.speak(msg);
                }
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        // ESC Key to close
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeDialog();
        });
    </script>
</body>
</html>
