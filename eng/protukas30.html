<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ท่องโปรตุเกส — Daily Portuguese Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --pt-blue: #003da5;
            --pt-yellow: #fcd116;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fffaf0;
            background-image: 
                radial-gradient(#e2e8f0 0.5px, transparent 0.5px),
                linear-gradient(135deg, #fff7ed 0%, #eff6ff 100%);
            background-size: 24px 24px, 100% 100%;
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
            /* เพิ่ม padding ด้านล่างเพื่อให้แถบเมนูไม่บังเนื้อหา */
            padding-bottom: 80px;
        }

        h1, h2, h3, .font-accent { font-family: 'Outfit', sans-serif; }

        /* การเคลื่อนไหวที่ลื่นไหล */
        .calendar-day { 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            touch-action: manipulation;
        }
        
        @media (hover: hover) {
            .calendar-day:hover { transform: translateY(-4px); }
        }

        .calendar-day:active { transform: scale(0.95); }

        /* ปรับปรุง Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .tile-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0l20 20-20 20L0 20z' fill='%233b82f6' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }

        /* Modal สำหรับมือถือ */
        @media (max-width: 640px) {
            #vocab-dialog > div:last-child {
                width: 100%;
                height: 100%;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
        }

        /* Bottom Navigation Styling */
        .bottom-nav {
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="text-slate-800 p-3 md:p-8 min-h-screen flex flex-col items-center overflow-x-hidden">

    <div class="w-full max-w-4xl space-y-5 md:space-y-8">
        
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md rounded-3xl p-5 md:p-8 shadow-xl shadow-blue-900/5 border border-white relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 tile-pattern"></div>
            
            <div class="flex flex-col sm:flex-row justify-between items-center gap-5 relative z-10 text-center sm:text-left">
                <div class="flex flex-col sm:flex-row items-center gap-4">
                    <div class="text-5xl md:text-6xl floating">🐣</div>
                    <div>
                        <h1 class="text-3xl md:text-4xl font-black text-blue-700 italic leading-tight">Daily Português</h1>
                        <p class="text-slate-500 text-xs md:text-sm font-semibold flex items-center justify-center sm:justify-start gap-1">
                            <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] uppercase">Level 1</span>
                            ท่องศัพท์กับน้องนก 🇵🇹
                        </p>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-amber-400 to-orange-500 p-0.5 rounded-2xl shadow-lg shadow-orange-200 w-full sm:w-auto">
                    <div class="bg-white/10 backdrop-blur-sm rounded-[0.9rem] px-4 py-2 flex items-center justify-center gap-3 text-white">
                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xl shadow-inner">🏆</div>
                        <div class="text-left">
                            <p class="text-[9px] font-bold uppercase opacity-80 leading-none mb-1">Progresso</p>
                            <p class="text-xl font-black leading-none">
                                <span id="summary-completed">0</span><span class="text-xs opacity-70"> / <span id="summary-total">30</span></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Calendar Section -->
        <main id="view-calendar" class="bg-white/90 backdrop-blur-md rounded-[2rem] p-4 md:p-8 shadow-xl shadow-blue-900/5 border border-white">
            <div class="flex justify-between items-center mb-6 px-1">
                <h2 id="month-year-display" class="text-xl md:text-2xl font-black text-slate-800 tracking-tight">Month Year</h2>
                <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                    <button onclick="changeMonth(-1)" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white shadow-sm active:bg-blue-600 active:text-white transition-colors">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-3 h-9 flex items-center justify-center rounded-lg bg-white shadow-sm font-bold text-[11px] active:bg-blue-600 active:text-white">Hoje</button>
                    <button onclick="changeMonth(1)" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white shadow-sm active:bg-blue-600 active:text-white transition-colors">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-2 md:gap-4 mb-3 text-center font-bold text-slate-400 text-[10px] uppercase tracking-wider">
                <div class="text-red-400">Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div class="text-blue-400">Sáb</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-2 md:gap-4">
                <!-- Days JS -->
            </div>
        </main>

        <footer class="text-center pb-6">
            <p class="text-slate-400 font-medium text-[11px] flex items-center justify-center gap-1 opacity-70">
                <i class="ph-fill ph-hand-tap"></i> แตะที่วันที่เพื่อเริ่มเรียนรู้
            </p>
        </footer>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 z-40 px-6 py-2 pb-safe flex justify-around items-center h-20">
        <button onclick="scrollToTop()" class="flex flex-col items-center gap-1 text-blue-600">
            <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center transition-all active:scale-90">
                <i class="ph-fill ph-calendar-blank text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold">ปฏิทิน</span>
        </button>
        <button onclick="openChat()" class="flex flex-col items-center gap-1 text-slate-400">
            <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center transition-all active:scale-90 active:bg-blue-50 active:text-blue-600">
                <i class="ph-fill ph-chat-circle-dots text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold">คุยสนทนา</span>
        </button>
    </nav>

    <!-- Modal Vocab -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        <div class="relative w-full max-w-4xl bg-white sm:rounded-[2.5rem] shadow-2xl flex flex-col h-full sm:h-auto sm:max-h-[90vh] overflow-hidden">
            
            <div class="px-6 py-5 bg-white border-b border-slate-50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🇵🇹</span>
                    <div>
                        <h3 id="dialog-title" class="text-xl font-black text-blue-900 leading-tight">Data</h3>
                        <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wide">Vocabulário (20)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full active:bg-red-100 active:text-red-500 transition-colors">
                    <i class="ph-bold ph-x text-lg"></i>
                </button>
            </div>
            
            <div id="dialog-content" class="p-4 md:p-8 overflow-y-auto custom-scrollbar flex-1 grid grid-cols-1 md:grid-cols-2 gap-3 bg-slate-50/50">
                <!-- List JS -->
            </div>
            
            <div class="p-6 bg-white border-t border-slate-50 shrink-0">
                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="closeDialog()" class="w-full sm:flex-1 py-3 text-slate-500 font-bold text-sm">ปิด</button>
                    <button id="btn-complete-day" class="w-full sm:flex-[2] py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg shadow-blue-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <i class="ph-bold ph-check-circle text-lg"></i> ท่องเสร็จแล้ว!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const vocabPool = [
            { word: "Olá (โอ-ล่า)", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "Olá! Como você está? (สวัสดี! สบายดีไหม?)" },
            { word: "Bom dia (บง ดี-อา)", meaning: "อรุณสวัสดิ์", english: "Good morning", icon: "☀️", example: "Bom dia para todos. (อรุณสวัสดิ์ทุกคน)" },
            { word: "Obrigado (โอ-บรี-ก้า-ดู)", meaning: "ขอบคุณ (ชาย)", english: "Thank you (m)", icon: "🙏", example: "Muito obrigado pela ajuda. (ขอบคุณมากสำหรับความช่วยเหลือ)" },
            { word: "Obrigada (โอ-บรี-ก้า-ด้า)", meaning: "ขอบคุณ (หญิง)", english: "Thank you (f)", icon: "🙏", example: "Obrigada, você é muito gentil. (ขอบคุณค่ะ คุณใจดีมาก)" },
            { word: "Por favor (ปอร์ ฟา-วอร์)", meaning: "กรุณา", english: "Please", icon: "✨", example: "Um café, por favor. (ขอกาแฟแก้วนึงครับ)" },
            { word: "Sim (ซิง)", meaning: "ใช่", english: "Yes", icon: "✅", example: "Sim, eu quero. (ใช่ ฉันต้องการ)" },
            { word: "Não (เนา)", meaning: "ไม่", english: "No", icon: "❌", example: "Não, obrigado. (ไม่ครับ ขอบคุณ)" },
            { word: "Tchau (เชา)", meaning: "ลาก่อน", english: "Bye", icon: "👋", example: "Tchau! Até amanhã. (บาย! เจอกันพรุ่งนี้)" },
            { word: "Água (อา-กว้า)", meaning: "น้ำ", english: "Water", icon: "💧", example: "Eu preciso de água. (ฉันต้องการน้ำ)" },
            { word: "Comida (โก-มี-ด้า)", meaning: "อาหาร", english: "Food", icon: "🍲", example: "A comida está deliciosa. (อาหารอร่อยมาก)" },
            { word: "Café (กา-เฟ่)", meaning: "กาแฟ", english: "Coffee", icon: "☕", example: "Você quer um café? (คุณอยากได้กาแฟไหม?)" },
            { word: "Amigo (อา-มี-กู)", meaning: "เพื่อน", english: "Friend", icon: "🤝", example: "Ele é meu melhor amigo. (เขาเป็นเพื่อนที่ดีที่สุด)" },
            { word: "Feliz (เฟ-ลิซ)", meaning: "มีความสุข", english: "Happy", icon: "😊", example: "Estou muito feliz hoje. (วันนี้ฉันมีความสุขมาก)" },
            { word: "Hoje (โอ-เช)", meaning: "วันนี้", english: "Today", icon: "📅", example: "Hoje está um dia lindo. (วันนี้เป็นวันที่สวยงาม)" },
            { word: "Amor (อา-มอร์)", meaning: "ความรัก", english: "Love", icon: "❤️", example: "O amor é tudo. (ความรักคือทุกอย่าง)" },
            { word: "Saudade (เซา-ดา-เด)", meaning: "ความคิดถึง", english: "Longing", icon: "🥺", example: "Sinto saudade de você. (ฉันคิดถึงคุณ)" },
            { word: "Bonito (โบ-นี-ตู)", meaning: "สวยงาม", english: "Beautiful", icon: "✨", example: "O lugar é bonito. (สถานที่นี้สวยงาม)" },
            { word: "Bom (บง)", meaning: "ดี", english: "Good", icon: "👍", example: "Isso é muito bom. (นั่นดีมาก)" },
            { word: "Pão (เปา)", meaning: "ขนมปัง", english: "Bread", icon: "🥖", example: "Eu quero pão. (ฉันต้องการขนมปัง)" },
            { word: "Casa (กา-ซ่า)", meaning: "บ้าน", english: "House", icon: "🏠", example: "Minha casa é aqui. (บ้านฉันอยู่นี่)" }
        ];

        let currentDate = new Date();
        let today = new Date();
        let selectedDateString = null;
        let appState = { completedDates: [] };

        function loadState() {
            const saved = localStorage.getItem('pt_tracker_mobile_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('pt_tracker_mobile_v1', JSON.stringify(appState));
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="aspect-square rounded-xl bg-slate-50/50 border border-slate-100 opacity-20"></div>`;
            }

            let completedCount = 0;
            for (let day = 1; day <= daysInMonth; day++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const isDone = appState.completedDates.includes(ds);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (isDone) completedCount++;

                let cls = "calendar-day aspect-square flex flex-col items-center justify-center rounded-2xl border-2 text-sm md:text-lg font-black ";
                let icon = "";

                if (isDone) {
                    cls += "bg-amber-50 border-amber-200 text-amber-600";
                    icon = `<i class="ph-fill ph-star text-[10px] mt-0.5 opacity-60"></i>`;
                } else if (isToday) {
                    cls += "bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-200";
                    icon = `<span class="text-[8px] mt-0.5 opacity-80 uppercase">Hoje</span>`;
                } else {
                    cls += "bg-white border-slate-50 text-slate-600";
                }

                grid.innerHTML += `<div class="${cls}" onclick="openDayDialog(${year}, ${month}, ${day})">${day}${icon}</div>`;
            }

            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            document.getElementById('dialog-title').innerText = `${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            content.innerHTML = '';
            
            vocabPool.forEach((v) => {
                const clean = v.word.split(' (')[0];
                content.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-2">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-2">
                                <span class="text-xl">${v.icon}</span>
                                <h4 class="font-black text-slate-800 text-sm">${v.word}</h4>
                            </div>
                            <button onclick="speak('${clean}')" class="w-8 h-8 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center active:bg-blue-600 active:text-white transition-colors">
                                <i class="ph-fill ph-speaker-high"></i>
                            </button>
                        </div>
                        <p class="text-[11px] font-bold text-blue-700 bg-blue-50 inline-block px-2 py-1 rounded-md self-start">🇹🇭 ${v.meaning}</p>
                        <p class="text-[11px] text-slate-500 italic bg-slate-50 p-2 rounded-lg">"${v.example}"</p>
                    </div>
                `;
            });

            const isDone = appState.completedDates.includes(selectedDateString);
            const btn = document.getElementById('btn-complete-day');
            btn.onclick = isDone ? closeDialog : markComplete;
            btn.innerHTML = isDone ? "ปิด" : `<i class="ph-bold ph-check-circle"></i> ท่องเสร็จแล้ว!`;

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speak(t) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(t)}&tl=pt&client=tw-ob`;
            new Audio(url).play().catch(() => {
                if ('speechSynthesis' in window) {
                    const m = new SpeechSynthesisUtterance(t);
                    m.lang = 'pt-PT';
                    window.speechSynthesis.speak(m);
                }
            });
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        function goToToday() { currentDate = new Date(); renderCalendar(); }

        // Navigation Functions
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openChat() {
            // ใส่ URL สำหรับหน้าแชทหรือสนทนาที่ต้องการที่นี่
            const chatUrl = "https://www.google.com"; // ตัวอย่าง URL
            window.open(chatUrl, '_blank');
        }

        window.onload = () => { loadState(); renderCalendar(); };
    </script>
</body>
</html>
