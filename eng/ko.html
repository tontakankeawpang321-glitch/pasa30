<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ท่องเกาหลี — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Fredoka:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
            background-color: #fdf2f8;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent; /* ลบไฮไลท์เวลากดบนมือถือ */
        }
        h1, h2, h3, .font-english {
            font-family: 'Fredoka', 'Sarabun', sans-serif; 
        }
        .font-korean {
            font-family: 'Noto Sans KR', 'Sarabun', sans-serif; 
            word-break: keep-all;
        }
        
        /* Custom scrollbar for dialog (ซ่อนบนมือถือเพื่อให้ลื่นขึ้น) */
        @media (min-width: 768px) {
            .custom-scrollbar::-webkit-scrollbar { width: 8px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: #fff5f7; border-radius: 10px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; border: 2px solid #fff5f7; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        }
        
        /* Playful animations - optimized for performance */
        .calendar-day { transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; will-change: transform; }
        @media (hover: hover) {
            .calendar-day:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(244, 114, 182, 0.15); }
        }
        .calendar-day:active { transform: translateY(0) scale(0.96); }
        
        .vocab-card { transition: transform 0.2s ease; will-change: transform; }
        @media (hover: hover) {
            .vocab-card:hover { transform: translateY(-2px); }
        }

        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23FCE7F3' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(244, 114, 182, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .today-pulse { animation: softPulse 2s infinite; }
        
        /* Safe area สำหรับมือถือที่ไม่มีปุ่มโฮม (iPhone รุ่นใหม่ๆ) */
        .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 0.75rem); }
    </style>
</head>
<body class="text-slate-800 p-2 sm:p-4 md:p-8 pb-28 md:pb-32 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-4 md:space-y-6">
        
        <!-- Header & Summary Section -->
        <div class="bg-white/80 backdrop-blur-lg rounded-[1.5rem] md:rounded-[2rem] p-4 sm:p-6 md:p-8 shadow-xl shadow-rose-100/50 border border-white">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 md:gap-6">
                <!-- Title & Mascot -->
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-4xl sm:text-5xl md:text-6xl animate-bounce drop-shadow-md" style="animation-duration: 3s;">🐯</div>
                    <div>
                        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-500 mb-0.5 md:mb-1 leading-tight">
                            Daily Korean Vocab
                        </h1>
                        <p class="text-slate-500 font-medium text-xs sm:text-sm md:text-base flex items-center gap-1">
                            ท่องศัพท์วันละ 20 คำ กับน้องเสือ! 🐯 
                        </p>
                    </div>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-gradient-to-tr from-violet-400 to-fuchsia-400 p-3 sm:p-4 md:p-5 rounded-2xl md:rounded-3xl w-full md:w-auto flex items-center gap-3 sm:gap-4 shadow-lg shadow-violet-200 text-white transform md:hover:scale-105 transition-transform duration-300">
                    <div class="bg-white/20 backdrop-blur-sm w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center text-xl sm:text-2xl md:text-3xl shadow-inner border border-white/30 shrink-0">
                        👑
                    </div>
                    <div>
                        <p class="text-[10px] sm:text-xs font-bold uppercase tracking-wider text-violet-50 mb-0.5">สรุปการเรียนเดือนนี้</p>
                        <p class="text-2xl sm:text-3xl font-extrabold leading-none">
                            <span id="summary-completed">0</span>
                            <span class="text-sm sm:text-base md:text-xl font-medium text-violet-100">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/90 backdrop-blur-lg rounded-[1.5rem] md:rounded-[2.5rem] p-4 sm:p-6 md:p-8 shadow-xl shadow-pink-100/40 border border-white">
            
            <!-- Calendar Header (Month Navigation) -->
            <div class="flex flex-row justify-between items-center mb-4 sm:mb-6 md:mb-8 gap-2">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="text-xl sm:text-2xl md:text-3xl">🗓️</div>
                    <h2 id="month-year-display" class="text-lg sm:text-xl md:text-3xl font-bold text-slate-800 tracking-wide whitespace-nowrap">Month Year</h2>
                </div>
                
                <div class="flex gap-1 sm:gap-2 bg-pink-50 p-1 md:p-1.5 rounded-xl md:rounded-2xl shrink-0">
                    <button onclick="changeMonth(-1)" class="p-1.5 sm:p-2 md:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-rose-50 hover:text-rose-600 text-slate-500 transition-all active:scale-95">
                        <i class="ph-bold ph-caret-left text-sm md:text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="px-2 sm:px-3 md:px-5 py-1.5 sm:py-2 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-rose-50 hover:text-rose-600 text-slate-700 font-bold transition-all active:scale-95 text-[10px] sm:text-xs md:text-sm whitespace-nowrap">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-1.5 sm:p-2 md:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-rose-50 hover:text-rose-600 text-slate-500 transition-all active:scale-95">
                        <i class="ph-bold ph-caret-right text-sm md:text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3 mb-2 md:mb-3 text-center font-bold text-slate-400 text-[9px] sm:text-xs md:text-sm uppercase tracking-wider">
                <div class="text-rose-500">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-blue-400">Sat</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 sm:gap-2 md:gap-3">
                <!-- Days will be generated by JS -->
            </div>
        </div>
        
        <!-- Footer info -->
        <div class="text-center text-slate-400 text-xs sm:text-sm font-medium pb-4 md:pb-0">
            <p>💡 Tip: กดที่วันที่เพื่อเริ่มท่องศัพท์เกาหลีได้เลย!</p>
        </div>

    </div>

    <!-- Bottom Navigation Bar (App Style) -->
    <div class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-lg border-t border-pink-100 shadow-[0_-10px_30px_-15px_rgba(244,114,182,0.2)] z-40 pb-safe">
        <div class="max-w-md mx-auto flex justify-around items-center px-4 pt-2 pb-1 sm:pt-3 sm:pb-2">
            <!-- Tab: ปฏิทิน (Active) -->
            <a href="index.html" target="_blank" class="flex flex-col items-center justify-center w-20 group">
                <div class="bg-rose-100 text-rose-500 p-1.5 sm:p-2 rounded-xl sm:rounded-2xl mb-0.5 sm:mb-1 group-active:scale-95 transition-transform">
                    <i class="ph-fill ph-calendar text-2xl sm:text-3xl"></i>
                </div>
                <span class="text-[10px] sm:text-xs font-bold text-rose-600 tracking-wide">ปฏิทิน</span>
            </a>
            
            <!-- Tab: คุยสนทนา (Inactive) -->
            <a href="chat.html" target="_blank" class="flex flex-col items-center justify-center w-20 group text-slate-400 hover:text-rose-500 transition-colors">
                <div class="p-1.5 sm:p-2 rounded-xl sm:rounded-2xl mb-0.5 sm:mb-1 group-active:scale-95 transition-transform">
                    <i class="ph-bold ph-chats-circle text-2xl sm:text-3xl group-hover:ph-fill transition-all"></i>
                </div>
                <span class="text-[10px] sm:text-xs font-bold tracking-wide">คุยสนทนา</span>
            </a>
        </div>
    </div>

    <!-- Dialog / Modal for Vocabulary -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center p-2 sm:p-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-pink-900/40 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div class="relative w-full max-w-3xl bg-[#fffafc] rounded-[1.5rem] md:rounded-[2.5rem] shadow-2xl flex flex-col max-h-[95vh] sm:max-h-[90vh] overflow-hidden border-[3px] md:border-4 border-white">
            
            <!-- Modal Header -->
            <div class="px-4 sm:px-6 md:px-8 py-4 md:py-6 border-b border-pink-100 bg-white flex justify-between items-center z-10 shrink-0">
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-2xl sm:text-3xl md:text-4xl">🐯</div>
                    <div>
                        <h3 id="dialog-title" class="text-lg sm:text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-500">วันที่ --/--/----</h3>
                        <p class="text-[10px] sm:text-xs md:text-sm text-slate-500 mt-0.5 md:mt-1 font-medium leading-tight">มาเก็บศัพท์เข้าสมองกัน! (20 คำ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 p-2 md:p-3 rounded-full transition-all active:scale-90 shrink-0">
                    <i class="ph-bold ph-x text-lg md:text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable Vocab List) -->
            <div id="dialog-content" class="p-3 sm:p-4 md:p-8 overflow-y-auto custom-scrollbar flex-1 space-y-3 md:space-y-4 bg-[#fffafc]">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-4 sm:px-6 md:px-8 py-3 md:py-5 border-t border-pink-100 bg-white flex justify-between items-center gap-3 shrink-0">
                <div class="text-2xl md:text-3xl hidden sm:block">🎉</div>
                <div class="flex gap-2 sm:gap-3 w-full sm:w-auto justify-end">
                    <button onclick="closeDialog()" class="px-3 sm:px-4 md:px-6 py-2 md:py-3 text-slate-600 font-bold hover:bg-rose-50 hover:text-rose-600 rounded-xl md:rounded-2xl transition-colors text-xs sm:text-sm md:text-base">
                        ปิดก่อน
                    </button>
                    <button id="btn-complete-day" class="flex-1 sm:flex-none px-4 sm:px-6 md:px-8 py-2 md:py-3 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-bold hover:from-rose-600 hover:to-pink-600 rounded-xl md:rounded-2xl shadow-lg shadow-pink-500/30 transition-all active:scale-95 flex items-center justify-center gap-1.5 md:gap-2 text-sm md:text-lg">
                        <i class="ph-bold ph-check-circle text-lg md:text-xl"></i> ท่องเสร็จแล้ว!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & Variables ---
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        // --- State Management (Local Storage) ---
        let appState = {
            completedDates: [] 
        };

        function loadState() {
            const saved = localStorage.getItem('korean_calendar_v1');
            if (saved) {
                appState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('korean_calendar_v1', JSON.stringify(appState));
        }

        // --- Vocabulary Pool (ภาษาเกาหลี) ---

            { word: "안녕하세요 (อันนยองฮาเซโย)", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "안녕하세요 만나서 반갑습니다 (สวัสดี ยินดีที่ได้รู้จัก)" },
            { word: "감사합니다 (คัมซาฮัมนีดา)", meaning: "ขอบคุณ", english: "Thank you", icon: "🙏", example: "도와주셔서 감사합니다 (ขอบคุณที่ช่วยเหลือครับ/ค่ะ)" },
            { word: "네 (เน)", meaning: "ใช่ / ครับ,ค่ะ", english: "Yes", icon: "👍", example: "네, 알겠습니다 (ครับ/ค่ะ เข้าใจแล้ว)" },
            { word: "아니요 (อานีโย)", meaning: "ไม่ใช่", english: "No", icon: "👎", example: "아니요, 괜찮아요 (ไม่ใช่ครับ/ไม่เป็นไรค่ะ)" },
            { word: "죄송합니다 (ชเวซงฮัมนีดา)", meaning: "ขอโทษ", english: "Sorry", icon: "🥺", example: "늦어서 죄송합니다 (ขอโทษที่มาสายครับ/ค่ะ)" },
            { word: "얼마예요? (ออลมาเยโย๊?)", meaning: "เท่าไหร่?", english: "How much?", icon: "💰", example: "이거 얼마예요? (อันนี้ราคาเท่าไหร่?)" },
            { word: "이름이 뭐예요? (อีรึมมี มวอเยโย๊?)", meaning: "ชื่ออะไร?", english: "What's your name?", icon: "📛", example: "그쪽 이름이 뭐예요? (คุณชื่ออะไรคะ/ครับ?)" },
            { word: "잘 지내요? (ชัล จีแนโย๊?)", meaning: "สบายดีไหม?", english: "How are you?", icon: "😊", example: "요즘 잘 지내요? (ช่วงนี้สบายดีไหม?)" },
            { word: "밥 먹었어요? (พับ มอกอสซอโย๊?)", meaning: "กินข้าวหรือยัง?", english: "Have you eaten?", icon: "🍚", example: "아침 밥 먹었어요? (กินข้าวเช้าหรือยัง?)" },
            { word: "모르겠어요 (โมรึเกสซอโย)", meaning: "ไม่รู้ / ไม่เข้าใจ", english: "I don't know", icon: "🤷", example: "잘 모르겠어요 (ไม่ค่อยรู้เรื่องเลยค่ะ/ครับ)" },

            { word: "예뻐요 (เยปอโย)", meaning: "สวย", english: "Beautiful", icon: "✨", example: "오늘 정말 예뻐요 (วันนี้สวยมากๆ เลย)" },
            { word: "좋아요 (โชอาโย)", meaning: "ดี / ชอบ", english: "Good / Like", icon: "🌟", example: "이 영화 너무 좋아요 (ชอบหนังเรื่องนี้มากๆ)" },
            { word: "사랑해요 (ซารังแฮโย)", meaning: "รัก", english: "Love", icon: "❤️", example: "당신을 사랑해요 (ฉันรักคุณ)" },

            { word: "어디예요? (ออดีเยโย๊?)", meaning: "อยู่ที่ไหน?", english: "Where?", icon: "📍", example: "지금 어디예요? (ตอนนี้อยู่ที่ไหน?)" },
            { word: "언제예요? (ออนเจเยโย๊?)", meaning: "เมื่อไหร่?", english: "When?", icon: "📅", example: "생일이 언제예요? (วันเกิดเมื่อไหร่คะ?)" },
            { word: "뭐예요? (มวอเยโย๊?)", meaning: "อะไร?", english: "What?", icon: "❓", example: "이게 뭐예요? (นี่คืออะไรคะ?)" },

            { word: "왜요? (แวโย๊?)", meaning: "ทำไม?", english: "Why?", icon: "🤔", example: "왜 안 왔어요? (ทำไมถึงไม่มาคะ?)" },
            { word: "화장실 (ฮวาจังชิล)", meaning: "ห้องน้ำ", english: "Toilet", icon: "🚽", example: "화장실이 어디예요? (ห้องน้ำอยู่ไหนคะ?)" },

            { word: "닭고기 (ทักโกกี)", meaning: "เนื้อไก่", english: "Chicken", icon: "🍗", example: "닭고기 요리 (อาหารที่ทำจากไก่)" },
            { word: "돼지고기 (ทเวจีโกกี)", meaning: "เนื้อหมู", english: "Pork", icon: "🥓", example: "돼지고기 구워 먹자 (มาย่างหมูกินกันเถอะ 삼겹살)" },
            { word: "생선 (แซงซอน)", meaning: "ปลา", english: "Fish", icon: "🐟", example: "생선을 좋아해요 (ฉันชอบกินปลา)" },
            { word: "맛있어요 (มาชิสซอโย)", meaning: "อร่อย", english: "Delicious", icon: "😋", example: "이 음식 정말 맛있어요 (อาหารนี้อร่อยมากๆ)" },
            { word: "비싸요 (พีซาโย)", meaning: "แพง", english: "Expensive", icon: "💸", example: "가방이 너무 비싸요 (กระเป๋าแพงเกินไป)" },
            { word: "싸요 (ซาโย)", meaning: "ถูก (ราคา)", english: "Cheap", icon: "🏷️", example: "이 옷은 아주 싸요 (เสื้อผ้าชุดนี้ราคาถูกมาก)" },
            { word: "깎아주세요 (กากาจูเซโย)", meaning: "ลดราคาหน่อยได้ไหม", english: "Discount please", icon: "📉", example: "조금만 깎아주세요 (ลดราคาให้หน่อยนิดนึงนะคะ)" },
            { word: "계산해 주세요 (คเยซันแฮ จูเซโย)", meaning: "เก็บเงินด้วย (เช็คบิล)", english: "Check/Bill please", icon: "🧾", example: "여기요, 계산해 주세요 (พี่คะ เช็คบิลด้วยค่ะ)" },
            { word: "괜찮아요 (แควนชานาโย)", meaning: "ไม่เป็นไร / โอเค", english: "It's okay / Fine", icon: "👌", example: "네, 괜찮아요 (ค่ะ ไม่เป็นไรค่ะ)" },
            { word: "천천히 말해 주세요 (ชอนชอนฮี มัลแฮ จูเซโย)", meaning: "พูดช้าๆ หน่อย", english: "Speak slowly", icon: "🐢", example: "조금 천천히 말해 주세요 (กรุณาพูดช้าๆ หน่อยนะคะ)" },
            { word: "다시 말해 주세요 (ทาชี มัลแฮ จูเซโย)", meaning: "พูดอีกครั้ง", english: "Say it again", icon: "🔁", example: "한 번 더 다시 말해 주세요 (กรุณาพูดอีกครั้งนะคะ)" },
            { word: "안녕히 가세요 (อันนยองฮี คาเซโย)", meaning: "ลาก่อน (พูดกับคนไป)", english: "Goodbye (to person leaving)", icon: "👋", example: "조심히 가세요, 안녕히 가세요 (เดินทางปลอดภัย ลาก่อนค่ะ)" },
            { word: "대박 (แทบัก)", meaning: "สุดยอด / เยี่ยมมาก / ว้าว", english: "Awesome / Jackpot", icon: "🤩", example: "우와, 대박! (โห สุดยอดเลย!)" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            const shuffled = shuffleArray(vocabPool);
            return shuffled.slice(0, Math.min(VOCAB_PER_SESSION, shuffled.length));
        }

        // --- Calendar Logic ---
        
        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getDisplayDateString(year, month, day) {
            return `${day} ${MONTH_NAMES[month]} ${year}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="p-1 md:p-4 rounded-xl md:rounded-[1.5rem] bg-pink-50/30 border border-dashed border-pink-200 opacity-40"></div>`;
            }

            let completedThisMonth = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                let baseClasses = "calendar-day relative flex flex-col items-center justify-center p-1 sm:p-2 md:p-5 rounded-xl md:rounded-[1.5rem] border-2 cursor-pointer select-none min-h-[65px] sm:min-h-[80px] md:min-h-[110px]";
                
                let stateClasses = "";
                let indicatorHTML = "";

                if (isCompleted) {
                    stateClasses = "bg-amber-50 border-amber-200 text-amber-800 shadow-sm";
                    indicatorHTML = `
                        <div class="absolute -top-1.5 -right-1.5 md:-top-2 md:-right-2 w-5 h-5 md:w-7 md:h-7 bg-white rounded-full shadow border border-amber-200 flex items-center justify-center text-[10px] md:text-sm z-10 animate-bounce" style="animation-duration: 2s;">🌟</div>
                        <i class="ph-fill ph-check-circle text-amber-400 text-lg sm:text-xl md:text-3xl mt-0.5 md:mt-1 opacity-60"></i>
                    `;
                } else if (isToday) {
                    stateClasses = "bg-gradient-to-b from-rose-400 to-pink-500 border-transparent text-white shadow-md md:shadow-lg shadow-pink-500/40 today-pulse";
                    indicatorHTML = `
                        <span class="text-[8px] sm:text-[10px] md:text-xs font-bold bg-white/20 px-1.5 py-0.5 md:px-3 md:py-1 rounded-full mt-1 md:mt-2 backdrop-blur-sm text-white">วันนี้</span>
                    `;
                } else {
                    stateClasses = "bg-white border-slate-100 text-slate-600 hover:border-pink-300";
                    indicatorHTML = `<i class="ph-duotone ph-book-open text-slate-200 text-lg sm:text-xl md:text-3xl mt-0.5 md:mt-1 md:group-hover:text-pink-400 transition-colors"></i>`;
                }

                const dayOfWeek = new Date(year, month, day).getDay();
                let textStyle = "font-extrabold text-base sm:text-lg md:text-2xl font-english";
                if (!isToday && !isCompleted) {
                    if (dayOfWeek === 0) textStyle += " text-rose-500";
                    else if (dayOfWeek === 6) textStyle += " text-blue-500";
                }

                const cardHTML = `
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        <span class="${textStyle} leading-none">${day}</span>
                        ${indicatorHTML}
                    </div>
                `;
                grid.innerHTML += cardHTML;
            }

            const completedEl = document.getElementById('summary-completed');
            completedEl.innerText = completedThisMonth;
            completedEl.classList.add('scale-125', 'text-yellow-200');
            setTimeout(() => completedEl.classList.remove('scale-125', 'text-yellow-200'), 300);
            
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // --- Dialog & Interaction ---
        
        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const displayDate = getDisplayDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            const dialog = document.getElementById('vocab-dialog');
            const title = document.getElementById('dialog-title');
            const content = document.getElementById('dialog-content');
            const btnComplete = document.getElementById('btn-complete-day');

            title.innerText = `วันที่ ${displayDate}`;

            const vocabList = getRandomVocab();
            content.innerHTML = '';
            
            vocabList.forEach((v, index) => {
                const koreanWordOnly = v.word.split(' (')[0];

                const itemHTML = `
                    <div class="vocab-card p-3 sm:p-4 md:p-5 bg-white border-2 border-pink-50 rounded-[1.25rem] md:rounded-[2rem] hover:border-pink-300 shadow-sm md:hover:shadow-xl md:hover:shadow-pink-100/50 flex flex-col sm:flex-row gap-3 md:gap-4 items-start relative overflow-hidden group">
                        
                        <div class="absolute -right-10 -bottom-10 w-24 h-24 md:w-32 md:h-32 bg-pink-50 rounded-full blur-2xl opacity-0 group-hover:opacity-100 transition-opacity hidden sm:block"></div>

                        <div class="flex items-center gap-3 w-full sm:w-auto">
                            <div class="blob-bg text-rose-600 w-10 h-10 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center font-extrabold text-sm md:text-xl shrink-0 shadow-sm relative z-10 font-english">
                                ${index + 1}
                            </div>
                            <h4 class="text-base sm:text-lg md:text-2xl font-extrabold text-slate-800 flex items-center gap-1.5 sm:gap-2 font-korean tracking-wide flex-1 sm:hidden">
                                <span class="text-xl md:text-3xl drop-shadow-sm">${v.icon}</span> 
                                <span class="leading-tight">${v.word}</span>
                            </h4>
                            <button onclick="speakWord('${koreanWordOnly}')" class="bg-pink-50 text-rose-500 hover:bg-rose-500 hover:text-white p-2 rounded-lg md:rounded-xl transition-colors shadow-sm sm:hidden ml-auto shrink-0 active:scale-95">
                                <i class="ph-fill ph-speaker-high text-base"></i>
                            </button>
                        </div>
                        
                        <div class="flex-1 relative z-10 w-full mt-1 sm:mt-0">
                            <div class="hidden sm:flex justify-between items-start w-full">
                                <h4 class="text-lg md:text-2xl font-extrabold text-slate-800 mb-2 flex flex-wrap items-center gap-2 font-korean tracking-wide w-full pr-12">
                                    <span class="text-2xl md:text-3xl drop-shadow-sm mr-1">${v.icon}</span> 
                                    <span class="leading-tight">${v.word}</span>
                                </h4>
                                <button onclick="speakWord('${koreanWordOnly}')" class="absolute top-0 right-0 bg-pink-50 text-rose-500 hover:bg-rose-500 hover:text-white p-2 rounded-xl transition-colors shadow-sm active:scale-95">
                                    <i class="ph-fill ph-speaker-high text-lg"></i>
                                </button>
                            </div>
                            
                            <div class="flex flex-wrap gap-1.5 sm:gap-2 mb-2 md:mb-3">
                                <span class="text-rose-600 font-bold bg-rose-50 px-2.5 py-1 md:px-3 md:py-1.5 rounded-md md:rounded-lg text-[11px] sm:text-xs md:text-sm flex items-center gap-1 md:gap-1.5 border border-rose-100">
                                    🇹🇭 ${v.meaning}
                                </span>
                                <span class="text-violet-600 font-bold bg-violet-50 px-2.5 py-1 md:px-3 md:py-1.5 rounded-md md:rounded-lg text-[11px] sm:text-xs md:text-sm flex items-center gap-1 md:gap-1.5 font-english border border-violet-100">
                                    🇬🇧 ${v.english}
                                </span>
                            </div>
                            
                            <div class="bg-pink-50/50 p-2.5 sm:p-3 md:p-4 rounded-xl md:rounded-2xl border border-pink-100 relative mt-2 md:mt-3">
                                <i class="ph-fill ph-quotes text-rose-200/50 text-2xl md:text-4xl absolute -top-1.5 -left-1 md:-top-2 md:-left-1"></i>
                                <p class="text-[11px] sm:text-xs md:text-base text-slate-600 relative z-10 font-korean pl-3 md:pl-4 leading-relaxed">
                                    ${v.example}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
                content.innerHTML += itemHTML;
            });

            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-star text-amber-300 text-base md:text-xl"></i> ทบทวนเสร็จแล้ว (เยี่ยมมาก!)`;
                btnComplete.className = "flex-1 sm:flex-none px-4 sm:px-6 md:px-8 py-2 md:py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold hover:from-amber-600 hover:to-orange-600 rounded-xl md:rounded-2xl shadow-lg shadow-amber-500/30 transition-all active:scale-95 flex items-center justify-center gap-1.5 md:gap-2 text-sm md:text-lg";
                btnComplete.onclick = closeDialog; 
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle text-base md:text-xl"></i> ท่องเสร็จแล้ว!`;
                btnComplete.className = "flex-1 sm:flex-none px-4 sm:px-6 md:px-8 py-2 md:py-3 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-bold hover:from-rose-600 hover:to-pink-600 rounded-xl md:rounded-2xl shadow-lg shadow-pink-500/30 transition-all active:scale-95 flex items-center justify-center gap-1.5 md:gap-2 text-sm md:text-lg";
                btnComplete.onclick = markDayAsComplete; 
            }

            dialog.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            const dialog = document.getElementById('vocab-dialog');
            dialog.classList.add('hidden');
            document.body.style.overflow = 'auto'; // Restore scrolling
            selectedDateString = null;
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                
                const alert = document.createElement('div');
                alert.className = "fixed top-6 sm:top-10 left-1/2 transform -translate-x-1/2 bg-white px-4 sm:px-6 py-3 sm:py-4 rounded-full shadow-2xl flex items-center gap-2 sm:gap-3 z-[100] animate-bounce font-bold text-slate-800 border-2 border-pink-400 text-xs sm:text-base w-max max-w-[90vw]";
                alert.innerHTML = `<span class="text-xl sm:text-2xl">🎉</span> 대박! สะสมดาวได้อีก 1 ดวง`;
                document.body.appendChild(alert);
                setTimeout(() => alert.remove(), 3000);

                renderCalendar(); 
            }
            closeDialog();
        }

        function speakWord(word) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=ko&client=tw-ob`;
            const audio = new Audio(url);
            
            audio.play().catch(error => {
                console.error("ไม่สามารถเล่นเสียงจาก Google TTS ได้:", error);
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'ko-KR'; 
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) {
                closeDialog();
            }
        });
    </script>
