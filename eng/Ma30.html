<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท่องพม่า — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Fredoka:wght@400;500;600&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #f4fdf8 100%);
            background-color: #f0fdf4;
            background-image: radial-gradient(#d1fae5 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent; /* เอาแถบสีเทาเวลากดบนมือถือออก */
        }
        h1, h2, h3, .font-english {
            font-family: 'Fredoka', 'Sarabun', sans-serif;
        }
        .font-myanmar {
            font-family: 'Padauk', 'Myanmar Text', 'Sarabun', sans-serif;
        }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Optimized animations (เบาเครื่องขึ้น) */
        .calendar-day { transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border-color 0.15s ease-out; }
        .calendar-day:active { transform: scale(0.95); }
        
        .vocab-card { transition: transform 0.15s ease-out, box-shadow 0.15s ease-out; }
        
        /* ปรับให้ในมือถือไม่ต้องแสดงผล Box Shadow หรือ Hover สเปคสูง */
        @media (min-width: 640px) {
            .calendar-day:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
            .vocab-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(20, 184, 166, 0.1); }
        }

        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23D1FAE5' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.3); }
            70% { box-shadow: 0 0 0 8px rgba(20, 184, 166, 0); }
            100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
        }
        .today-pulse { animation: softPulse 2s infinite; }
    </style>
</head>
<body class="text-slate-800 p-2 sm:p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-4 sm:space-y-6">
        
        <!-- Header & Summary Section -->

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 sm:gap-6">
                <!-- Title & Mascot -->
                <div class="flex items-center gap-3 sm:gap-4">
                    <div class="text-4xl sm:text-5xl md:text-6xl animate-bounce drop-shadow-sm" style="animation-duration: 3s;">🐘</div>
                    <div>
                        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-emerald-500 mb-0.5">
                            Daily Myanmar Vocab
                        </h1>
                        <p class="text-slate-500 font-medium text-xs sm:text-sm md:text-base flex items-center gap-1">
                            ท่องศัพท์วันละ 20 คำ กับน้องช้าง! 🌟 
                        </p>
                    </div>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-gradient-to-tr from-amber-400 to-orange-400 p-3 sm:p-5 rounded-2xl w-full md:w-auto flex items-center gap-3 sm:gap-5 shadow-md text-white">
                    <div class="bg-white/20 w-12 h-12 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center text-2xl sm:text-3xl shadow-inner border border-white/20">
                        🏆
                    </div>
                    <div>
                        <p class="text-[10px] sm:text-xs font-bold uppercase tracking-wider text-amber-50 mb-0.5">สรุปการเรียนเดือนนี้</p>
                        <p class="text-2xl sm:text-3xl font-extrabold leading-none">
                            <span id="summary-completed">0</span>
                            <span class="text-lg sm:text-xl font-medium text-amber-100">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/95 sm:backdrop-blur-sm rounded-[1.5rem] sm:rounded-[2.5rem] p-3 sm:p-6 md:p-8 shadow-lg shadow-teal-100/30 border border-white">
            
            <!-- Calendar Header -->
            <div class="flex flex-col sm:flex-row justify-between items-center mb-4 sm:mb-8 gap-3">
                <div class="flex items-center gap-2">
                    <div class="text-2xl sm:text-3xl">🗓️</div>
                    <h2 id="month-year-display" class="text-xl sm:text-2xl md:text-3xl font-bold text-slate-800 tracking-wide">Month Year</h2>
                </div>
                
                <div class="flex gap-1.5 bg-slate-100 p-1.5 rounded-[1rem] w-full sm:w-auto justify-center">
                    <button onclick="changeMonth(-1)" class="p-2 sm:p-3 rounded-xl bg-white shadow-sm text-slate-500 active:scale-95">
                        <i class="ph-bold ph-caret-left text-base sm:text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="flex-1 sm:flex-none px-4 py-2 rounded-xl bg-white shadow-sm text-slate-700 font-bold active:scale-95 text-xs sm:text-sm">
                        กลับมาวันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 sm:p-3 rounded-xl bg-white shadow-sm text-slate-500 active:scale-95">
                        <i class="ph-bold ph-caret-right text-base sm:text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-1 sm:gap-2 mb-2 text-center font-bold text-slate-400 text-[10px] sm:text-xs uppercase tracking-wider">
                <div class="text-rose-400">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-blue-400">Sat</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 sm:gap-2">
                <!-- Days will be generated by JS -->
            </div>
        </div>
        
        <!-- Footer info -->
        <div class="text-center text-slate-400 text-xs sm:text-sm font-medium pt-1 pb-4">
            <p>💡 Tip: กดที่วันที่เพื่อเริ่มท่องศัพท์ได้เลย!</p>
        </div>

    </div>

    <!-- Dialog / Modal for Vocabulary -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-indigo-900/40 transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div class="relative w-[96%] sm:w-[90%] max-w-3xl bg-[#f8fafc] rounded-[1.5rem] sm:rounded-[2.5rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden border-2 sm:border-4 border-white">
            
            <!-- Modal Header -->
            <div class="px-4 sm:px-8 py-3 sm:py-5 border-b border-slate-200/60 bg-white flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-2xl sm:text-4xl">🦚</div>
                    <div>
                        <h3 id="dialog-title" class="text-base sm:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-emerald-500">วันที่ --/--/----</h3>
                        <p class="text-[10px] sm:text-sm text-slate-500 mt-0.5 font-medium">มาเก็บศัพท์เข้าสมองกันเถอะ! (20 คำ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-rose-500 bg-slate-100 p-2 sm:p-3 rounded-full active:scale-90 shrink-0">
                    <i class="ph-bold ph-x text-lg sm:text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable Vocab List) -->
            <div id="dialog-content" class="p-3 sm:p-6 overflow-y-auto custom-scrollbar flex-1 space-y-3 sm:space-y-4">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-4 sm:px-8 py-3 sm:py-5 border-t border-slate-200/60 bg-white flex justify-between items-center gap-3 shrink-0">
                <div class="text-2xl hidden md:block">🎉</div>
                <div class="flex gap-2 w-full md:w-auto justify-end">
                    <button onclick="closeDialog()" class="px-3 sm:px-6 py-2.5 sm:py-3 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors text-xs sm:text-base">
                        ปิดไว้ก่อน
                    </button>
                    <button id="btn-complete-day" class="flex-1 sm:flex-none px-4 sm:px-8 py-2.5 sm:py-3 bg-gradient-to-r from-teal-500 to-emerald-500 text-white font-bold rounded-xl shadow-md active:scale-95 flex items-center justify-center gap-1.5 text-sm sm:text-lg">
                        <i class="ph-bold ph-check-circle text-lg"></i> ท่องเสร็จแล้ว!
                    </button>
                </div>
            </div>
        </div>
    </div>

            { word: "ထမင်း (ทะมิน)", meaning: "ข้าว", english: "Rice", icon: "🍛", example: "ထမင်းဖြူ (ข้าวสวย)" },
            { word: "ကြက်သား (แจ้กตา)", meaning: "เนื้อไก่", english: "Chicken", icon: "🍗", example: "ကြက်သားဟင်း (แกงไก่)" },
            { word: "ဝက်သား (แว้กตา)", meaning: "เนื้อหมู", english: "Pork", icon: "🥓", example: "ဝက်သားကင် (หมูย่าง)" },
            { word: "ငါး (งา)", meaning: "ปลา", english: "Fish", icon: "🐟", example: "ငါးကြော် (ปลาทอด)" },
            { word: "အရသာရှိတယ် (อะยะตาชิแด)", meaning: "อร่อย", english: "Delicious", icon: "😋", example: "ဒီဟင်းအရသာရှိတယ် (อาหารจานนี้อร่อย)" },
            { word: "ဈေးကြီးတယ် (เซจีแด)", meaning: "แพง", english: "Expensive", icon: "💸", example: "ဒါအရမ်းဈေးကြီးတယ် (อันนี้แพงมาก)" },
            { word: "ဈေးချိုတယ် (เซโชแด)", meaning: "ถูก (ราคา)", english: "Cheap", icon: "🏷️", example: "ဈေးချိုတဲ့ဆိုင် (ร้านที่ราคาถูก)" },
            { word: "လျှော့ပေးပါ (ช่อเปบา)", meaning: "ลดราคาหน่อยได้ไหม", english: "Discount please", icon: "📉", example: "နည်းနည်းလျှော့ပေးပါ (ลดหน่อยนะ)" },
            { word: "ဘေလ်ရှင်းမယ် (บิลชินแม)", meaning: "เก็บเงินด้วย (เช็คบิล)", english: "Check/Bill please", icon: "🧾", example: "ညီလေး၊ ဘေလ်ရှင်းမယ် (น้อง เก็บตังค์ด้วย)" },
            { word: "အကူအညီလိုလား (อะกูอะญีโลลา)", meaning: "ต้องการความช่วยเหลือไหม?", english: "Need help?", icon: "🆘", example: "ကူညီရမလား (ให้ช่วยไหม?)" },
            { word: "ရပါတယ် (ยะบาแด)", meaning: "ไม่เป็นไร / ได้", english: "It's okay / Fine", icon: "👌", example: "ရပါတယ်၊ ကိစ္စမရှိပါဘူး (ไม่เป็นไร ไม่มีปัญหา)" },
            { word: "ဖြည်းဖြည်းပြောပါ (พเยพเยปยอบา)", meaning: "พูดช้าๆ หน่อย", english: "Speak slowly", icon: "🐢", example: "ကျေးဇူးပြု၍ဖြည်းဖြည်းပြောပါ (กรุณาพูดช้าๆ)" },
            { word: "ထပ်ပြောပါ (ทับปยอบา)", meaning: "พูดอีกครั้ง", english: "Say it again", icon: "🔁", example: "တစ်ခေါက်လောက်ထပ်ပြောပါ (พูดอีกสักรอบได้ไหม)" },
            { word: "တာ့တာ (ต๊าดตา)", meaning: "บ๊ายบาย / ลาก่อน", english: "Bye bye", icon: "👋", example: "နောက်မှတွေ့မယ်နော် တာ့တာ (ไว้เจอกันใหม่นะ บ๊ายบาย)" }
        ];

        // ประมวลผลและแยกคำพม่ากับคำอ่านไทยไว้ล่วงหน้า (Optimize: ลดภาระตอนเปิดหน้าต่าง)
        const processedVocabPool = rawVocabPool.map(v => {
            const parts = v.word.split('(');
            return {
                ...v,
                myanmarOnly: parts[0].trim(), // คำพม่าเพียวๆ (สำหรับให้ AI อ่าน)
                thaiReading: parts[1] ? parts[1].replace(')', '').trim() : '' // คำอ่านภาษาไทย
            };
        });

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            return shuffleArray(processedVocabPool).slice(0, Math.min(VOCAB_PER_SESSION, processedVocabPool.length));
        }

        // --- Calendar Logic ---
        
        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getDisplayDateString(year, month, day) {
            return `${day} ${MONTH_NAMES[month]} ${year}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            
            let gridHTML = ''; // เก็บ HTML รวบยอดทีเดียว ลดการกระตุก

            for (let i = 0; i < firstDayIndex; i++) {
                gridHTML += `<div class="p-1 sm:p-2 rounded-[1rem] bg-slate-50/50 border border-dashed border-slate-200 opacity-40"></div>`;
            }

            let completedThisMonth = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                let baseClasses = "calendar-day relative flex flex-col items-center justify-center p-1 sm:p-3 rounded-[1rem] sm:rounded-[1.2rem] border-2 cursor-pointer select-none min-h-[60px] sm:min-h-[85px]";
                
                let stateClasses = "";
                let indicatorHTML = "";

                if (isCompleted) {
                    stateClasses = "bg-amber-50 border-amber-200 text-amber-800";
                    indicatorHTML = `
                        <div class="absolute -top-1.5 -right-1.5 w-4 h-4 sm:w-6 sm:h-6 bg-white rounded-full shadow border border-amber-200 flex items-center justify-center text-[8px] sm:text-[10px] z-10">🌟</div>
                        <i class="ph-fill ph-check-circle text-amber-400 text-lg sm:text-2xl mt-0.5 opacity-80"></i>
                    `;
                } else if (isToday) {
                    stateClasses = "bg-gradient-to-b from-teal-500 to-emerald-500 border-transparent text-white shadow-md today-pulse";
                    indicatorHTML = `
                        <span class="text-[8px] sm:text-[10px] font-bold bg-white/20 px-1.5 py-0.5 rounded-full mt-1">วันนี้</span>
                    `;
                } else {
                    stateClasses = "bg-white border-slate-100 text-slate-600";
                    indicatorHTML = `<i class="ph-duotone ph-book-open text-slate-200 text-lg sm:text-xl mt-0.5"></i>`;
                }

                const dayOfWeek = new Date(year, month, day).getDay();
                let textStyle = "font-extrabold text-sm sm:text-lg font-english";
                if (!isToday && !isCompleted) {
                    if (dayOfWeek === 0) textStyle += " text-rose-500";
                    else if (dayOfWeek === 6) textStyle += " text-blue-500";
                }

                gridHTML += `
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        <span class="${textStyle}">${day}</span>
                        ${indicatorHTML}
                    </div>
                `;
            }

            document.getElementById('calendar-grid').innerHTML = gridHTML;
            document.getElementById('summary-completed').innerText = completedThisMonth;
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // --- Dialog & Interaction ---
        
        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            document.getElementById('dialog-title').innerText = `วันที่ ${getDisplayDateString(year, month, day)}`;
            const content = document.getElementById('dialog-content');
            
            // แสดงหน้าต่างทันทีด้วยแอนิเมชันลื่นๆ พร้อม Loading ป้องกันอาการกดแล้วจอค้าง
            content.innerHTML = '<div class="flex flex-col items-center justify-center py-10 text-teal-500"><i class="ph-bold ph-spinner animate-spin text-3xl mb-2"></i><p class="font-bold text-xs">กำลังเตรียมคำศัพท์...</p></div>';
            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            // ใช้ requestAnimationFrame ช่วยกระจายภาระไม่ให้ CPU หนักจนหน้าจอกระตุก
            requestAnimationFrame(() => {
                setTimeout(() => {
                    const vocabList = getRandomVocab();
                    let contentHTML = ''; 
                    
                    vocabList.forEach((v, index) => {
                        contentHTML += `
                            <div class="vocab-card p-4 bg-white border-2 border-slate-100 rounded-[1.2rem] flex flex-col sm:flex-row gap-3 items-start relative overflow-hidden">
                                <div class="blob-bg text-teal-700 w-10 h-10 sm:w-12 sm:h-12 rounded-xl flex items-center justify-center font-extrabold text-base shrink-0 shadow-sm relative z-10 font-english">
                                    ${index + 1}
                                </div>
                                <div class="flex-1 relative z-10 w-full">
                                    <div class="flex justify-between items-start w-full">
                                        <h4 class="text-base sm:text-lg font-extrabold text-slate-800 mb-1 flex flex-wrap items-center gap-1.5 font-myanmar tracking-wide w-full pr-10">
                                            <span class="text-xl drop-shadow-sm">${v.icon}</span> 
                                            <span>${v.myanmarOnly}</span>
                                            <span class="text-xs text-slate-400 font-normal mt-0.5">(${v.thaiReading})</span>
                                        </h4>
                                        <button onclick="speakWord('${v.myanmarOnly}')" class="absolute top-0 right-0 bg-teal-50 text-teal-600 p-2 rounded-lg shadow-sm active:scale-90" title="ฟังเสียง">
                                            <i class="ph-fill ph-speaker-high text-lg"></i>
                                        </button>
                                    </div>
                                    <div class="flex flex-wrap gap-1.5 mb-2 mt-1">
                                        <span class="text-teal-700 font-bold bg-teal-50 px-2 py-1 rounded-md text-[11px] sm:text-xs border border-teal-100">
                                            🇹🇭 ${v.meaning}
                                        </span>
                                        <span class="text-amber-700 font-bold bg-amber-50 px-2 py-1 rounded-md text-[11px] sm:text-xs font-english border border-amber-100">
                                            🇬🇧 ${v.english}
                                        </span>
                                    </div>
                                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 relative mt-2">
                                        <p class="text-xs sm:text-sm text-slate-600 font-myanmar">
                                            <i class="ph-fill ph-quotes text-slate-300 text-lg mr-1"></i>${v.example}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    content.innerHTML = contentHTML;
                    content.scrollTop = 0;
                }, 10);
            });

            const btnComplete = document.getElementById('btn-complete-day');
            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-star text-amber-300 text-lg"></i> ทบทวนเสร็จแล้ว!`;
                btnComplete.className = "flex-1 sm:flex-none px-4 py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold rounded-xl shadow-md active:scale-95 flex items-center justify-center gap-1.5 text-sm";
                btnComplete.onclick = closeDialog; 
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle text-lg"></i> ท่องเสร็จแล้ว!`;
                btnComplete.className = "flex-1 sm:flex-none px-4 py-3 bg-gradient-to-r from-teal-500 to-emerald-500 text-white font-bold rounded-xl shadow-md active:scale-95 flex items-center justify-center gap-1.5 text-sm";
                btnComplete.onclick = markDayAsComplete; 
            }
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedDateString = null;
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                
                const alert = document.createElement('div');
                alert.className = "fixed top-10 left-1/2 transform -translate-x-1/2 bg-white px-5 py-3 rounded-full shadow-xl flex items-center gap-2 z-[100] animate-bounce font-bold text-slate-800 border-2 border-emerald-400 text-sm w-max";
                alert.innerHTML = `<span class="text-xl">🎉</span> เก่งมาก! สะสมดาวได้อีก 1 ดวง`;
                document.body.appendChild(alert);
                setTimeout(() => alert.remove(), 2500);

                renderCalendar(); 
            }
            closeDialog();
        }

        function speakWord(word) {
            // หยุดเสียงเดิมที่กำลังเล่น
            globalAudio.pause();
            globalAudio.currentTime = 0;

            // บังคับใช้ API ของ Google เสมอ (ลบระบบของเครื่องทิ้งทั้งหมด เพื่อแก้ปัญหาเสียงเพี้ยน/โดนตัด)
            // ใช้ client=gtx เป็นตัวหลัก เพราะเสถียรสุดบนอุปกรณ์พกพา
            const url = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=my&q=${encodeURIComponent(word)}`;
            globalAudio.src = url;
            
            globalAudio.play().catch(e => {
                console.warn("Primary TTS failed, trying fallback...", e);
                // ระบบสำรอง หากเซิร์ฟเวอร์หลักบล็อก 
                const fallbackUrl = `https://translate.googleapis.com/translate_tts?client=tw-ob&ie=UTF-8&tl=my&q=${encodeURIComponent(word)}`;
                globalAudio.src = fallbackUrl;
                globalAudio.play().catch(err => console.error("All TTS options failed.", err));
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) {
                closeDialog();
            }
        });
    </script>
</body>
</html>
