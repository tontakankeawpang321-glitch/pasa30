<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ท่องศัพท์ไทย — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #f4f4f9 100%);
            background-color: #fafafa;
            background-image: radial-gradient(#d8b4fe 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            /* ป้องกันการเด้งเวลาเลื่อนหน้าจอบนมือถือ */
            overscroll-behavior-y: none;
        }
        h1, h2, h3, .font-english {
            font-family: 'Fredoka', 'Sarabun', sans-serif;
        }
        .font-thai {
            font-family: 'Sarabun', sans-serif; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
       
        .calendar-day { 
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; 
            will-change: transform;
        }
        .calendar-day:active { transform: scale(0.92); }
        
        .vocab-card { transition: transform 0.2s ease; will-change: transform; }
        .vocab-card:active { transform: scale(0.98); }

        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23F3E8FF' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        /* ใช้ Opacity แทน Box-shadow ในการทำ Pulse เพื่อลดภาระเครื่อง */
        @keyframes softPulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .today-pulse { animation: softPulse 3s infinite ease-in-out; }

        /* Padding สำหรับ iOS แบบมี Safe Area */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-slate-800 p-2 sm:p-4 md:p-8 pb-24 sm:pb-28 min-h-screen flex flex-col items-center overflow-x-hidden relative">

    <div class="w-full max-w-4xl space-y-3 sm:space-y-6">
        
        <!-- Header & Summary Section -->
        <div class="bg-white/80 backdrop-blur-md rounded-[1.5rem] sm:rounded-[2rem] p-4 sm:p-5 md:p-8 shadow-lg shadow-purple-100/50 border border-white">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 sm:gap-6">
                <!-- Title & Mascot -->
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="text-4xl sm:text-5xl md:text-6xl animate-bounce drop-shadow-sm" style="animation-duration: 3s;">🐰</div>
                    <div>
                        <h1 class="text-xl sm:text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-0.5">
                            Daily Thai Vocab
                        </h1>
                        <p class="text-slate-500 font-medium text-[11px] sm:text-sm md:text-base flex items-center gap-1">
                            ท่องศัพท์วันละ 20 คำ กับน้องกระต่าย! 🌟 
                        </p>
                    </div>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-gradient-to-tr from-purple-500 to-pink-400 p-3 sm:p-5 rounded-2xl w-full sm:w-auto flex items-center gap-3 sm:gap-5 shadow-md shadow-pink-200/50 text-white">
                    <div class="bg-white/20 backdrop-blur-sm w-10 h-10 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center text-xl sm:text-3xl shadow-inner border border-white/20 shrink-0">
                        ✨
                    </div>
                    <div class="flex-1">
                        <p class="text-[9px] sm:text-xs font-bold uppercase tracking-wider text-pink-50 mb-0.5">สรุปการเรียนเดือนนี้</p>
                        <p class="text-xl sm:text-3xl font-extrabold leading-none flex items-baseline gap-1">
                            <span id="summary-completed">0</span>
                            <span class="text-sm sm:text-xl font-medium text-pink-100">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/90 backdrop-blur-md rounded-[1.5rem] sm:rounded-[2.5rem] p-3 sm:p-6 md:p-8 shadow-lg shadow-purple-100/40 border border-white">
            
            <!-- Calendar Header -->
            <div class="flex flex-row justify-between items-center mb-4 sm:mb-8 gap-2">
                <div class="flex items-center gap-2">
                    <div class="text-xl sm:text-3xl">🗓️</div>
                    <h2 id="month-year-display" class="text-lg sm:text-2xl md:text-3xl font-bold text-slate-800 tracking-wide leading-none">Month</h2>
                </div>
                
                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl">
                    <button onclick="changeMonth(-1)" class="p-2 sm:p-3 rounded-lg bg-white shadow-sm hover:bg-purple-50 hover:text-purple-600 text-slate-500 active:scale-95 transition-colors">
                        <i class="ph-bold ph-caret-left text-sm sm:text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="px-3 sm:px-5 py-2 rounded-lg bg-white shadow-sm hover:bg-purple-50 hover:text-purple-600 text-slate-700 font-bold active:scale-95 transition-colors text-[10px] sm:text-sm whitespace-nowrap">
                        กลับมาวันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 sm:p-3 rounded-lg bg-white shadow-sm hover:bg-purple-50 hover:text-purple-600 text-slate-500 active:scale-95 transition-colors">
                        <i class="ph-bold ph-caret-right text-sm sm:text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3 mb-1.5 sm:mb-3 text-center font-bold text-slate-400 text-[9px] sm:text-xs md:text-sm uppercase tracking-wider">
                <div class="text-rose-400">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-blue-400">Sat</div>
            </div>

            <!-- Calendar Grid (Optimized with aspect-square for mobile perfection) -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3">
                <!-- Days will be generated by JS -->
            </div>
        </div>
        
        <!-- Footer info -->
        <div class="text-center text-slate-400 text-[10px] sm:text-sm font-medium pb-4 sm:pb-8">
            <p>💡 Tip: กดที่วันที่เพื่อเริ่มท่องศัพท์ได้เลย!</p>
        </div>

    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 w-full bg-white/85 backdrop-blur-xl border-t border-purple-100/50 shadow-[0_-8px_30px_rgba(0,0,0,0.06)] z-40 pb-safe">
        <div class="max-w-md mx-auto flex justify-around items-center px-6 py-2">
            
            <!-- Calendar Link (Active) -->
            <a href="index.html" target="_blank" class="flex flex-col items-center gap-1 p-1 text-purple-600 transition-transform active:scale-95 w-20">
                <div class="relative flex flex-col items-center">
                    <i class="ph-fill ph-calendar-blank text-[28px]"></i>
                    <span class="absolute -bottom-1.5 w-1 h-1 bg-purple-600 rounded-full"></span>
                </div>
                <span class="text-[10px] font-bold mt-1">ปฏิทิน</span>
            </a>
            
            <!-- Chat Link -->
            <a href="https://tontakankeawpang321-glitch.github.io/pasa30/human/thaihuman.html" target="_blank" class="flex flex-col items-center gap-1 p-1 text-slate-400 hover:text-pink-500 transition-transform active:scale-95 group w-20">
                <div class="relative flex flex-col items-center">
                    <i class="ph-bold ph-chats-teardrop text-[28px] group-hover:scale-105 transition-transform"></i>
                </div>
                <span class="text-[10px] font-medium group-hover:font-bold mt-1">คุยสนทนา</span>
            </a>

        </div>
    </nav>

    <!-- Dialog / Modal for Vocabulary -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[92%] sm:w-[90%] max-w-3xl bg-[#f8fafc] rounded-[1.5rem] sm:rounded-[2.5rem] shadow-2xl flex flex-col max-h-[85vh] sm:max-h-[90vh] overflow-hidden border-2 sm:border-4 border-white">
            
            <!-- Modal Header -->
            <div class="px-4 sm:px-8 py-3 sm:py-6 border-b border-slate-200/60 bg-white flex justify-between items-center relative z-10 shrink-0">
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-2xl sm:text-4xl">🐰</div>
                    <div>
                        <h3 id="dialog-title" class="text-base sm:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">วันที่ --/--/----</h3>
                        <p class="text-[10px] sm:text-sm text-slate-500 mt-0.5 font-medium">มาเก็บศัพท์เข้าสมองกันเถอะ! (20 คำ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 p-2 sm:p-3 rounded-full transition-colors active:scale-90">
                    <i class="ph-bold ph-x text-base sm:text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable Vocab List) -->
            <div id="dialog-content" class="p-3 sm:p-6 overflow-y-auto custom-scrollbar flex-1 space-y-3 sm:space-y-4">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-4 sm:px-8 py-3 sm:py-5 border-t border-slate-200/60 bg-white flex justify-between items-center gap-3 shrink-0">
                <div class="text-2xl sm:text-3xl hidden md:block">🌟</div>
                <div class="flex gap-2 sm:gap-3 w-full justify-end">
                    <button onclick="closeDialog()" class="px-3 sm:px-6 py-2 sm:py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-xl sm:rounded-2xl transition-colors text-[11px] sm:text-base">
                        ปิดไว้ก่อน
                    </button>
                    <button id="btn-complete-day" class="flex-1 sm:flex-none px-4 sm:px-8 py-2.5 sm:py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold hover:from-purple-600 hover:to-pink-600 rounded-xl sm:rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-1.5 sm:gap-2 text-[13px] sm:text-lg whitespace-nowrap">
                        <i class="ph-bold ph-check-circle text-base sm:text-xl"></i> ท่องเสร็จแล้ว!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & Variables ---
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        // --- State Management (Local Storage) ---
        let appState = {
            completedDates: [] 
        };

        function loadState() {
            try {
                const saved = localStorage.getItem('thai_calendar_v1');
                if (saved) appState = JSON.parse(saved);
            } catch (e) {
                console.error("Could not load state", e);
            }
        }

        function saveState() {
            try {
                localStorage.setItem('thai_calendar_v1', JSON.stringify(appState));
            } catch (e) {
                console.error("Could not save state", e);
            }
        }

            { word: "แรงบันดาลใจ", meaning: "พลังที่กระตุ้นให้เกิดความคิดหรือการกระทำ", english: "Inspiration", icon: "🌟", example: "เขาได้แรงบันดาลใจจากหนังสือเล่มนี้" },
            { word: "อคติ", meaning: "ความลำเอียง", english: "Bias / Prejudice", icon: "🙈", example: "เราไม่ควรตัดสินผู้อื่นด้วยความอคติ" },
            { word: "ตระหนัก", meaning: "รู้ประจักษ์ชัด, รู้สำนึก", english: "Realize / Be aware", icon: "👁️", example: "ทุกคนควรตระหนักถึงปัญหาสิ่งแวดล้อม" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            return shuffleArray(vocabPool).slice(0, Math.min(VOCAB_PER_SESSION, vocabPool.length));
        }

        // --- Calendar Logic ---
        
        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getDisplayDateString(year, month, day) {
            return `${day} ${MONTH_NAMES[month]} ${year}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            
            let gridHTML = ''; // Optimize: Build string first
            let completedThisMonth = 0;

            // Empty slots
            for (let i = 0; i < firstDayIndex; i++) {
                gridHTML += `<div class="aspect-square rounded-xl sm:rounded-2xl bg-slate-50 border border-dashed border-slate-200 opacity-50"></div>`;
            }

            // Days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                // Aspect-square makes it perfectly uniform on mobile
                let baseClasses = "calendar-day aspect-square relative flex flex-col items-center justify-center rounded-xl sm:rounded-2xl border-2 cursor-pointer select-none";
                let stateClasses = "";
                let indicatorHTML = "";

                if (isCompleted) {
                    stateClasses = "bg-teal-50 border-teal-200 text-teal-800";
                    indicatorHTML = `
                        <div class="absolute -top-1 -right-1 sm:-top-1.5 sm:-right-1.5 w-4 h-4 sm:w-5 sm:h-5 bg-white rounded-full shadow-sm border border-teal-100 flex items-center justify-center text-[8px] sm:text-[10px] z-10">🌟</div>
                        <i class="ph-fill ph-check-circle text-teal-400 text-lg sm:text-2xl mt-0.5 opacity-80 absolute bottom-1 sm:bottom-2"></i>
                    `;
                } else if (isToday) {
                    stateClasses = "bg-gradient-to-br from-purple-500 to-pink-500 border-transparent text-white today-pulse shadow-sm";
                    indicatorHTML = `
                        <span class="absolute bottom-1 sm:bottom-2 text-[8px] sm:text-[10px] font-bold bg-white/30 px-1.5 py-0.5 rounded-full backdrop-blur-sm leading-none">วันนี้</span>
                    `;
                } else {
                    stateClasses = "bg-white border-slate-100 text-slate-600 hover:border-purple-300";
                    indicatorHTML = `<i class="ph-duotone ph-book-open text-slate-200 text-base sm:text-xl absolute bottom-1 sm:bottom-2 group-hover:text-purple-400 transition-colors"></i>`;
                }

                const dayOfWeek = new Date(year, month, day).getDay();
                let textStyle = "font-extrabold text-sm sm:text-xl font-english z-10 relative " + (!isToday ? "-mt-2 sm:-mt-3" : "-mt-2 sm:-mt-3");
                
                if (!isToday && !isCompleted) {
                    if (dayOfWeek === 0) textStyle += " text-rose-500";
                    else if (dayOfWeek === 6) textStyle += " text-blue-500";
                }

                gridHTML += `
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        <span class="${textStyle}">${day}</span>
                        ${indicatorHTML}
                    </div>
                `;
            }

            // Set HTML once for better performance
            document.getElementById('calendar-grid').innerHTML = gridHTML;

            // Update stats
            const completedEl = document.getElementById('summary-completed');
            completedEl.innerText = completedThisMonth;
            
            // Lightweight pop animation
            completedEl.style.transform = 'scale(1.3)';
            completedEl.style.color = '#fef08a'; // yellow-200
            setTimeout(() => {
                completedEl.style.transform = 'scale(1)';
                completedEl.style.color = '';
            }, 200);
            
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // --- Dialog & Interaction ---
        
        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            document.getElementById('dialog-title').innerText = `วันที่ ${getDisplayDateString(year, month, day)}`;
            const btnComplete = document.getElementById('btn-complete-day');

            // Optimize: Build HTML string first
            const vocabList = getRandomVocab();
            let vocabHTML = '';
            
            vocabList.forEach((v, index) => {
                vocabHTML += `
                    <div class="vocab-card p-3 sm:p-5 bg-white border border-slate-100 rounded-xl sm:rounded-2xl flex flex-col sm:flex-row gap-3 items-start relative overflow-hidden group shadow-sm">
                        <div class="blob-bg text-purple-700 w-10 h-10 sm:w-12 sm:h-12 rounded-xl flex items-center justify-center font-extrabold text-sm sm:text-lg shrink-0 relative z-10 font-english">
                            ${index + 1}
                        </div>
                        
                        <div class="flex-1 relative z-10 w-full">
                            <div class="flex justify-between items-start w-full">
                                <h4 class="text-base sm:text-xl font-extrabold text-slate-800 mb-1 flex items-center gap-1.5 sm:gap-2 font-thai tracking-wide">
                                    <span class="text-lg sm:text-2xl">${v.icon}</span>
                                    ${v.word}
                                    <button onclick="speakWord('${v.word}')" class="bg-pink-50 text-pink-500 hover:bg-pink-500 hover:text-white p-1.5 rounded-lg transition-colors ml-1" title="ฟังเสียงอ่าน">
                                        <i class="ph-fill ph-speaker-high text-sm sm:text-base"></i>
                                    </button>
                                </h4>
                            </div>
                            
                            <div class="flex flex-wrap gap-1 sm:gap-1.5 mb-2 mt-0.5">
                                <p class="text-purple-700 font-bold bg-purple-50 inline-block px-2 py-0.5 rounded-md text-[10px] sm:text-xs font-thai">${v.meaning}</p>
                                <p class="text-pink-600 font-bold bg-pink-50 inline-block px-2 py-0.5 rounded-md text-[10px] sm:text-xs font-english">${v.english}</p>
                            </div>
                            
                            <div class="bg-slate-50 p-2 sm:p-3 rounded-lg sm:rounded-xl border border-slate-100 relative">
                                <i class="ph-fill ph-quotes text-slate-200 text-xl sm:text-2xl absolute -top-1 -left-0.5"></i>
                                <p class="text-[11px] sm:text-sm text-slate-600 relative z-10 font-thai pl-3 sm:pl-4">
                                    ${v.example}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('dialog-content').innerHTML = vocabHTML;

            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-star text-yellow-300 text-base sm:text-xl"></i> ทบทวนเสร็จแล้ว!`;
                btnComplete.className = "flex-1 sm:flex-none px-4 sm:px-8 py-2.5 sm:py-3 bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-bold rounded-xl sm:rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-1.5 sm:gap-2 text-[13px] sm:text-lg whitespace-nowrap";
                btnComplete.onclick = closeDialog; 
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle text-base sm:text-xl"></i> ท่องเสร็จแล้ว!`;
                btnComplete.className = "flex-1 sm:flex-none px-4 sm:px-8 py-2.5 sm:py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold rounded-xl sm:rounded-2xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-1.5 sm:gap-2 text-[13px] sm:text-lg whitespace-nowrap";
                btnComplete.onclick = markDayAsComplete; 
            }

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedDateString = null;
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                
                // Lightweight custom alert
                const alert = document.createElement('div');
                alert.className = "fixed top-5 left-1/2 transform -translate-x-1/2 bg-white px-4 py-2 sm:px-5 sm:py-3 rounded-full shadow-lg flex items-center gap-2 z-[100] font-bold text-slate-800 border-2 border-green-400 text-xs sm:text-sm transition-all duration-300 ease-out translate-y-[-100px] opacity-0";
                alert.innerHTML = `<span class="text-lg sm:text-xl">🎉</span> ยอดเยี่ยม! ได้ดาวเพิ่มแล้ว`;
                document.body.appendChild(alert);
                
                // Animate in
                requestAnimationFrame(() => {
                    alert.style.transform = 'translate(-50%, 0)';
                    alert.style.opacity = '1';
                });

                // Remove after 2.5s
                setTimeout(() => {
                    alert.style.transform = 'translate(-50%, -100px)';
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 300);
                }, 2500);

                renderCalendar(); 
            }
            closeDialog();
        }

        function speakWord(word) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=th&client=tw-ob`;
            const audio = new Audio(url);
            
            audio.play().catch(error => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'th-TH'; 
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) {
                closeDialog();
            }
        });
    </script>
</body>
</html>
