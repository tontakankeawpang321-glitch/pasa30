<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท่องศัพท์ไทย — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            /* พื้นหลังสีพาสเทลน่ารักๆ โทนสว่างละมุน */
            background: linear-gradient(135deg, #fdfbfb 0%, #f4f4f9 100%);
            background-color: #fafafa;
            background-image: radial-gradient(#d8b4fe 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }
        h1, h2, h3, .font-english {
            font-family: 'Fredoka', 'Sarabun', sans-serif; /* ฟอนต์อังกฤษหัวกลมๆ น่ารัก */
        }
        .font-thai {
            font-family: 'Sarabun', sans-serif; 
        }
        
        /* Custom scrollbar for dialog */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a2b1c6; }
        
        /* Playful animations */
        .calendar-day { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .calendar-day:hover { transform: translateY(-4px) rotate(1deg); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .calendar-day:active { transform: translateY(0) scale(0.95); }
        
        .vocab-card { transition: all 0.2s ease-in-out; }
        .vocab-card:hover { transform: translateY(-3px) scale(1.01); }

        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23F3E8FF' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        /* Pulse animation for 'Today' */
        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .today-pulse { animation: softPulse 2s infinite; }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-6">
        
        <!-- Header & Summary Section -->
        <div class="bg-white/80 backdrop-blur-lg rounded-[2rem] p-6 md:p-8 shadow-xl shadow-indigo-100/50 border border-white">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <!-- Title & Mascot -->
                <div class="flex items-center gap-4">
                    <div class="text-5xl md:text-6xl animate-bounce drop-shadow-md" style="animation-duration: 3s;">🐰</div>
                    <div>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-1">
                            Daily Thai Vocab
                        </h1>
                        <p class="text-slate-500 font-medium text-sm md:text-base flex items-center gap-1">
                            ท่องศัพท์วันละ 20 คำ กับน้องกระต่าย! 🌟 
                        </p>
                    </div>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-gradient-to-tr from-purple-500 to-pink-400 p-5 rounded-3xl w-full md:w-auto flex items-center gap-5 shadow-lg shadow-pink-200 text-white transform hover:scale-105 transition-transform duration-300">
                    <div class="bg-white/20 backdrop-blur-sm w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-white/30">
                        ✨
                    </div>
                    <div>
                        <p class="text-xs font-bold uppercase tracking-wider text-pink-50 mb-1">สรุปการเรียนเดือนนี้</p>
                        <p class="text-3xl font-extrabold leading-none">
                            <span id="summary-completed">0</span>
                            <span class="text-xl font-medium text-pink-100">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/90 backdrop-blur-lg rounded-[2.5rem] p-6 md:p-8 shadow-xl shadow-indigo-100/40 border border-white">
            
            <!-- Calendar Header (Month Navigation) -->
            <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">🗓️</div>
                    <h2 id="month-year-display" class="text-2xl md:text-3xl font-bold text-slate-800 tracking-wide">Month Year</h2>
                </div>
                
                <div class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl">
                    <button onclick="changeMonth(-1)" class="p-3 rounded-xl bg-white shadow-sm hover:shadow hover:bg-purple-50 hover:text-purple-600 text-slate-500 transition-all active:scale-95">
                        <i class="ph-bold ph-caret-left text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="px-5 py-2 rounded-xl bg-white shadow-sm hover:shadow hover:bg-purple-50 hover:text-purple-600 text-slate-700 font-bold transition-all active:scale-95 text-sm">
                        กลับมาวันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-3 rounded-xl bg-white shadow-sm hover:shadow hover:bg-purple-50 hover:text-purple-600 text-slate-500 transition-all active:scale-95">
                        <i class="ph-bold ph-caret-right text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-2 md:gap-3 mb-3 text-center font-bold text-slate-400 text-xs md:text-sm uppercase tracking-wider">
                <div class="text-rose-400">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-blue-400">Sat</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-2 md:gap-3">
                <!-- Days will be generated by JS -->
            </div>
        </div>
        
        <!-- Footer info -->
        <div class="text-center text-slate-400 text-sm font-medium">
            <p>💡 Tip: กดที่วันที่เพื่อเริ่มท่องศัพท์ได้เลย!</p>
        </div>

    </div>

    <!-- Dialog / Modal for Vocabulary -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-indigo-900/30 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[95%] max-w-3xl bg-[#f8fafc] rounded-[2.5rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden border-4 border-white">
            
            <!-- Modal Header -->
            <div class="px-8 py-6 border-b border-slate-200/60 bg-white flex justify-between items-center relative z-10">
                <div class="flex items-center gap-4">
                    <div class="text-4xl">🐰</div>
                    <div>
                        <h3 id="dialog-title" class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500">วันที่ --/--/----</h3>
                        <p class="text-sm text-slate-500 mt-1 font-medium">มาเก็บศัพท์เข้าสมองกันเถอะ! (20 คำ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 p-3 rounded-full transition-all active:scale-90">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable Vocab List) -->
            <div id="dialog-content" class="p-4 md:p-8 overflow-y-auto custom-scrollbar flex-1 space-y-4">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-8 py-5 border-t border-slate-200/60 bg-white flex justify-between items-center gap-3">
                <div class="text-3xl hidden md:block">🌟</div>
                <div class="flex gap-3 w-full md:w-auto justify-end">
                    <button onclick="closeDialog()" class="px-6 py-3 text-slate-600 font-bold hover:bg-slate-100 rounded-2xl transition-colors">
                        ปิดไว้ก่อน
                    </button>
                    <button id="btn-complete-day" class="px-8 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold hover:from-purple-600 hover:to-pink-600 rounded-2xl shadow-lg shadow-purple-500/30 transition-all active:scale-95 flex items-center gap-2 text-lg">
                        <i class="ph-bold ph-check-circle text-xl"></i> ท่องเสร็จแล้ว!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & Variables ---
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        // --- State Management (Local Storage) ---
        let appState = {
            completedDates: [] 
        };

        function loadState() {
            const saved = localStorage.getItem('thai_calendar_v1');
            if (saved) {
                appState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('thai_calendar_v1', JSON.stringify(appState));
        }

        // --- Vocabulary Pool (ภาษาไทย) ---
        const vocabPool = [
            { word: "อนุรักษ์", meaning: "รักษาให้คงเดิม", english: "Conservation / Preserve", icon: "🌳", example: "เราควรช่วยกันอนุรักษ์สิ่งแวดล้อม" },
            { word: "กะทันหัน", meaning: "ปัจจุบันทันด่วน", english: "Suddenly / Abruptly", icon: "⚡", example: "เขาต้องเดินทางอย่างกะทันหัน" },
            { word: "อุปสรรค", meaning: "ความขัดข้อง, สิ่งที่ขัดขวาง", english: "Obstacle / Barrier", icon: "🚧", example: "ความพยายามช่วยให้ก้าวผ่านอุปสรรค" },
            { word: "ทัศนคติ", meaning: "แนวความคิดเห็น", english: "Attitude / Mindset", icon: "🧠", example: "การมีทัศนคติที่ดีช่วยให้ทำงานมีความสุข" },
            { word: "ประสิทธิภาพ", meaning: "ความสามารถที่ทำให้เกิดผล", english: "Efficiency", icon: "⚙️", example: "ระบบใหม่ช่วยเพิ่มประสิทธิภาพในการทำงาน" },
            { word: "กลยุทธ์", meaning: "วิธีการที่แยบคาย", english: "Strategy", icon: "♟️", example: "บริษัทต้องปรับกลยุทธ์การตลาดใหม่" },
            { word: "บริบท", meaning: "สภาพแวดล้อมที่ช่วยให้เข้าใจความหมาย", english: "Context", icon: "🧩", example: "เราต้องพิจารณาคำพูดจากบริบทด้วย" },
            { word: "ปฏิสัมพันธ์", meaning: "การกระทำระหว่างกัน", english: "Interaction", icon: "🤝", example: "การเรียนรู้ที่ดีต้องมีปฏิสัมพันธ์" },
            { word: "นวัตกรรม", meaning: "สิ่งที่ทำขึ้นใหม่หรือแปลกจากเดิม", english: "Innovation", icon: "💡", example: "บริษัทนี้โดดเด่นเรื่องนวัตกรรมเทคโนโลยี" },
            { word: "สมรรถนะ", meaning: "ความสามารถ, ประสิทธิภาพ", english: "Performance / Capability", icon: "🚀", example: "รถยนต์คันนี้มีสมรรถนะสูงมาก" },
            { word: "บูรณาการ", meaning: "การรวมเข้าเป็นอันเดียวกัน", english: "Integration", icon: "🔗", example: "การจัดการศึกษาแบบบูรณาการ" },
            { word: "วิสัยทัศน์", meaning: "การมองการณ์ไกล", english: "Vision", icon: "🔭", example: "ผู้นำองค์กรต้องมีวิสัยทัศน์ที่ชัดเจน" },
            { word: "จิตวิทยา", meaning: "วิชาว่าด้วยจิตใจและพฤติกรรม", english: "Psychology", icon: "🧘", example: "เขาใช้หลักจิตวิทยาในการบริหารคน" },
            { word: "วิเคราะห์", meaning: "ใคร่ครวญแยกแยะ", english: "Analyze", icon: "🔍", example: "เราต้องวิเคราะห์ข้อมูลอย่างละเอียด" },
            { word: "เอกลักษณ์", meaning: "ลักษณะที่เหมือนกันหรือมีร่วมกัน", english: "Identity / Uniqueness", icon: "✨", example: "อาหารไทยมีเอกลักษณ์ที่ไม่เหมือนใคร" },
            { word: "ตรรกะ", meaning: "ความคิดที่มีเหตุผล", english: "Logic", icon: "🧮", example: "คำอธิบายของเขาเต็มไปด้วยตรรกะ" },
            { word: "ศักยภาพ", meaning: "อำนาจหรือคุณสมบัติที่แฝงอยู่", english: "Potential", icon: "🌱", example: "เด็กทุกคนมีศักยภาพในตนเอง" },
            { word: "ปรัชญา", meaning: "วิชาว่าด้วยหลักแห่งความรู้และความจริง", english: "Philosophy", icon: "📜", example: "แนวคิดนี้มาจากปรัชญาตะวันออก" },
            { word: "ประสิทธิผล", meaning: "ผลที่เกิดขึ้นจากการกระทำ", english: "Effectiveness", icon: "🎯", example: "โครงการนี้บรรลุประสิทธิผลตามเป้าหมาย" },
            { word: "วิจารณญาณ", meaning: "ปัญญาที่สามารถให้เหตุผลถูกต้อง", english: "Judgment / Discretion", icon: "⚖️", example: "โปรดใช้วิจารณญาณในการรับข้อมูลข่าวสาร" },
            { word: "ทฤษฎี", meaning: "หลักการทางวิชาการ", english: "Theory", icon: "📚", example: "การปฏิบัติจริงบางครั้งก็ต่างจากทฤษฎี" },
            { word: "อัตลักษณ์", meaning: "ลักษณะเฉพาะตัว", english: "Identity", icon: "🆔", example: "ภาษาถิ่นเป็นอัตลักษณ์ของแต่ละภูมิภาค" },
            { word: "สังเคราะห์", meaning: "รวมเข้าด้วยกัน", english: "Synthesize", icon: "🧪", example: "นักวิจัยสังเคราะห์ข้อมูลจากหลายแหล่ง" },
            { word: "สมมติฐาน", meaning: "ข้อคิดเห็นที่ใช้เป็นมูลฐาน", english: "Hypothesis", icon: "💭", example: "การทดลองนี้ตั้งสมมติฐานไว้สองข้อ" },
            { word: "อรรถรส", meaning: "รสของถ้อยคำ, ความไพเราะ", english: "Flavor / Aesthetic", icon: "🎭", example: "การอ่านกวีนิพนธ์ทำให้ได้อรรถรสทางภาษา" },
            { word: "นัยยะ", meaning: "ความหมายที่แฝงอยู่", english: "Implication / Connotation", icon: "🕵️", example: "รอยยิ้มของเขามีนัยยะบางอย่างที่น่าสงสัย" },
            { word: "วาทศิลป์", meaning: "ศิลปะในการพูด", english: "Rhetoric / Art of speaking", icon: "🗣️", example: "นักการเมืองต้องมีวาทศิลป์ในการปราศรัย" },
            { word: "ปรากฏการณ์", meaning: "สิ่งที่แสดงออกมาให้เห็น", english: "Phenomenon", icon: "🌌", example: "ฝนดาวตกเป็นปรากฏการณ์ทางธรรมชาติ" },
            { word: "วิวัฒนาการ", meaning: "กระบวนการเปลี่ยนแปลงอย่างค่อยเป็นค่อยไป", english: "Evolution", icon: "🐒", example: "มนุษย์มีวิวัฒนาการมาอย่างยาวนาน" },
            { word: "แรงบันดาลใจ", meaning: "พลังที่กระตุ้นให้เกิดความคิดหรือการกระทำ", english: "Inspiration", icon: "🌟", example: "เขาได้แรงบันดาลใจจากหนังสือเล่มนี้" },
            { word: "อคติ", meaning: "ความลำเอียง", english: "Bias / Prejudice", icon: "🙈", example: "เราไม่ควรตัดสินผู้อื่นด้วยความอคติ" },
            { word: "ตระหนัก", meaning: "รู้ประจักษ์ชัด, รู้สำนึก", english: "Realize / Be aware", icon: "👁️", example: "ทุกคนควรตระหนักถึงปัญหาสิ่งแวดล้อม" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            const shuffled = shuffleArray(vocabPool);
            return shuffled.slice(0, Math.min(VOCAB_PER_SESSION, shuffled.length));
        }

        // --- Calendar Logic ---
        
        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getDisplayDateString(year, month, day) {
            return `${day} ${MONTH_NAMES[month]} ${year}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="p-2 md:p-4 rounded-[1.5rem] bg-slate-50/50 border border-dashed border-slate-200 opacity-40"></div>`;
            }

            let completedThisMonth = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                let baseClasses = "calendar-day relative flex flex-col items-center justify-center p-3 md:p-5 rounded-[1.5rem] border-2 cursor-pointer select-none min-h-[90px] md:min-h-[110px]";
                
                let stateClasses = "";
                let indicatorHTML = "";

                if (isCompleted) {
                    stateClasses = "bg-teal-50 border-teal-200 text-teal-800 shadow-sm";
                    indicatorHTML = `
                        <div class="absolute -top-2 -right-2 w-7 h-7 bg-white rounded-full shadow border border-teal-100 flex items-center justify-center text-sm z-10 animate-bounce" style="animation-duration: 2s;">🌟</div>
                        <i class="ph-fill ph-check-circle text-teal-400 text-2xl md:text-3xl mt-1 opacity-80"></i>
                    `;
                } else if (isToday) {
                    stateClasses = "bg-gradient-to-b from-purple-500 to-pink-500 border-transparent text-white shadow-lg shadow-purple-500/40 today-pulse";
                    indicatorHTML = `
                        <span class="text-[10px] md:text-xs font-bold bg-white/30 px-3 py-1 rounded-full mt-2 backdrop-blur-sm shadow-sm">วันนี้</span>
                    `;
                } else {
                    stateClasses = "bg-white border-slate-100 text-slate-600 hover:border-purple-300";
                    indicatorHTML = `<i class="ph-duotone ph-book-open text-slate-200 text-2xl md:text-3xl mt-1 group-hover:text-purple-400 transition-colors"></i>`;
                }

                // Check for Sunday/Saturday colors
                const dayOfWeek = new Date(year, month, day).getDay();
                let textStyle = "font-extrabold text-xl md:text-2xl font-english";
                if (!isToday && !isCompleted) {
                    if (dayOfWeek === 0) textStyle += " text-rose-500";
                    else if (dayOfWeek === 6) textStyle += " text-blue-500";
                }

                const cardHTML = `
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        <span class="${textStyle}">${day}</span>
                        ${indicatorHTML}
                    </div>
                `;
                grid.innerHTML += cardHTML;
            }

            // Animate number change
            const completedEl = document.getElementById('summary-completed');
            completedEl.innerText = completedThisMonth;
            completedEl.classList.add('scale-150', 'text-yellow-200');
            setTimeout(() => completedEl.classList.remove('scale-150', 'text-yellow-200'), 300);
            
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // --- Dialog & Interaction ---
        
        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const displayDate = getDisplayDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            const dialog = document.getElementById('vocab-dialog');
            const title = document.getElementById('dialog-title');
            const content = document.getElementById('dialog-content');
            const btnComplete = document.getElementById('btn-complete-day');

            title.innerText = `วันที่ ${displayDate}`;

            const vocabList = getRandomVocab();
            content.innerHTML = '';
            
            vocabList.forEach((v, index) => {
                const itemHTML = `
                    <div class="vocab-card p-5 bg-white border-2 border-slate-100 rounded-[2rem] hover:border-pink-300 hover:shadow-xl hover:shadow-pink-100/50 transition-all flex flex-col md:flex-row gap-4 items-start relative overflow-hidden group">
                        
                        <!-- Cute background blob -->
                        <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-purple-50 rounded-full blur-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>

                        <div class="blob-bg text-purple-700 w-14 h-14 rounded-2xl flex items-center justify-center font-extrabold text-xl shrink-0 shadow-sm relative z-10 font-english">
                            ${index + 1}
                        </div>
                        
                        <div class="flex-1 relative z-10 w-full">
                            <div class="flex justify-between items-start w-full">
                                <h4 class="text-xl md:text-2xl font-extrabold text-slate-800 mb-1 flex items-center gap-3 font-thai tracking-wide">
                                    <span class="text-2xl md:text-3xl">${v.icon}</span>
                                    ${v.word}
                                    <button onclick="speakWord('${v.word}')" class="bg-pink-50 text-pink-500 hover:bg-pink-500 hover:text-white p-2 rounded-xl transition-colors shadow-sm" title="ฟังเสียงอ่าน (Google TTS)">
                                        <i class="ph-fill ph-speaker-high text-lg"></i>
                                    </button>
                                </h4>
                            </div>
                            
                            <div class="flex flex-wrap gap-2 mb-3 mt-1">
                                <p class="text-purple-700 font-bold bg-purple-50 inline-block px-3 py-1 rounded-lg text-sm font-thai">${v.meaning}</p>
                                <p class="text-pink-600 font-bold bg-pink-50 inline-block px-3 py-1 rounded-lg text-sm font-english">${v.english}</p>
                            </div>
                            
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative mt-2">
                                <i class="ph-fill ph-quotes text-slate-200 text-4xl absolute -top-2 -left-1"></i>
                                <p class="text-sm md:text-base text-slate-600 relative z-10 font-thai pl-4">
                                    ${v.example}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
                content.innerHTML += itemHTML;
            });

            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-star text-yellow-300 text-xl"></i> ทบทวนเสร็จแล้ว (เยี่ยมมาก!)`;
                btnComplete.className = "px-8 py-3 bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-bold hover:from-teal-500 hover:to-emerald-600 rounded-2xl shadow-lg shadow-teal-500/30 transition-all active:scale-95 flex items-center gap-2 text-lg";
                btnComplete.onclick = closeDialog; 
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle text-xl"></i> ท่องเสร็จแล้ว!`;
                btnComplete.className = "px-8 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold hover:from-purple-600 hover:to-pink-600 rounded-2xl shadow-lg shadow-purple-500/30 transition-all active:scale-95 flex items-center gap-2 text-lg";
                btnComplete.onclick = markDayAsComplete; 
            }

            dialog.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            const dialog = document.getElementById('vocab-dialog');
            dialog.classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedDateString = null;
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                
                // Show cute alert
                const alert = document.createElement('div');
                alert.className = "fixed top-10 left-1/2 transform -translate-x-1/2 bg-white px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 z-[100] animate-bounce font-bold text-slate-800 border-2 border-green-400";
                alert.innerHTML = `<span class="text-2xl">🎉</span> เก่งมาก! สะสมดาวได้อีก 1 ดวง`;
                document.body.appendChild(alert);
                setTimeout(() => alert.remove(), 3000);

                renderCalendar(); 
            }
            closeDialog();
        }

        function speakWord(word) {
            // ใช้ Google Translate TTS API เสียงภาษาไทย
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=th&client=tw-ob`;
            const audio = new Audio(url);
            
            audio.play().catch(error => {
                console.error("ไม่สามารถเล่นเสียงจาก Google TTS ได้:", error);
                // ระบบสำรอง: ใช้เสียงของเบราว์เซอร์หาก API มีปัญหา
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'th-TH'; 
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) {
                closeDialog();
            }
        });
    </script>
</body>
</html>
