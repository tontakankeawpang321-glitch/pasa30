<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Hola España! — Spanish Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Fredoka:wght@400;500;600&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3, .font-english {
            font-family: 'Fredoka', 'Sarabun', sans-serif; 
        }
        .font-target {
            font-family: 'Montserrat', 'Sarabun', sans-serif;
            word-break: keep-all;
        }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff7ed; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        
        /* Hardware Acceleration & Smoother Transitions */
        .calendar-day { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s, color 0.2s; will-change: transform; }
        .calendar-day:active { transform: scale(0.92); }
        
        .vocab-card { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s; will-change: transform; }
        .vocab-card:active { transform: scale(0.96); background-color: #fff7ed; }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        .today-pulse { animation: pulse-gold 2s infinite; }

        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23FEF3C7' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center p-3 md:p-8">

    <div class="w-full max-w-2xl space-y-4">
        
        <!-- Header Section -->
        <div class="bg-white/90 backdrop-blur-md rounded-[2rem] p-5 md:p-8 shadow-xl border border-white">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="text-5xl animate-bounce" style="animation-duration: 4s;">☀️</div>
                    <div>
                        <h1 class="text-2xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-500">
                            Hola Español
                        </h1>
                        <p class="text-slate-500 text-xs font-semibold">ท่องศัพท์สเปนวันละ 20 คำ 💃</p>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-red-500 to-orange-400 p-4 rounded-2xl w-full sm:w-auto flex flex-row sm:flex-col items-center justify-center gap-3 shadow-lg text-white">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-red-100">Progress</p>
                    <div class="flex items-baseline gap-1">
                        <span id="summary-completed" class="text-3xl font-black leading-none">0</span>
                        <span class="text-sm opacity-70">/ <span id="summary-total">30</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/95 rounded-[2rem] p-4 md:p-8 shadow-xl border border-white">
            
            <div class="flex justify-between items-center mb-6">
                <h2 id="month-year-display" class="text-lg md:text-2xl font-black text-slate-800">Month Year</h2>
                <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                    <button onclick="changeMonth(-1)" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white shadow-sm hover:bg-red-500 hover:text-white transition-all">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="changeMonth(1)" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white shadow-sm hover:bg-red-500 hover:text-white transition-all">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1.5 mb-2 text-center font-bold text-slate-300 text-[10px] uppercase">
                <div class="text-red-400">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-orange-400">Sat</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5">
                <!-- Days injected here -->
            </div>
        </div>
        
        <div class="text-center text-slate-400 text-[10px] pb-4">
            <p>💡 กดที่วันที่เพื่อเริ่มเรียนรู้คำศัพท์ใหม่!</p>
        </div>

    </div>

    <!-- Vocab Dialog -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeDialog()"></div>
        
        <div class="relative w-full sm:w-[92%] max-w-2xl bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] shadow-2xl flex flex-col h-[90vh] sm:h-auto sm:max-h-[85vh] overflow-hidden">
            
            <!-- Modal Header -->
            <div class="px-6 py-5 border-b border-slate-50 flex justify-between items-center bg-white shrink-0">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">🐂</div>
                    <div>
                        <h3 id="dialog-title" class="text-lg font-black text-slate-800">วันที่ --/--/----</h3>
                        <p class="text-[10px] text-orange-500 font-bold uppercase">¡Vamos a aprender!</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-400 rounded-full">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            
            <!-- Modal Content -->
            <div id="dialog-content" class="p-4 overflow-y-auto custom-scrollbar flex-1 space-y-4 bg-slate-50/30">
                <!-- Vocab injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="p-6 bg-white border-t border-slate-50 shrink-0">
                <button id="btn-complete-day" class="w-full py-4 bg-gradient-to-r from-red-500 to-orange-500 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="ph-bold ph-check-circle"></i> บันทึกว่าเรียนเสร็จแล้ว
                </button>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        let appState = { completedDates: [] };

        function loadState() {
            const saved = localStorage.getItem('spanish_calendar_mobile_v1');
            if (saved) { appState = JSON.parse(saved); }
        }

        function saveState() {
            localStorage.setItem('spanish_calendar_mobile_v1', JSON.stringify(appState));
        }

        // --- Spanish Vocab Pool (50 Words) ---
        const vocabPool = [
            { word: "Hola (โอ-ลา)", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "¡Hola! ¿Cómo estás? (สวัสดี! เป็นอย่างไรบ้าง?)" },
            { word: "Gracias (กรา-เซียส)", meaning: "ขอบคุณ", english: "Thank you", icon: "🙏", example: "Muchas gracias por tu ayuda. (ขอบคุณมากสำหรับความช่วยเหลือ)" },
            { word: "Por favor (ปอร์ ฟา-บอร์)", meaning: "ได้โปรด / กรุณา", english: "Please", icon: "🥺", example: "Un café, por favor. (ขอกาแฟหนึ่งที่ครับ/ค่ะ)" },
            { word: "Lo siento (โล เซียน-โต)", meaning: "ขอโทษ", english: "I'm sorry", icon: "😔", example: "Lo siento, no puedo ir. (ขอโทษด้วย ฉันไปไม่ได้)" },
            { word: "Adiós (อา-ดิ-ออส)", meaning: "ลาก่อน", english: "Goodbye", icon: "👋", example: "¡Adiós! Hasta mañana. (ลาก่อน เจอกันพรุ่งนี้นะ)" },
            { word: "Sí (ซี)", meaning: "ใช่", english: "Yes", icon: "✅", example: "Sí, quiero ir a España. (ใช่ ฉันอยากไปสเปน)" },
            { word: "No (โน)", meaning: "ไม่", english: "No", icon: "❌", example: "No, gracias. (ไม่ครับ/ค่ะ ขอบคุณ)" },
            { word: "Amigo (อา-มี-โก)", meaning: "เพื่อน", english: "Friend", icon: "🤝", example: "Él es mi mejor amigo. (เขาคือเพื่อนที่ดีที่สุดของฉัน)" },
            { word: "Familia (ฟา-มี-เลีย)", meaning: "ครอบครัว", english: "Family", icon: "🏠", example: "Amo a mi familia. (ฉันรักครอบครัวของฉัน)" },
            { word: "Comida (โค-มี-ดา)", meaning: "อาหาร", english: "Food", icon: "🥘", example: "La comida española es deliciosa. (อาหารสเปนอร่อยมาก)" },
            { word: "Agua (อา-กวา)", meaning: "น้ำ", english: "Water", icon: "💧", example: "Quiero beber agua fresca. (ฉันอยากดื่มน้ำเย็น)" },
            { word: "Baño (บา-นโญ)", meaning: "ห้องน้ำ", english: "Bathroom", icon: "🚽", example: "¿Dónde está el baño? (ห้องน้ำอยู่ที่ไหน?)" },
            { word: "Calle (กา-เย)", meaning: "ถนน", english: "Street", icon: "🛣️", example: "Vivo en esta calle. (ฉันอาศัยอยู่บนถนนเส้นนี้)" },
            { word: "Dinero (ดี-เน-โร)", meaning: "เงิน", english: "Money", icon: "💰", example: "Necesito cambiar dinero. (ฉันต้องแลกเงิน)" },
            { word: "Amor (อา-มอร์)", meaning: "ความรัก", english: "Love", icon: "❤️", example: "El amor lo es todo. (ความรักคือทุกอย่าง)" },
            { word: "Cerveza (เซร์-เบ-ซา)", meaning: "เบียร์", english: "Beer", icon: "🍺", example: "Una cerveza fría, por favor. (ขอเบียร์เย็นๆ หนึ่งแก้วครับ)" },
            { word: "Vino (บี-โน)", meaning: "ไวน์", english: "Wine", icon: "🍷", example: "El vino tinto es muy bueno. (ไวน์แดงนี้ดีมาก)" },
            { word: "Playa (ปลา-ยา)", meaning: "ชายหาด", english: "Beach", icon: "🏖️", example: "Vamos a la playa hoy. (วันนี้พวกเราไปทะเลกันเถอะ)" },
            { word: "Sol (โซล)", meaning: "พระอาทิตย์", english: "Sun", icon: "☀️", example: "Hace mucho sol. (แดดแรงมาก)" },
            { word: "Gato (กา-โต)", meaning: "แมว", english: "Cat", icon: "🐱", example: "El gato duerme mucho. (แมวนอนเยอะมาก)" },
            { word: "Hermoso (เอร์-โม-โซ)", meaning: "สวยงาม", english: "Beautiful", icon: "✨", example: "Es un paisaje hermoso. (มันเป็นทิวทัศน์ที่สวยงาม)" },
            { word: "Pequeño (เป-เก-นโญ)", meaning: "เล็ก", english: "Small", icon: "🤏", example: "Es un regalo pequeño. (มันคือของขวัญชิ้นเล็กๆ)" },
            { word: "Grande (กราน-เด)", meaning: "ใหญ่", english: "Large", icon: "🐘", example: "Esa casa es muy grande. (บ้านหลังนั้นใหญ่มาก)" },
            { word: "Feliz (เฟ-ลิซ)", meaning: "มีความสุข", english: "Happy", icon: "😊", example: "Estoy muy feliz hoy. (วันนี้ฉันมีความสุขมาก)" },
            { word: "Triste (ตรีส-เต)", meaning: "เศร้า", english: "Sad", icon: "😢", example: "No estés triste. (อย่าเศร้าไปเลย)" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            const shuffled = shuffleArray(vocabPool);
            return shuffled.slice(0, Math.min(VOCAB_PER_SESSION, shuffled.length));
        }

        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            const grid = document.getElementById('calendar-grid');
            
            // ใช้ string concatenation แทนการแก้ DOM ซ้ำๆ เพื่อลด Layout Thrashing ทำให้ลื่นขึ้นมาก
            let gridHTML = '';

            for (let i = 0; i < firstDayIndex; i++) {
                gridHTML += `<div class="aspect-square bg-slate-50/50 border border-slate-50 opacity-10 rounded-lg"></div>`;
            }

            let completedThisMonth = 0;
            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                let stateClasses = isCompleted ? "bg-red-50 border-red-100 text-red-500" : 
                                   (isToday ? "bg-orange-500 text-white border-transparent today-pulse" : 
                                   "bg-white border-slate-100 text-slate-600");
                
                gridHTML += `
                    <div class="calendar-day aspect-square flex flex-col items-center justify-center rounded-xl border-2 text-sm font-black ${stateClasses}" onclick="openDayDialog(${year}, ${month}, ${day})">
                        ${day}
                        ${isCompleted ? '<i class="ph-fill ph-check-circle text-[10px] mt-0.5"></i>' : ''}
                    </div>
                `;
            }

            // อัปเดต DOM แค่ครั้งเดียว
            grid.innerHTML = gridHTML;

            document.getElementById('summary-completed').innerText = completedThisMonth;
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);
            document.getElementById('dialog-title').innerText = `${day} ${MONTH_NAMES[month]} ${year}`;

            const content = document.getElementById('dialog-content');
            let contentHTML = '';
            
            getRandomVocab().forEach((v, idx) => {
                const cleanWord = v.word.split(' (')[0];
                contentHTML += `
                    <div class="vocab-card bg-white p-4 rounded-2xl border border-orange-50 shadow-sm flex items-start gap-4 cursor-pointer" onclick="speakWord('${cleanWord}')">
                        <div class="blob-bg w-10 h-10 shrink-0 rounded-xl flex items-center justify-center text-orange-600 font-black text-sm font-english">${idx+1}</div>
                        <!-- ใส่ pointer-events-none เพื่อไม่ให้ลูกกวนการทัช ทำให้กดง่ายขึ้น 100% -->
                        <div class="flex-1 pointer-events-none">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="text-lg font-black font-target">${v.icon} ${v.word}</h4>
                                <div class="w-8 h-8 rounded-full bg-orange-50 flex items-center justify-center text-orange-500">
                                    <i class="ph-fill ph-speaker-high"></i>
                                </div>
                            </div>
                            <div class="flex gap-2 mb-2">
                                <span class="px-2 py-0.5 bg-red-50 text-red-600 text-[10px] font-bold rounded-md">🇹🇭 ${v.meaning}</span>
                            </div>
                            <p class="text-xs text-slate-400 italic font-target">"${v.example}"</p>
                        </div>
                    </div>
                `;
            });

            content.innerHTML = contentHTML;

            const btn = document.getElementById('btn-complete-day');
            btn.innerHTML = isCompleted ? '<i class="ph-bold ph-star"></i> ทบทวนแล้ว' : '<i class="ph-bold ph-check-circle"></i> บันทึกว่าเรียนเสร็จแล้ว';
            btn.onclick = isCompleted ? closeDialog : markDayAsComplete;

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        // --- ปรับปรุงระบบเสียงให้ตรงและไม่ถูกตัด ---
        let cachedSpanishVoice = null;

        function initVoices() {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            // ค้นหาเสียงภาษาสเปนมาแคชไว้ เพื่อให้กดแล้วเสียงออกทันทีไม่ต้องรอประมวลผลใหม่
            cachedSpanishVoice = voices.find(v => v.lang.startsWith('es-ES') || v.lang.startsWith('es'));
        }

        function speakWord(word) {
            // หยุดเสียงเดิมที่กำลังเล่นอยู่ ป้องกันบั๊กบนมือถือ
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            // พยายามใช้ SpeechSynthesis เป็นอันดับแรก เพราะเสถียรกว่าในเบราว์เซอร์มือถือ
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'es-ES'; 
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
                
                // ใช้เสียงที่ Cache ไว้เพื่อลด Latency
                if (cachedSpanishVoice) {
                    utterance.voice = cachedSpanishVoice;
                } else {
                    initVoices();
                    if (cachedSpanishVoice) utterance.voice = cachedSpanishVoice;
                }

                window.speechSynthesis.speak(utterance);
            } else {
                // ถ้าไม่มี ให้ใช้ Google TTS เป็นทางเลือกสำรอง
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=es&client=tw-ob`;
                const audio = new Audio(url);
                audio.play();
            }
        }

        // โหลดเสียงไว้ล่วงหน้า (Chrome ต้องการสิ่งนี้)
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = initVoices;
        }

        // เปลี่ยนจาก window.onload เป็น DOMContentLoaded 
        // เพื่อให้ปฏิทินโหลดขึ้นมาทันที ไม่ต้องรอโหลดฟอนต์หรือไอคอนเสร็จก่อน
        document.addEventListener('DOMContentLoaded', () => { 
            loadState(); 
            renderCalendar(); 
            setTimeout(initVoices, 500); // ดีเลย์โหลดเสียงเพื่อไม่ให้บล็อกการแสดงผลตอนเข้าแอปครั้งแรก
        });
    </script>
</body>
</html>
