<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท่องเวียดนาม — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Fredoka:wght@400;500;600&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            /* พื้นหลังสีเขียวมิ้นต์-ฟ้าพาสเทล สดใสสไตล์เวียดนาม */
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
            background-color: #ecfdf5;
            background-image: radial-gradient(#a7f3d0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        h1, h2, h3, .font-english {
            font-family: 'Fredoka', 'Sarabun', sans-serif; 
        }
        .font-target {
            font-family: 'Be Vietnam Pro', 'Sarabun', sans-serif; /* ฟอนต์รองรับภาษาเวียดนามสวยๆ */
            word-break: keep-all;
        }
        
        /* Custom scrollbar for dialog - โทนเขียวมิ้นต์ */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f0fdf4; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6ee7b7; border-radius: 10px; border: 2px solid #f0fdf4; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #10b981; }
        
        /* Playful animations */
        .calendar-day { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .calendar-day:hover { transform: translateY(-4px) rotate(1deg); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.15), 0 4px 6px -2px rgba(16, 185, 129, 0.1); }
        .calendar-day:active { transform: translateY(0) scale(0.95); }
        
        .vocab-card { transition: all 0.2s ease-in-out; }
        .vocab-card:hover { transform: translateY(-3px) scale(1.01); }

        /* เปลี่ยนสี Blob ให้เป็นสีเขียวพาสเทล */
        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23D1FAE5' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        /* Pulse animation for 'Today' - สีเขียว/ฟ้า */
        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .today-pulse { animation: softPulse 2s infinite; }

        /* Optimize scrolling for mobile modal */
        .modal-scroll {
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="text-slate-800 p-2 sm:p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-4 md:space-y-6">
        
        <!-- Header & Summary Section -->
        <div class="bg-white/80 backdrop-blur-lg rounded-[2rem] p-5 md:p-8 shadow-xl shadow-emerald-100/50 border border-white">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 md:gap-6">
                <!-- Title & Mascot -->
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-4xl md:text-6xl animate-bounce drop-shadow-md" style="animation-duration: 3s;">🐱</div>
                    <div>
                        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500 mb-0.5 md:mb-1 leading-tight">
                            Daily Viet Vocab
                        </h1>
                        <p class="text-slate-500 font-medium text-xs sm:text-sm md:text-base flex items-center gap-1">
                            ท่องศัพท์วันละ 20 คำ กับน้องแมว! 🐱 
                        </p>
                    </div>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-gradient-to-tr from-sky-400 to-teal-400 p-4 md:p-5 rounded-2xl md:rounded-3xl w-full md:w-auto flex items-center gap-4 md:gap-5 shadow-lg shadow-sky-200 text-white transform hover:scale-105 transition-transform duration-300">
                    <div class="bg-white/20 backdrop-blur-sm w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center text-2xl md:text-3xl shadow-inner border border-white/30 shrink-0">
                        ⭐
                    </div>
                    <div>
                        <p class="text-[10px] md:text-xs font-bold uppercase tracking-wider text-sky-50 mb-0.5 md:mb-1">สรุปการเรียนเดือนนี้</p>
                        <p class="text-2xl md:text-3xl font-extrabold leading-none">
                            <span id="summary-completed">0</span>
                            <span class="text-lg md:text-xl font-medium text-sky-100">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/90 backdrop-blur-lg rounded-[2rem] md:rounded-[2.5rem] p-4 sm:p-6 md:p-8 shadow-xl shadow-emerald-100/40 border border-white">
            
            <!-- Calendar Header (Month Navigation) -->
            <div class="flex flex-row justify-between items-center mb-4 md:mb-8 gap-2">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="text-2xl md:text-3xl">📅</div>
                    <h2 id="month-year-display" class="text-xl sm:text-2xl md:text-3xl font-bold text-slate-800 tracking-wide">Month Year</h2>
                </div>
                
                <div class="flex gap-1 md:gap-2 bg-emerald-50 p-1 md:p-1.5 rounded-xl md:rounded-2xl shrink-0">
                    <button onclick="changeMonth(-1)" class="p-2 md:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-emerald-100 hover:text-emerald-600 text-slate-500 transition-all active:scale-95">
                        <i class="ph-bold ph-caret-left text-base md:text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="px-3 md:px-5 py-1 md:py-2 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-emerald-100 hover:text-emerald-600 text-slate-700 font-bold transition-all active:scale-95 text-xs md:text-sm whitespace-nowrap">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 md:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-emerald-100 hover:text-emerald-600 text-slate-500 transition-all active:scale-95">
                        <i class="ph-bold ph-caret-right text-base md:text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3 mb-2 md:mb-3 text-center font-bold text-slate-400 text-[10px] sm:text-xs md:text-sm uppercase tracking-wider">
                <div class="text-rose-500">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-sky-500">Sat</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3">
                <!-- Days will be generated by JS -->
            </div>
        </div>
        
        <!-- Footer info -->
        <div class="text-center text-slate-500 text-xs md:text-sm font-medium pb-4">
            <p>💡 Tip: กดที่วันที่เพื่อเริ่มท่องศัพท์เวียดนามได้เลย! (ลองกดฟังเสียงดูนะ)</p>
        </div>

    </div>

    <!-- Dialog / Modal for Vocabulary -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-teal-900/40 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[95%] sm:w-[90%] max-w-3xl bg-[#f8fafc] rounded-2xl md:rounded-[2.5rem] shadow-2xl flex flex-col max-h-[90dvh] md:max-h-[90vh] overflow-hidden border-2 md:border-4 border-white">
            
            <!-- Modal Header -->
            <div class="px-4 py-3 md:px-8 md:py-6 border-b border-emerald-100 bg-white flex justify-between items-center relative z-10 shrink-0">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-2xl md:text-4xl hidden sm:block">🐱</div>
                    <div>
                        <h3 id="dialog-title" class="text-lg md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 leading-tight">วันที่ --/--/----</h3>
                        <p class="text-xs md:text-sm text-slate-500 md:mt-1 font-medium hidden sm:block">มาเก็บศัพท์เวียดนามเข้าสมองกันเถอะ! (20 คำ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-emerald-500 bg-slate-100 hover:bg-emerald-50 p-2 md:p-3 rounded-full transition-all active:scale-90">
                    <i class="ph-bold ph-x text-lg md:text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable Vocab List) -->
            <div id="dialog-content" class="p-3 sm:p-5 md:p-8 overflow-y-auto custom-scrollbar modal-scroll flex-1 space-y-3 md:space-y-4">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-4 py-3 md:px-8 md:py-5 border-t border-emerald-100 bg-white flex justify-between items-center gap-3 shrink-0">
                <div class="text-2xl md:text-3xl hidden md:block">🎉</div>
                <div class="flex gap-2 md:gap-3 w-full md:w-auto justify-end">
                    <button onclick="closeDialog()" class="px-3 md:px-6 py-2 md:py-3 text-slate-600 font-bold hover:bg-emerald-50 hover:text-emerald-700 rounded-xl md:rounded-2xl transition-colors text-sm md:text-base">
                        ปิดไว้ก่อน
                    </button>
                    <button id="btn-complete-day" class="px-4 md:px-8 py-2 md:py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold hover:from-emerald-600 hover:to-teal-600 rounded-xl md:rounded-2xl shadow-lg shadow-emerald-500/30 transition-all active:scale-95 flex items-center justify-center gap-1 md:gap-2 text-sm md:text-lg flex-1 md:flex-none whitespace-nowrap">
                        <i class="ph-bold ph-check-circle text-lg md:text-xl"></i> <span class="hidden sm:inline">ท่องเสร็จแล้ว!</span><span class="sm:hidden">เสร็จแล้ว!</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & Variables ---
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        // --- State Management (Local Storage) ---
        let appState = {
            completedDates: [] 
        };

        function loadState() {
            // เปลี่ยน Key สำหรับภาษาเวียดนาม
            const saved = localStorage.getItem('vietnamese_calendar_v1');
            if (saved) {
                appState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('vietnamese_calendar_v1', JSON.stringify(appState));
        }

        // --- Vocabulary Pool (ภาษาเวียดนาม) ---

            { word: "Ai? (อาย?)", meaning: "ใคร?", english: "Who?", icon: "👤", example: "Người kia là ai? (คนนั้นคือใคร?)" },
            { word: "Tại sao? (ต๋ายซาว?)", meaning: "ทำไม?", english: "Why?", icon: "🤔", example: "Tại sao bạn không đến? (ทำไมคุณถึงไม่มา?)" },
            { word: "Nhà vệ sinh (หญ่าเหวะซิน)", meaning: "ห้องน้ำ", english: "Toilet", icon: "🚽", example: "Cho hỏi nhà vệ sinh ở đâu? (ขอโทษนะคะ ห้องน้ำไปทางไหน?)" },
            { word: "Chợ (เจอะ)", meaning: "ตลาด", english: "Market", icon: "🛒", example: "Tôi muốn đi chợ. (ฉันอยากไปตลาด)" },
            { word: "Bệnh viện (เบ๊ญเหวี่ยน)", meaning: "โรงพยาบาล", english: "Hospital", icon: "🏥", example: "Gần đây có bệnh viện không? (แถวนี้มีโรงพยาบาลไหม?)" },
            { word: "Sân bay (เซินบัย)", meaning: "สนามบิน", english: "Airport", icon: "✈️", example: "Đưa tôi đến sân bay. (ไปส่งฉันที่สนามบินหน่อย)" },
            { word: "Khách sạn (คั้กซ่าน)", meaning: "โรงแรม", english: "Hotel", icon: "🏨", example: "Khách sạn của bạn tên gì? (โรงแรมของคุณชื่ออะไร?)" },
            { word: "Nhà hàng (หญ่าห่าง)", meaning: "ร้านอาหาร", english: "Restaurant", icon: "🍽️", example: "Nhà hàng này thức ăn rất ngon. (ร้านนี้อาหารอร่อยมาก)" },
            { word: "Tính tiền (ติ๊ญเตี่ยน)", meaning: "เก็บเงิน / เช็คบิล", english: "Check bill", icon: "🧾", example: "Em ơi, tính tiền! (น้องคะ เช็คบิลด้วย!)" },
            { word: "Không hiểu (คงเหียว)", meaning: "ไม่เข้าใจ", english: "Don't understand", icon: "🤷", example: "Tôi không hiểu bạn nói gì. (ฉันไม่เข้าใจที่คุณพูด)" },
            { word: "Nói chậm lại (น๊อยเจิ่มหลาย)", meaning: "พูดช้าลงหน่อย", english: "Speak slowly", icon: "🐢", example: "Xin vui lòng nói chậm lại. (กรุณาพูดช้าลงหน่อยค่ะ)" },
            { word: "Lặp lại (หลับหลาย)", meaning: "พูดซ้ำอีกที", english: "Repeat", icon: "🔁", example: "Bạn có thể lặp lại được không? (คุณช่วยพูดซ้ำอีกทีได้ไหม?)" },
            { word: "Không sao (คงซาว)", meaning: "ไม่เป็นไร", english: "No problem", icon: "👌", example: "Dạ không sao đâu. (ค่ะ ไม่เป็นไรหรอก)" },
            { word: "Chúc ngủ ngon (จุ๊กหงูงอน)", meaning: "ฝันดี / ราตรีสวัสดิ์", english: "Good night", icon: "🌙", example: "Chúc bạn ngủ ngon. (นอนหลับฝันดีนะ)" },
            { word: "Cố lên (ก๊อเลน)", meaning: "สู้ๆ", english: "Fighting", icon: "💪", example: "Cố lên! Bạn làm được mà. (สู้ๆ! คุณทำได้อยู่แล้ว)" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            const shuffled = shuffleArray(vocabPool);
            return shuffled.slice(0, Math.min(VOCAB_PER_SESSION, shuffled.length));
        }

        // --- Calendar Logic ---
        
        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getDisplayDateString(year, month, day) {
            return `${day} ${MONTH_NAMES[month]} ${year}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="p-1 sm:p-2 md:p-4 rounded-xl md:rounded-[1.5rem] bg-emerald-50/30 border border-dashed border-emerald-200 opacity-40"></div>`;
            }

            let completedThisMonth = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                let baseClasses = "calendar-day relative flex flex-col items-center justify-center p-1.5 sm:p-3 md:p-5 rounded-xl md:rounded-[1.5rem] border-2 cursor-pointer select-none min-h-[60px] sm:min-h-[80px] md:min-h-[110px]";
                
                let stateClasses = "";
                let indicatorHTML = "";

                if (isCompleted) {
                    stateClasses = "bg-amber-50 border-amber-200 text-amber-800 shadow-sm";
                    indicatorHTML = `
                        <div class="absolute -top-1 -right-1 md:-top-2 md:-right-2 w-5 h-5 md:w-7 md:h-7 bg-white rounded-full shadow border border-amber-200 flex items-center justify-center text-[10px] md:text-sm z-10 animate-bounce" style="animation-duration: 2s;">🌟</div>
                        <i class="ph-fill ph-check-circle text-amber-400 text-xl md:text-3xl mt-0.5 md:mt-1 opacity-60"></i>
                    `;
                } else if (isToday) {
                    stateClasses = "bg-gradient-to-b from-emerald-400 to-teal-500 border-transparent text-white shadow-md md:shadow-lg shadow-emerald-500/40 today-pulse";
                    indicatorHTML = `
                        <span class="text-[8px] sm:text-[10px] md:text-xs font-bold bg-white/20 px-1.5 sm:px-3 py-0.5 sm:py-1 rounded-full mt-1 md:mt-2 backdrop-blur-sm text-white">วันนี้</span>
                    `;
                } else {
                    stateClasses = "bg-white border-slate-100 text-slate-600 hover:border-emerald-300";
                    indicatorHTML = `<i class="ph-duotone ph-book-open text-slate-200 text-lg md:text-3xl mt-0.5 md:mt-1 group-hover:text-emerald-400 transition-colors"></i>`;
                }

                // Check for Sunday/Saturday colors
                const dayOfWeek = new Date(year, month, day).getDay();
                let textStyle = "font-extrabold text-base sm:text-xl md:text-2xl font-english leading-none";
                if (!isToday && !isCompleted) {
                    if (dayOfWeek === 0) textStyle += " text-rose-500";
                    else if (dayOfWeek === 6) textStyle += " text-sky-500";
                }

                const cardHTML = `
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        <span class="${textStyle}">${day}</span>
                        ${indicatorHTML}
                    </div>
                `;
                grid.innerHTML += cardHTML;
            }

            // Animate number change
            const completedEl = document.getElementById('summary-completed');
            completedEl.innerText = completedThisMonth;
            completedEl.classList.add('scale-150', 'text-yellow-200');
            setTimeout(() => completedEl.classList.remove('scale-150', 'text-yellow-200'), 300);
            
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // --- Dialog & Interaction ---
        
        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const displayDate = getDisplayDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            const dialog = document.getElementById('vocab-dialog');
            const title = document.getElementById('dialog-title');
            const content = document.getElementById('dialog-content');
            const btnComplete = document.getElementById('btn-complete-day');

            title.innerText = `วันที่ ${displayDate}`;

            const vocabList = getRandomVocab();
            content.innerHTML = '';
            
            vocabList.forEach((v, index) => {
                // ดึงเฉพาะตัวหนังสือเวียดนามมาใช้เป็นเสียงอ่าน (ตัดส่วนวงเล็บคำอ่านภาษาไทยออก)
                const targetWordOnly = v.word.split(' (')[0];

                const itemHTML = `
                    <div class="vocab-card p-4 md:p-5 bg-white border-2 border-emerald-50 rounded-xl md:rounded-[2rem] hover:border-emerald-300 hover:shadow-xl hover:shadow-emerald-100/50 transition-all flex flex-row gap-3 md:gap-4 items-start relative overflow-hidden group">
                        
                        <!-- Cute background blob -->
                        <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-emerald-50 rounded-full blur-2xl opacity-0 group-hover:opacity-100 transition-opacity hidden md:block"></div>

                        <div class="blob-bg text-emerald-700 w-10 h-10 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center font-extrabold text-lg md:text-xl shrink-0 shadow-sm relative z-10 font-english">
                            ${index + 1}
                        </div>
                        
                        <div class="flex-1 relative z-10 w-full min-w-0">
                            <div class="flex justify-between items-start w-full">
                                <h4 class="text-lg md:text-2xl font-extrabold text-slate-800 mb-1.5 md:mb-2 flex flex-wrap items-center gap-1 md:gap-2 font-target tracking-wide w-full pr-10 md:pr-12 leading-tight">
                                    <span class="text-xl md:text-3xl drop-shadow-sm mr-1 hidden sm:inline-block">${v.icon}</span> 
                                    <span>${v.word}</span>
                                </h4>
                                <button onclick="speakWord('${targetWordOnly}')" class="absolute -top-1 -right-1 md:top-0 md:right-0 bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white p-1.5 md:p-2 rounded-lg md:rounded-xl transition-colors shadow-sm shrink-0" title="ฟังเสียงเวียดนาม">
                                    <i class="ph-fill ph-speaker-high text-base md:text-lg"></i>
                                </button>
                            </div>
                            
                            <div class="flex flex-wrap gap-1.5 md:gap-2 mb-2 md:mb-3">
                                <span class="text-emerald-700 font-bold bg-emerald-50 px-2 py-1 md:px-3 md:py-1.5 rounded md:rounded-lg text-[11px] md:text-sm flex items-center gap-1 border border-emerald-100">
                                    🇹🇭 ${v.meaning}
                                </span>
                                <span class="text-sky-600 font-bold bg-sky-50 px-2 py-1 md:px-3 md:py-1.5 rounded md:rounded-lg text-[11px] md:text-sm flex items-center gap-1 font-english border border-sky-100">
                                    🇬🇧 ${v.english}
                                </span>
                            </div>
                            
                            <div class="bg-teal-50/50 p-2.5 md:p-4 rounded-xl md:rounded-2xl border border-teal-100 relative mt-1.5 md:mt-3">
                                <i class="ph-fill ph-quotes text-emerald-200/50 text-2xl md:text-4xl absolute -top-1 -left-1 md:-top-2 md:-left-1"></i>
                                <p class="text-[13px] md:text-base text-slate-600 relative z-10 font-target pl-3 md:pl-4 leading-relaxed line-clamp-2 md:line-clamp-none">
                                    ${v.example}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
                content.innerHTML += itemHTML;
            });

            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-star text-amber-300 text-lg md:text-xl"></i> <span class="hidden sm:inline">ทบทวนเสร็จแล้ว (เยี่ยมมาก!)</span><span class="sm:hidden">ทบทวนแล้ว!</span>`;
                btnComplete.className = "px-4 md:px-8 py-2 md:py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold hover:from-amber-600 hover:to-orange-600 rounded-xl md:rounded-2xl shadow-lg shadow-amber-500/30 transition-all active:scale-95 flex items-center justify-center gap-1 md:gap-2 text-sm md:text-lg flex-1 md:flex-none whitespace-nowrap";
                btnComplete.onclick = closeDialog; 
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle text-lg md:text-xl"></i> <span class="hidden sm:inline">ท่องเสร็จแล้ว!</span><span class="sm:hidden">เสร็จแล้ว!</span>`;
                btnComplete.className = "px-4 md:px-8 py-2 md:py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold hover:from-emerald-600 hover:to-teal-600 rounded-xl md:rounded-2xl shadow-lg shadow-emerald-500/30 transition-all active:scale-95 flex items-center justify-center gap-1 md:gap-2 text-sm md:text-lg flex-1 md:flex-none whitespace-nowrap";
                btnComplete.onclick = markDayAsComplete; 
            }

            dialog.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            const dialog = document.getElementById('vocab-dialog');
            dialog.classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedDateString = null;
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                
                // Show cute alert
                const alert = document.createElement('div');
                alert.className = "fixed top-10 left-1/2 transform -translate-x-1/2 bg-white px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 z-[100] animate-bounce font-bold text-slate-800 border-2 border-emerald-400";
                alert.innerHTML = `<span class="text-2xl">🎉</span> Tuyệt vời! สะสมดาวได้อีก 1 ดวง`;
                document.body.appendChild(alert);
                setTimeout(() => alert.remove(), 3000);

                renderCalendar(); 
            }
            closeDialog();
        }

        function speakWord(word) {
            // ใช้ Google Translate TTS API สำหรับภาษาเวียดนาม (tl=vi)
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=vi&client=tw-ob`;
            const audio = new Audio(url);
            
            audio.play().catch(error => {
                console.error("ไม่สามารถเล่นเสียงจาก Google TTS ได้:", error);
                // ระบบสำรอง: ใช้เสียงของเบราว์เซอร์
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'vi-VN'; // สำเนียงเวียดนาม
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) {
                closeDialog();
            }
        });
    </script>
</body>
</html>
