<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Русский язык — Daily Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --brand-blue: #1e3a8a;
            --brand-red: #e11d48;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background-color: #f0f5f9;
            background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #ffe4e6 0%, transparent 40%);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* Smooth UI Elements */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        /* Calendar Interactions */
        .calendar-day { 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 1 / 1.05;
        }
        .calendar-day:active { transform: scale(0.9); }

        /* Custom Scrollbar for Modal */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Floating Animation */
        @keyframes float-gentle {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(2deg); }
        }
        .animate-float { animation: float-gentle 4s ease-in-out infinite; }

        /* Modal Animation */
        #vocab-dialog.active .dialog-content {
            transform: translateY(0);
            opacity: 1;
        }
        .dialog-content {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .vocab-card {
            transition: background-color 0.2s, transform 0.1s;
        }
        .vocab-card:active {
            transform: scale(0.98);
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-6 min-h-[100dvh] flex flex-col items-center overflow-x-hidden selection:bg-blue-200">

    <div class="w-full max-w-xl space-y-5 pb-8">
        
        <!-- Header Section -->
        <header class="glass-panel rounded-[2rem] p-5 md:p-7 relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-blue-500/10 rounded-full blur-2xl"></div>
            
            <div class="flex items-center justify-between gap-4 relative z-10">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center text-3xl animate-float border border-slate-100">
                        🐻
                    </div>
                    <div>
                        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900 leading-tight">
                            Daily <span class="text-blue-600">Russian</span>
                        </h1>
                        <p class="text-slate-500 text-xs md:text-sm font-medium mt-0.5 flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                            รัสเซีย 20 คำ/วัน
                        </p>
                    </div>
                </div>

                <div class="bg-white/80 backdrop-blur-md px-4 py-3 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center min-w-[4.5rem]">
                    <p class="text-[9px] font-bold uppercase tracking-wider text-slate-400 mb-1">Status</p>
                    <div class="flex items-baseline gap-0.5">
                        <span id="summary-completed" class="text-xl font-black text-blue-600">0</span>
                        <span class="text-slate-400 text-xs font-bold">/<span id="summary-total">31</span></span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Calendar -->
        <main class="bg-white rounded-[2rem] p-5 md:p-7 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
            
            <!-- Month Controls -->
            <div class="flex justify-between items-center mb-6">
                <h2 id="month-year-display" class="text-xl md:text-2xl font-black text-slate-800 tracking-tight capitalize">Month Year</h2>
                <div class="flex gap-1 bg-slate-100/50 p-1.5 rounded-xl border border-slate-100">
                    <button onclick="changeMonth(-1)" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-500 transition-all active:scale-90">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-3 h-8 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm font-bold text-xs uppercase tracking-wider text-slate-600 transition-all active:scale-90">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white hover:shadow-sm text-slate-500 transition-all active:scale-90">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <!-- Week Header (Mon-Sun format) -->
            <div class="grid grid-cols-7 gap-2 mb-3 text-center font-bold text-slate-400 text-[10px] uppercase tracking-wider">
                <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div class="text-blue-400">Сб</div><div class="text-red-400">Вс</div>
            </div>

            <!-- Days Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 md:gap-2.5">
                <!-- JS generated -->
            </div>
        </main>
        
        <footer class="text-center py-2 opacity-60">
            <p class="text-slate-500 text-xs font-medium flex items-center justify-center gap-1.5">
                <i class="ph-fill ph-magic-wand text-blue-500"></i> แตะที่วันที่เพื่อเริ่มเรียน
            </p>
        </footer>

    </div>

    <!-- Bottom Sheet Modal -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex flex-col justify-end">
        <!-- Backdrop -->
        <div id="dialog-backdrop" class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px] opacity-0 transition-opacity duration-300" onclick="closeDialog()"></div>
        
        <!-- Sheet Content -->
        <div class="dialog-content relative w-full max-w-xl mx-auto bg-white rounded-t-[2.5rem] shadow-2xl flex flex-col max-h-[88dvh]">
            
            <!-- Mobile Pull Indicator -->
            <div class="w-full flex justify-center pt-3 pb-1" onclick="closeDialog()">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
            </div>

            <!-- Modal Header -->
            <div class="px-6 pb-4 pt-2 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-xl">
                        🪆
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Урок на сегодня</p>
                        <h3 id="dialog-title" class="text-lg font-black text-slate-800 leading-none">--/--/----</h3>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors active:scale-90">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            
            <!-- Modal Body (Vocab List) -->
            <div id="dialog-content" class="p-4 md:p-6 overflow-y-auto custom-scrollbar flex-1 space-y-2.5 bg-slate-50/50">
                <!-- Vocab injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="p-5 bg-white border-t border-slate-100 pb-safe">
                <button id="btn-complete-day" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
                    <i class="ph-bold ph-check-circle text-lg"></i> บันทึกการเรียน
                </button>
            </div>
        </div>
    </div>

    <!-- Safe area padding for newer iPhones -->
    <style>
        .pb-safe { padding-bottom: max(1.25rem, env(safe-area-inset-bottom)); }
    </style>

    <script>
        const VOCAB_PER_SESSION = 20;
        // Russian Months
        const MONTH_NAMES = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        let appState = { completedDates: [] };

        // State Management
        function loadState() {
            const saved = localStorage.getItem('russian_vocab_tracker_v1');
            if (saved) { appState = JSON.parse(saved); }
        }

        function saveState() {
            localStorage.setItem('russian_vocab_tracker_v1', JSON.stringify(appState));
        }

        // Russian Vocabulary Data with Pronunciation (50 words)
        const vocabPool = [
            { word: "Здравствуйте", pronunciation: "ซดรา-สตวุย-เตีย", meaning: "สวัสดี (ทางการ)", english: "Hello", icon: "👋", example: "Здравствуйте, как ваши дела?" },
            { word: "Привет", pronunciation: "ปรี-เวียต", meaning: "หวัดดี (ทั่วไป)", english: "Hi", icon: "✌️", example: "Привет! Рад тебя видеть." },
            { word: "Спасибо", pronunciation: "สปา-ซี-บา", meaning: "ขอบคุณ", english: "Thank you", icon: "🙏", example: "Большое спасибо!" },
            { word: "Пожалуйста", pronunciation: "ปา-จาล-สตา", meaning: "กรุณา / ยินดีด้วย", english: "Please / You're welcome", icon: "🤲", example: "Пожалуйста, помогите мне." },
            { word: "Извините", pronunciation: "อิซ-วี-นี-เตีย", meaning: "ขอโทษ / ขออนุญาต", english: "Sorry / Excuse me", icon: "🙇", example: "Извините, где туалет?" },
            { word: "Да", pronunciation: "ดา", meaning: "ใช่", english: "Yes", icon: "✅", example: "Да, я понимаю." },
            { word: "Нет", pronunciation: "เนียต", meaning: "ไม่", english: "No", icon: "❌", example: "Нет, спасибо." },
            { word: "Хорошо", pronunciation: "ฮา-รา-โช", meaning: "ดี / ตกลง", english: "Good / Okay", icon: "👍", example: "Всё очень хорошо." },
            { word: "Плохо", pronunciation: "ปลอ-ฮา", meaning: "แย่", english: "Bad", icon: "👎", example: "Сегодня плохая погода." },
            { word: "Как дела?", pronunciation: "กั๊ก เดีย-ลา?", meaning: "สบายดีไหม?", english: "How are you?", icon: "🤔", example: "Привет, как дела?" },
            { word: "Как вас зовут?", pronunciation: "กั๊ก วาส ซา-วูต?", meaning: "คุณชื่ออะไร?", english: "What is your name?", icon: "👤", example: "Извините, как вас зовут?" },
            { word: "Меня зовут...", pronunciation: "มี-เนีย ซา-วูต...", meaning: "ฉันชื่อ...", english: "My name is...", icon: "🏷️", example: "Меня зовут Анна." },
            { word: "До свидания", pronunciation: "ดา สวี-ดา-เนีย", meaning: "ลาก่อน", english: "Goodbye", icon: "👋", example: "До свидания, до завтра!" },
            { word: "Пока", pronunciation: "ปา-กา", meaning: "บาย", english: "Bye", icon: "🏃", example: "Пока! Увидимся." },
            { word: "Я не понимаю", pronunciation: "ยา นี ปา-นี-มา-ยู", meaning: "ฉันไม่เข้าใจ", english: "I don't understand", icon: "🤷", example: "Извините, я не понимаю." },
            { word: "Где туалет?", pronunciation: "กเดีย ตู-อา-เลียต?", meaning: "ห้องน้ำอยู่ไหน?", english: "Where is the toilet?", icon: "🚽", example: "Скажите, где туалет?" },
            { word: "Сколько это стоит?", pronunciation: "สกอล-กา เอ-ตา สโต-อิต?", meaning: "ราคาเท่าไหร่?", english: "How much?", icon: "💰", example: "Сколько стоит этот кофе?" },
            { word: "Вода", pronunciation: "วา-ดา", meaning: "น้ำ", english: "Water", icon: "💧", example: "Можно воду, пожалуйста?" },
            { word: "Еда", pronunciation: "เย-ดา", meaning: "อาหาร", english: "Food", icon: "🍽️", example: "Эта еда очень вкусная." },
            { word: "Друг", pronunciation: "ดรุก", meaning: "เพื่อน", english: "Friend", icon: "🤝", example: "Он мой лучший друг." },
            { word: "Семья", pronunciation: "ซีม-ยา", meaning: "ครอบครัว", english: "Family", icon: "👨‍👩‍👧‍👦", example: "Я люблю свою семью." },
            { word: "Любовь", pronunciation: "ลยู-บอฟ", meaning: "ความรัก", english: "Love", icon: "❤️", example: "Любовь спасет мир." },
            { word: "Красивый", pronunciation: "กรา-ซี-วึย", meaning: "สวย / หล่อ", english: "Beautiful", icon: "✨", example: "Очень красивый город." },
            { word: "Большой", pronunciation: "บาล-ชอย", meaning: "ใหญ่", english: "Big", icon: "🐘", example: "Это большой дом." },
            { word: "Маленький", pronunciation: "มา-เลียน-กี", meaning: "เล็ก", english: "Small", icon: "🐁", example: "У меня есть маленький кот." },
            { word: "Горячий", pronunciation: "กา-รยา-ชี", meaning: "ร้อน", english: "Hot", icon: "☕", example: "Осторожно, чай горячий." },
            { word: "Холодный", pronunciation: "ฮา-ลอด-นึย", meaning: "หนาว / เย็น", english: "Cold", icon: "❄️", example: "Сегодня холодный день." },
            { word: "Сегодня", pronunciation: "ซี-โวด-เนีย", meaning: "วันนี้", english: "Today", icon: "📅", example: "Сегодня хорошая погода." },
            { word: "Завтра", pronunciation: "ซาฟ-ตรา", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "🌅", example: "Мы встретимся завтра." },
            { word: "Вчера", pronunciation: "ฟชี-รา", meaning: "เมื่อวาน", english: "Yesterday", icon: "🌇", example: "Вчера я был дома." },
            { word: "Утро", pronunciation: "อู-ตรา", meaning: "ตอนเช้า", english: "Morning", icon: "☀️", example: "Доброе утро!" },
            { word: "Ночь", pronunciation: "นอช", meaning: "กลางคืน", english: "Night", icon: "🌙", example: "Спокойной ночи." },
            { word: "Время", pronunciation: "วเรีย-เมีย", meaning: "เวลา", english: "Time", icon: "⌚", example: "У меня нет времени." },
            { word: "Деньги", pronunciation: "เดียน-กี", meaning: "เงิน", english: "Money", icon: "💵", example: "Где мои деньги?" },
            { word: "Работа", pronunciation: "รา-โบ-ตา", meaning: "งาน", english: "Work", icon: "💼", example: "Я иду на работу." },
            { word: "Дом", pronunciation: "ดอม", meaning: "บ้าน", english: "Home", icon: "🏠", example: "Я хочу пойти домой." },
            { word: "Город", pronunciation: "โก-รัด", meaning: "เมือง", english: "City", icon: "🏙️", example: "Москва - большой город." },
            { word: "Страна", pronunciation: "สตรา-นา", meaning: "ประเทศ", english: "Country", icon: "🗺️", example: "Россия - красивая страна." },
            { word: "Мир", pronunciation: "มีร์", meaning: "โลก / สันติภาพ", english: "World / Peace", icon: "🌍", example: "Мир во всем мире." },
            { word: "Счастливый", pronunciation: "ชัส-ลี-วึย", meaning: "มีความสุข", english: "Happy", icon: "😄", example: "Я очень счастливый человек." },
            { word: "Грустный", pronunciation: "กรุส-นึย", meaning: "เศร้า", english: "Sad", icon: "😢", example: "Почему ты грустный?" },
            { word: "Вкусный", pronunciation: "ฟกุส-นึย", meaning: "อร่อย", english: "Delicious", icon: "😋", example: "Очень вкусный торт!" },
            { word: "Быстро", pronunciation: "บึย-สตรา", meaning: "เร็ว", english: "Fast", icon: "🚀", example: "Он бегает очень быстро." },
            { word: "Медленно", pronunciation: "เมียด-เลียน-นา", meaning: "ช้า", english: "Slow", icon: "🐢", example: "Пожалуйста, говорите медленно." },
            { word: "Открыто", pronunciation: "อัต-กรึย-ตา", meaning: "เปิด", english: "Open", icon: "🔓", example: "Магазин открыт." },
            { word: "Закрыто", pronunciation: "ซา-กรึย-ตา", meaning: "ปิด", english: "Closed", icon: "🔒", example: "Извините, мы закрыты." },
            { word: "Магазин", pronunciation: "มา-กา-ซีน", meaning: "ร้านค้า", english: "Shop", icon: "🛒", example: "Я иду в магазин." },
            { word: "Помогите", pronunciation: "ปา-มา-กี-เตีย", meaning: "ช่วยด้วย", english: "Help", icon: "🆘", example: "Помогите мне, пожалуйста!" },
            { word: "Кошка", pronunciation: "กอช-กา", meaning: "แมว", english: "Cat", icon: "🐈", example: "Моя кошка спит." },
            { word: "Собака", pronunciation: "ซา-บา-กา", meaning: "หมา", english: "Dog", icon: "🐕", example: "Это моя собака." }
        ];

        function shuffle(a) {
            let s = [...a];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            // Adjust for Monday-first week
            let firstDay = new Date(year, month, 1).getDay();
            firstDay = firstDay === 0 ? 6 : firstDay - 1; 

            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Empty cells
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="rounded-2xl bg-slate-50 opacity-40"></div>`;
            }

            let completedCount = 0;
            for (let d = 1; d <= lastDate; d++) {
                const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isDone = appState.completedDates.includes(ds);
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isDone) completedCount++;

                let cls = "calendar-day relative flex flex-col items-center justify-center rounded-2xl cursor-pointer select-none overflow-hidden ";
                let inner = `<span class="text-base md:text-lg font-bold z-10">${d}</span>`;

                if (isDone) {
                    cls += " bg-blue-50 text-blue-700 border border-blue-200 shadow-sm";
                    inner += `<div class="absolute -bottom-1 -right-1 opacity-20 text-3xl z-0"><i class="ph-fill ph-check-circle"></i></div>`;
                    inner += `<div class="absolute bottom-1 w-1.5 h-1.5 rounded-full bg-blue-500"></div>`;
                } else if (isToday) {
                    cls += " bg-blue-600 text-white shadow-md shadow-blue-500/30 font-black";
                } else {
                    cls += " bg-white border border-slate-100 text-slate-600 hover:border-blue-200 hover:bg-slate-50";
                }

                grid.innerHTML += `<div class="${cls}" onclick="openDayDialog(${year}, ${month}, ${d})">${inner}</div>`;
            }

            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = lastDate;
        }

        function changeMonth(dir) { 
            currentDate.setMonth(currentDate.getMonth() + dir); 
            renderCalendar(); 
        }
        
        function goToToday() { 
            currentDate = new Date(); 
            renderCalendar(); 
        }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            
            // Use date string as seed to keep vocab consistent for the day (optional logic, using random shuffle for now)
            const list = shuffle(vocabPool).slice(0, VOCAB_PER_SESSION);
            
            content.innerHTML = list.map((v) => `
                <div class="vocab-card bg-white p-3.5 rounded-2xl border border-slate-100 flex gap-3.5 items-center shadow-sm">
                    <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center text-2xl shrink-0 border border-slate-100">
                        ${v.icon}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start mb-1">
                            <div class="min-w-0 pr-2 flex-1">
                                <h4 class="font-bold text-slate-900 text-[15px] truncate leading-tight">${v.word}</h4>
                                <p class="text-[11px] text-blue-600 font-medium mt-0.5 truncate">[ ${v.pronunciation} ]</p>
                            </div>
                            <button onclick="speak('${v.word}')" class="text-blue-500 bg-blue-50 p-1.5 rounded-full active:scale-90 transition-transform shrink-0 mt-0.5">
                                <i class="ph-fill ph-speaker-high"></i>
                            </button>
                        </div>
                        <p class="text-[11px] text-slate-500 font-semibold mb-1.5 truncate">
                            <span class="text-slate-400">TH</span> ${v.meaning} <span class="text-slate-300 mx-1">|</span> <span class="text-slate-400">EN</span> ${v.english}
                        </p>
                        <p class="text-[10px] text-slate-400 truncate bg-slate-50 inline-block px-1.5 py-0.5 rounded-md">
                            ${v.example}
                        </p>
                    </div>
                </div>
            `).join('');

            const btn = document.getElementById('btn-complete-day');
            if (isDone) {
                btn.innerHTML = `<i class="ph-bold ph-check-all text-lg"></i> ทบทวนแล้ว`;
                btn.className = "w-full py-4 bg-emerald-500 text-white font-bold rounded-2xl shadow-lg shadow-emerald-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider";
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-check-circle text-lg"></i> บันทึกการเรียน`;
                btn.className = "w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider";
                btn.onclick = markComplete;
            }

            // Animate Modal In
            const dialog = document.getElementById('vocab-dialog');
            const backdrop = document.getElementById('dialog-backdrop');
            
            dialog.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity/transform
            setTimeout(() => {
                dialog.classList.add('active');
                backdrop.classList.remove('opacity-0');
            }, 10);
            
            document.body.style.overflow = 'hidden';
            content.scrollTop = 0;
        }

        function closeDialog() {
            const dialog = document.getElementById('vocab-dialog');
            const backdrop = document.getElementById('dialog-backdrop');
            
            dialog.classList.remove('active');
            backdrop.classList.add('opacity-0');
            
            setTimeout(() => {
                dialog.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300); // match transition duration
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speak(text) {
            // Google Translate TTS with Russian language (tl=ru)
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=ru&client=tw-ob`;
            const audio = new Audio(url);
            
            audio.play().catch(() => {
                // Fallback to Web Speech API
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'ru-RU'; 
                    window.speechSynthesis.speak(u);
                }
            });
        }

        window.onload = () => { 
            loadState(); 
            renderCalendar(); 
        };
    </script>
</body>
</html>
