<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ท่องศัพท์ตุรกี — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fff1f2 0%, #ffedd5 100%);
            background-color: #fff1f2;
            background-image: radial-gradient(#fecdd3 1px, transparent 1px);
            background-size: 20px 20px;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3, .font-english, .font-target {
            font-family: 'Outfit', 'Sarabun', sans-serif; 
        }
        .font-target {
            /* ป้องกันคำยาวทะลุกรอบบนมือถือ */
            word-break: break-word;
        }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fb7185; border-radius: 10px; }
        
        /* Animations */
        .calendar-day { 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease, border-color 0.2s ease, background-color 0.2s ease; 
            will-change: transform;
        }
        @media (hover: hover) {
            .calendar-day:hover { transform: translateY(-2px) rotate(1deg); box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.15); }
            .vocab-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(254, 205, 211, 0.5); }
        }
        .calendar-day:active { transform: translateY(0) scale(0.95); }
        .vocab-card { transition: transform 0.2s ease; will-change: transform; }

        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23FFE4E6' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.3); }
            70% { box-shadow: 0 0 0 6px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .today-pulse { animation: softPulse 2s infinite; }

        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Safe area padding สำหรับ iPhone X ขึ้นไป */
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>
<body class="text-slate-800 p-2 sm:p-4 md:p-8 pb-20 sm:pb-28 min-h-[100dvh] flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-3 sm:space-y-6">
        
        <!-- Header & Summary Section -->
        <div class="bg-white/90 backdrop-blur-md rounded-[1.5rem] md:rounded-[2rem] p-4 sm:p-6 md:p-8 shadow-lg shadow-rose-100/50 border border-white">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-6">
                <!-- Title & Mascot -->
                <div class="flex items-center gap-3 md:gap-4 w-full sm:w-auto">
                    <div class="text-3xl sm:text-5xl md:text-6xl animate-bounce drop-shadow-md shrink-0" style="animation-duration: 3s;">🎈</div>
                    <div>
                        <h1 class="text-xl sm:text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-rose-600 to-orange-500 mb-0.5 md:mb-1 leading-tight">
                            Daily Turkish Vocab
                        </h1>
                        <p class="text-slate-500 font-medium text-[11px] sm:text-sm md:text-base flex items-center gap-1">
                            ท่องศัพท์วันละ 20 คำ บินลัดฟ้าสู่ตุรกี! 🇹🇷 
                        </p>
                    </div>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-gradient-to-tr from-rose-500 to-amber-500 p-3 sm:p-4 md:p-5 rounded-2xl md:rounded-3xl w-full sm:w-auto flex items-center gap-3 md:gap-5 shadow-md shadow-rose-200 text-white">
                    <div class="bg-white/20 backdrop-blur-sm w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center text-xl sm:text-2xl md:text-3xl shadow-inner border border-white/30 shrink-0" title="Nazar (Evil Eye)">
                        🧿
                    </div>
                    <div>
                        <p class="text-[9px] sm:text-xs font-bold uppercase tracking-wider text-rose-50 mb-0.5">สรุปการเรียนเดือนนี้</p>
                        <p class="text-xl sm:text-3xl font-extrabold leading-none">
                            <span id="summary-completed">0</span>
                            <span class="text-sm sm:text-xl font-medium text-rose-100">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/95 backdrop-blur-md rounded-[1.5rem] md:rounded-[2.5rem] p-3 sm:p-6 md:p-8 shadow-lg shadow-rose-100/40 border border-white">
            
            <!-- Calendar Header -->
            <div class="flex flex-row justify-between items-center mb-4 sm:mb-6 md:mb-8 gap-2">
                <div class="flex items-center gap-1.5 md:gap-3">
                    <div class="text-xl sm:text-3xl">📅</div>
                    <h2 id="month-year-display" class="text-lg sm:text-2xl md:text-3xl font-bold text-slate-800 tracking-wide leading-none">Month Year</h2>
                </div>
                
                <div class="flex gap-1 sm:gap-2 bg-rose-50 p-1 md:p-1.5 rounded-xl md:rounded-2xl shrink-0">
                    <button onclick="changeMonth(-1)" class="p-1.5 sm:p-2 md:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-rose-100 text-slate-500 transition-colors active:scale-95">
                        <i class="ph-bold ph-caret-left text-sm sm:text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="px-2.5 sm:px-4 md:px-5 py-1.5 sm:py-2 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-rose-100 text-slate-700 font-bold transition-colors active:scale-95 text-[10px] sm:text-sm">
                        <span class="hidden sm:inline">กลับมาวันนี้</span>
                        <span class="sm:hidden">วันนี้</span>
                    </button>
                    <button onclick="changeMonth(1)" class="p-1.5 sm:p-2 md:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-rose-100 text-slate-500 transition-colors active:scale-95">
                        <i class="ph-bold ph-caret-right text-sm sm:text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3 mb-2 sm:mb-3 text-center font-bold text-slate-400 text-[9px] sm:text-xs md:text-sm uppercase tracking-wider">
                <div class="text-rose-500">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-sky-500">Sat</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3">
                <!-- Days will be generated by JS -->
            </div>
        </div>
        
        <!-- Footer info -->
        <div class="text-center text-slate-500 text-[10px] sm:text-sm font-medium pb-4">
            <p>💡 Tip: กดที่วันที่เพื่อเริ่มท่องศัพท์ (ลองกดฟังเสียงดูนะ)</p>
        </div>

    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-rose-100 shadow-[0_-8px_20px_-15px_rgba(225,29,72,0.2)] z-40 pb-[env(safe-area-inset-bottom)]">
        <div class="flex justify-around items-center h-[68px] sm:h-20 max-w-md mx-auto px-2">
            <!-- Calendar Tab (Active) -->
            <a href="index.html" target="_blank" class="flex flex-col items-center justify-center w-full h-full text-rose-500 transition-colors active:scale-95">
                <i class="ph-fill ph-calendar-blank text-[26px] sm:text-3xl mb-0.5"></i>
                <span class="text-[10px] sm:text-xs font-bold">ปฏิทิน</span>
            </a>
            
            <!-- Chat Tab (Inactive) -->
            <a href="chat.html" target="_blank" class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-rose-500 transition-colors active:scale-95 group">
                <i class="ph-bold ph-chats-circle text-[26px] sm:text-3xl mb-0.5 group-hover:scale-110 transition-transform"></i>
                <span class="text-[10px] sm:text-xs font-bold">คุยสนทนา</span>
            </a>
        </div>
    </nav>

    <!-- Dialog / Modal for Vocabulary -->
    <!-- เปลี่ยนจาก items-center เป็น items-end ในจอมือถือ เพื่อให้แอนิเมชันเนียนตา และเปลี่ยน h เป็น 100dvh -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center sm:p-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-rose-950/60 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div id="modal-content-box" class="relative w-full sm:max-w-3xl h-[100dvh] sm:h-auto sm:max-h-[90dvh] bg-[#f8fafc] rounded-t-[1.5rem] sm:rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden sm:border-4 border-white opacity-0">
            
            <!-- Modal Header -->
            <div class="px-4 sm:px-6 md:px-8 py-3 sm:py-5 border-b border-rose-100 bg-white flex justify-between items-center relative z-10 shrink-0">
                <div class="flex items-center gap-2 sm:gap-4">
                    <div class="text-2xl sm:text-4xl">☕</div>
                    <div>
                        <h3 id="dialog-title" class="text-base sm:text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-rose-600 to-amber-500 leading-tight">วันที่ --/--/----</h3>
                        <p class="text-[10px] sm:text-sm text-slate-500 mt-0.5 font-medium">เก็บศัพท์ตุรกีเข้าสมอง (20 คำ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-rose-500 bg-slate-50 hover:bg-rose-50 p-2 sm:p-3 rounded-full transition-colors active:scale-90 shrink-0">
                    <i class="ph-bold ph-x text-base sm:text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div id="dialog-content" class="p-3 sm:p-6 md:p-8 overflow-y-auto custom-scrollbar flex-1 space-y-3 sm:space-y-4">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer (รองรับ Safe Area บนมือถือ) -->
            <div class="px-4 sm:px-6 md:px-8 pt-3 pb-4 sm:py-5 border-t border-rose-100 bg-white flex justify-between items-center gap-2 shrink-0 safe-pb">
                <div class="text-2xl sm:text-3xl hidden sm:block">🇹🇷</div>
                <div class="flex gap-2 sm:gap-3 w-full sm:w-auto justify-end">
                    <button onclick="closeDialog()" class="px-3 sm:px-6 py-2.5 sm:py-3 text-slate-500 font-bold bg-slate-50 hover:bg-rose-50 hover:text-rose-700 rounded-xl sm:rounded-2xl transition-colors text-xs sm:text-base whitespace-nowrap active:scale-95">
                        ปิดไว้ก่อน
                    </button>
                    <button id="btn-complete-day" class="flex-1 sm:flex-none justify-center px-4 sm:px-8 py-2.5 sm:py-3 bg-gradient-to-r from-rose-500 to-amber-500 text-white font-bold hover:from-rose-600 hover:to-amber-600 rounded-xl sm:rounded-2xl shadow-md sm:shadow-lg shadow-rose-500/30 transition-all active:scale-95 flex items-center gap-1.5 text-sm sm:text-lg whitespace-nowrap">
                        <i class="ph-bold ph-check-circle text-base sm:text-xl"></i> <span>ท่องเสร็จแล้ว!</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        let appState = { completedDates: [] };

        function loadState() {
            const saved = localStorage.getItem('turkish_calendar_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('turkish_calendar_v1', JSON.stringify(appState));
        }

        const vocabPool = [

            { word: "Özür dilerim (โอซูร์ ดิเลริม)", meaning: "ขอโทษ", english: "Sorry", icon: "🥺", example: "Geç kaldığım için özür dilerim. (ขอโทษที่มาสาย)" },
            { word: "Evet (เอเวต)", meaning: "ใช่", english: "Yes", icon: "👍", example: "Evet, anlıyorum. (ใช่ ฉันเข้าใจ)" },
            { word: "Hayır (ฮายือร์)", meaning: "ไม่", english: "No", icon: "👎", example: "Hayır, teşekkürler. (ไม่ ขอบคุณ)" },
            { word: "Hoşça kal (โฮชชา คัล)", meaning: "ลาก่อน", english: "Goodbye", icon: "👋", example: "Hoşça kal, sonra görüşürüz. (ลาก่อน ไว้เจอกันใหม่)" },
            { word: "Ne kadar? (เน คาดาร์)", meaning: "เท่าไหร่?", english: "How much?", icon: "💰", example: "Bu ne kadar? (อันนี้ราคาเท่าไหร่?)" },
            { word: "Çok pahalı (ชค พาฮาลึ)", meaning: "แพงมาก", english: "Too exp.", icon: "💸", example: "Bu çok pahalı! (อันนี้แพงมาก!)" },
            { word: "Ucuz (อูจุซ)", meaning: "ถูก", english: "Cheap", icon: "🏷️", example: "Burası çok ucuz. (ที่นี่ราคาถูกมาก)" },
            { word: "Adın ne? (อาดูน เนะ?)", meaning: "คุณชื่ออะไร?", english: "Name?", icon: "📛", example: "Afedersiniz, adın ne? (ขอโทษนะ คุณชื่ออะไร?)" },
            { word: "Benim adım... (เบนิม อาดึม...)", meaning: "ฉันชื่อ...", english: "My name is", icon: "👤", example: "Benim adım Ali. (ฉันชื่ออาลี)" },

            { word: "Çok lezzetli (ชค เลซเซตลี)", meaning: "อร่อยมาก", english: "Delicious", icon: "😋", example: "Bu yemek çok lezzetli! (อาหารจานนี้อร่อยมาก!)" },
            { word: "Su (ซู)", meaning: "น้ำ", english: "Water", icon: "💧", example: "Bir bardak su lütfen. (ขอน้ำหนึ่งแก้ว)" },
            { word: "Kahve (คาห์เว)", meaning: "กาแฟ", english: "Coffee", icon: "☕", example: "Türk kahvesi seviyorum. (ฉันชอบกาแฟตุรกี)" },

            { word: "Soğuk (โซอุก)", meaning: "หนาว", english: "Cold", icon: "🥶", example: "Dışarısı çok soğuk. (ข้างนอกหนาวมาก)" },

            { word: "Üzgün (อูซกุน)", meaning: "เศร้า", english: "Sad", icon: "😢", example: "Neden üzgünsün? (ทำไมคุณถึงเศร้า?)" },
            { word: "Bekle (เบคเล)", meaning: "รอสักครู่", english: "Wait", icon: "⏱️", example: "Lütfen bir dakika bekle. (กรุณารอสักครู่)" },
            { word: "Yardım et (ยาร์ดึม เอต)", meaning: "ช่วยด้วย", english: "Help me", icon: "🆘", example: "Lütfen bana yardım et! (ได้โปรดช่วยฉันด้วย!)" },
            { word: "Nerede? (เนเรเดะ?)", meaning: "ที่ไหน?", english: "Where?", icon: "📍", example: "Tuvalet nerede? (ห้องน้ำอยู่ไหน?)" },
            { word: "Ne zaman? (เน ซามาน?)", meaning: "เมื่อไหร่?", english: "When?", icon: "📅", example: "Ne zaman gideceksin? (คุณจะไปเมื่อไหร่?)" },
            { word: "Ne? (เนะ?)", meaning: "อะไร?", english: "What?", icon: "❓", example: "Bu ne? (อันนี้คืออะไร?)" },
            { word: "Kim? (คิม?)", meaning: "ใคร?", english: "Who?", icon: "👤", example: "O kim? (คนนั้นคือใคร?)" },
            { word: "Neden? (เนเดน?)", meaning: "ทำไม?", english: "Why?", icon: "🤔", example: "Neden gelmedin? (ทำไมคุณถึงไม่มา?)" },
            { word: "Tuvalet (ทูวาเลต)", meaning: "ห้องน้ำ", english: "Toilet", icon: "🚽", example: "Afedersiniz, tuvalet nerede? (ขอโทษนะคะ ห้องน้ำไปทางไหน?)" },
            { word: "Pazar (พาซาร์)", meaning: "ตลาด", english: "Market", icon: "🛒", example: "Pazara gitmek istiyorum. (ฉันอยากไปตลาด)" },
            { word: "Hastane (ฮาสทาเน)", meaning: "โรงพยาบาล", english: "Hospital", icon: "🏥", example: "Yakında hastane var mı? (แถวนี้มีโรงพยาบาลไหม?)" },
            { word: "Havalimanı (ฮาวาลิมานู)", meaning: "สนามบิน", english: "Airport", icon: "✈️", example: "Beni havalimanına götür. (ไปส่งฉันที่สนามบิน)" },
            { word: "Otel (โอเทล)", meaning: "โรงแรม", english: "Hotel", icon: "🏨", example: "Otelinizin adı ne? (โรงแรมของคุณชื่ออะไร?)" },
            { word: "Restoran (เรสโตราน)", meaning: "ร้านอาหาร", english: "Restaurant", icon: "🍽️", example: "Bu restoran çok iyi. (ร้านอาหารนี้ดีมาก)" },
            { word: "Hesap lütfen (เฮซัป ลุตเฟน)", meaning: "เช็คบิลด้วย", english: "Check bill", icon: "🧾", example: "Hesap lütfen! (เช็คบิลด้วยครับ/ค่ะ!)" },
            { word: "Anlamıyorum (อันลามึยอรุม)", meaning: "ไม่เข้าใจ", english: "No idea", icon: "🤷", example: "Ne dediğini anlamıyorum. (ฉันไม่เข้าใจสิ่งที่คุณพูด)" },
            { word: "Yavaş konuş (ยาวาช โคนุช)", meaning: "พูดช้าๆ", english: "Speak slow", icon: "🐢", example: "Lütfen yavaş konuşun. (กรุณาพูดช้าลงหน่อยค่ะ)" },
            { word: "Tekrar et (เทคราร์ เอต)", meaning: "พูดซ้ำอีกที", english: "Repeat", icon: "🔁", example: "Tekrar edebilir misin? (คุณช่วยพูดซ้ำได้ไหม?)" },
            { word: "Sorun değil (โซรุน เดอิล)", meaning: "ไม่เป็นไร", english: "No problem", icon: "👌", example: "Önemli değil, sorun değil. (ไม่สำคัญหรอก ไม่เป็นไร)" },
            { word: "İyi geceler (อียิ เกเจเลร์)", meaning: "ฝันดี", english: "Good night", icon: "🌙", example: "İyi geceler, tatlı rüyalar. (ฝันดีนะ ฝันหวาน)" },
            { word: "Başarılar (บาชารึลาร์)", meaning: "สู้ๆ / โชคดี", english: "Good luck", icon: "💪", example: "Sınavda başarılar! (ขอให้โชคดีในการสอบนะ!)" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            const grid = document.getElementById('calendar-grid');
            
            let htmlBuffer = [];

            for (let i = 0; i < firstDayIndex; i++) {
                htmlBuffer.push(`<div class="p-1 sm:p-3 rounded-lg sm:rounded-2xl bg-rose-50/30 border border-dashed border-rose-200 opacity-40"></div>`);
            }

            let completedThisMonth = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                let baseClasses = "calendar-day relative flex flex-col items-center justify-center p-1 sm:p-3 rounded-lg sm:rounded-2xl border-2 cursor-pointer select-none min-h-[50px] sm:min-h-[85px] md:min-h-[100px]";
                
                let stateClasses = "";
                let indicatorHTML = "";

                if (isCompleted) {
                    stateClasses = "bg-amber-50 border-amber-200 text-amber-800 shadow-sm";
                    indicatorHTML = `
                        <div class="absolute -top-1.5 -right-1.5 sm:-top-2 sm:-right-2 w-4 h-4 sm:w-6 sm:h-6 bg-white rounded-full shadow border border-amber-200 flex items-center justify-center text-[8px] sm:text-xs z-10 animate-bounce" style="animation-duration: 2s;">🌟</div>
                        <i class="ph-fill ph-check-circle text-amber-500 text-sm sm:text-2xl mt-0.5 opacity-60"></i>
                    `;
                } else if (isToday) {
                    stateClasses = "bg-gradient-to-b from-rose-500 to-orange-400 border-transparent text-white shadow-md today-pulse";
                    indicatorHTML = `<span class="text-[7px] sm:text-[10px] font-bold bg-white/20 px-1.5 sm:px-2 py-0.5 rounded-full mt-1 backdrop-blur-sm text-white leading-none">วันนี้</span>`;
                } else {
                    stateClasses = "bg-white border-slate-100 text-slate-600 hover:border-rose-300";
                    indicatorHTML = `<i class="ph-duotone ph-book-open text-slate-200 text-sm sm:text-xl mt-0.5 group-hover:text-rose-400 transition-colors"></i>`;
                }

                const dayOfWeek = new Date(year, month, day).getDay();
                let textStyle = "font-extrabold text-sm sm:text-xl md:text-2xl font-english leading-none";
                if (!isToday && !isCompleted) {
                    if (dayOfWeek === 0) textStyle += " text-rose-500";
                    else if (dayOfWeek === 6) textStyle += " text-sky-500";
                }

                htmlBuffer.push(`
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        <span class="${textStyle}">${day}</span>
                        ${indicatorHTML}
                    </div>
                `);
            }

            grid.innerHTML = htmlBuffer.join('');

            const completedEl = document.getElementById('summary-completed');
            completedEl.innerText = completedThisMonth;
            completedEl.classList.add('scale-125', 'text-yellow-200');
            setTimeout(() => completedEl.classList.remove('scale-125', 'text-yellow-200'), 200);
            
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            document.getElementById('dialog-title').innerText = `วันที่ ${day} ${MONTH_NAMES[month]}`;

            const vocabList = shuffleArray(vocabPool).slice(0, Math.min(VOCAB_PER_SESSION, vocabPool.length));
            let vocabHtmlBuffer = [];
            
            vocabList.forEach((v, index) => {
                const targetWordOnly = v.word.split(' (')[0];

                vocabHtmlBuffer.push(`
                    <div class="vocab-card p-3 sm:p-5 bg-white border border-rose-100 rounded-xl sm:rounded-2xl flex flex-row gap-2.5 sm:gap-4 items-start relative">
                        <div class="blob-bg text-rose-700 w-8 h-8 sm:w-12 sm:h-12 rounded-lg flex items-center justify-center font-extrabold text-sm sm:text-xl shrink-0 shadow-sm font-english">
                            ${index + 1}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2">
                                <h4 class="text-[14px] sm:text-xl font-extrabold text-slate-800 mb-1.5 flex items-start gap-1.5 font-target leading-tight">
                                    <span class="text-base sm:text-2xl drop-shadow-sm shrink-0">${v.icon}</span> 
                                    <span>${v.word}</span>
                                </h4>
                                <button onclick="speakWord('${targetWordOnly}')" class="shrink-0 bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white p-1.5 sm:p-2 rounded-lg transition-colors shadow-sm" title="ฟังเสียง">
                                    <i class="ph-fill ph-speaker-high text-sm sm:text-lg"></i>
                                </button>
                            </div>
                            
                            <div class="flex flex-wrap gap-1.5 mb-2">
                                <span class="text-rose-700 font-bold bg-rose-50 px-2 py-0.5 sm:py-1 rounded-md text-[10px] sm:text-sm border border-rose-100">
                                    🇹🇭 ${v.meaning}
                                </span>
                                <span class="text-sky-600 font-bold bg-sky-50 px-2 py-0.5 sm:py-1 rounded-md text-[10px] sm:text-sm font-english border border-sky-100">
                                    🇬🇧 ${v.english}
                                </span>
                            </div>
                            
                            <div class="bg-orange-50/50 p-2 sm:p-3 rounded-lg border border-orange-50 relative mt-1.5">
                                <i class="ph-fill ph-quotes text-rose-200/50 text-xl sm:text-2xl absolute -top-1 -left-0.5"></i>
                                <p class="text-[11px] sm:text-sm text-slate-600 relative z-10 font-target pl-3 leading-relaxed">
                                    ${v.example}
                                </p>
                            </div>
                        </div>
                    </div>
                `);
            });
            document.getElementById('dialog-content').innerHTML = vocabHtmlBuffer.join('');

            const btnComplete = document.getElementById('btn-complete-day');
            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-star text-amber-300 text-lg"></i> <span>ทบทวนเสร็จแล้ว!</span>`;
                btnComplete.className = "flex-1 sm:flex-none justify-center px-4 sm:px-8 py-2.5 sm:py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold hover:from-amber-600 hover:to-orange-600 rounded-xl sm:rounded-2xl shadow-md transition-all active:scale-95 flex items-center gap-1.5 text-sm sm:text-lg";
                btnComplete.onclick = closeDialog; 
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle text-lg"></i> <span>ท่องเสร็จแล้ว!</span>`;
                btnComplete.className = "flex-1 sm:flex-none justify-center px-4 sm:px-8 py-2.5 sm:py-3 bg-gradient-to-r from-rose-500 to-amber-500 text-white font-bold hover:from-rose-600 hover:to-amber-600 rounded-xl sm:rounded-2xl shadow-md transition-all active:scale-95 flex items-center gap-1.5 text-sm sm:text-lg";
                btnComplete.onclick = markDayAsComplete; 
            }

            const dialog = document.getElementById('vocab-dialog');
            dialog.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
            document.getElementById('dialog-content').scrollTop = 0;
            
            const modalBox = document.getElementById('modal-content-box');
            modalBox.classList.remove('opacity-0');
            modalBox.classList.add('modal-enter');
        }

        function closeDialog() {
            const modalBox = document.getElementById('modal-content-box');
            modalBox.classList.remove('modal-enter');
            modalBox.classList.add('opacity-0');
            
            setTimeout(() => {
                document.getElementById('vocab-dialog').classList.add('hidden');
                document.body.style.overflow = '';
                selectedDateString = null;
            }, 150);
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                
                const alert = document.createElement('div');
                alert.className = "fixed top-8 left-1/2 transform -translate-x-1/2 bg-white px-4 py-2.5 rounded-full shadow-xl flex items-center gap-2 z-[100] animate-bounce font-bold text-slate-800 border-2 border-rose-400 text-xs sm:text-sm whitespace-nowrap";
                alert.innerHTML = `<span class="text-lg">🎉</span> Harika! สะสมดาวได้อีกดวง`;
                document.body.appendChild(alert);
                setTimeout(() => alert.remove(), 2500);

                renderCalendar(); 
            }
            closeDialog();
        }

        let ttsAudio = null;
        function speakWord(word) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=tr&client=tw-ob`;
            if (!ttsAudio) ttsAudio = new Audio();
            ttsAudio.src = url;
            
            ttsAudio.play().catch(error => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'tr-TR'; 
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) closeDialog();
        });
    </script>
</body>
</html>
