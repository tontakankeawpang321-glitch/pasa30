<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Deutsch — Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3, .font-german {
            font-family: 'Montserrat', 'Sarabun', sans-serif; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        .calendar-day { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s; }
        .calendar-day:active { transform: scale(0.92); }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        @keyframes soft-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(99, 102, 241, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .today-pulse { animation: soft-pulse 2s infinite; }
    </style>
</head>
<body class="text-slate-800 p-3 md:p-8 min-h-screen flex flex-col items-center overflow-x-hidden">

    <div class="w-full max-w-3xl space-y-4 md:space-y-6">
        
        <!-- Header Section -->
        <div class="glass-effect rounded-3xl md:rounded-[2.5rem] p-5 md:p-10 shadow-xl shadow-indigo-100/50">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4 md:gap-6 text-center sm:text-left">
                    <div class="text-5xl md:text-7xl drop-shadow-md">🏰</div>
                    <div>
                        <h1 class="text-3xl md:text-5xl font-black text-indigo-950 tracking-tight leading-tight">
                            Daily Deutsch
                        </h1>
                        <p class="text-indigo-600 font-semibold text-sm md:text-lg flex items-center justify-center sm:justify-start gap-1">
                            <i class="ph-bold ph-castle"></i> <span>ท่องศัพท์ในปราสาทเยอรมัน</span>
                        </p>
                    </div>
                </div>

                <!-- Mini Stats for Mobile -->
                <div class="bg-indigo-950 px-5 py-4 rounded-2xl w-full sm:w-auto text-white shadow-lg flex items-center justify-between sm:justify-start gap-4 border-b-4 border-amber-500">
                    <div class="flex items-center gap-3">
                        <div class="bg-amber-500 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-md">
                            <i class="ph-fill ph-crown"></i>
                        </div>
                        <div class="text-left">
                            <p class="text-indigo-200 text-[10px] font-bold uppercase tracking-wider">Progress</p>
                            <p class="text-xl font-black leading-none"><span id="summary-completed">0</span><span class="text-sm text-indigo-300">/30</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="glass-effect rounded-3xl md:rounded-[3rem] p-4 md:p-10 shadow-xl shadow-indigo-100/30">
            <div class="flex flex-col gap-5 mb-6 md:mb-10">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i class="ph-fill ph-calendar-blank text-indigo-600 text-xl md:text-2xl"></i>
                        <h2 id="month-year-display" class="text-xl md:text-3xl font-bold text-slate-900">Month Year</h2>
                    </div>
                    <button onclick="goToToday()" class="px-4 py-2 rounded-xl bg-indigo-50 font-bold text-indigo-600 text-xs uppercase tracking-widest active:bg-indigo-100 transition-colors">
                        Today
                    </button>
                </div>
                
                <div class="flex gap-2 w-full">
                    <button onclick="changeMonth(-1)" class="flex-1 py-3 rounded-xl bg-slate-100 text-slate-600 hover:bg-indigo-600 hover:text-white transition-all active:scale-95">
                        <i class="ph-bold ph-arrow-left"></i>
                    </button>
                    <button onclick="changeMonth(1)" class="flex-1 py-3 rounded-xl bg-slate-100 text-slate-600 hover:bg-indigo-600 hover:text-white transition-all active:scale-95">
                        <i class="ph-bold ph-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1.5 md:gap-5 mb-3 text-center font-bold text-slate-400 text-[10px] md:text-xs uppercase tracking-widest">
                <div class="text-rose-500">So</div>
                <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div>
                <div class="text-indigo-500">Sa</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 md:gap-4">
                <!-- JS content -->
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-xs md:text-sm font-medium">
            💡 แตะที่วันที่เพื่อเปิดอ่านคำศัพท์
        </p>

    </div>

    <!-- Vocab Dialog -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center p-0 md:p-4">
        <div class="absolute inset-0 bg-indigo-950/60 backdrop-blur-sm" onclick="closeDialog()"></div>
        
        <div class="relative w-full h-full md:h-auto md:max-w-2xl bg-white md:rounded-[2.5rem] shadow-2xl flex flex-col max-h-screen md:max-h-[90vh] overflow-hidden">
            <!-- Modal Header -->
            <div class="px-5 py-6 md:px-8 md:py-8 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-20">
                <div class="flex items-center gap-4">
                    <div class="text-4xl">🥨</div>
                    <div>
                        <h3 id="dialog-title" class="text-xl md:text-2xl font-black text-indigo-950">วันที่ --/--/----</h3>
                        <p class="text-xs md:text-sm text-slate-500 font-medium italic">Lerne heute 20 neue Wörter!</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-500 rounded-full active:bg-rose-100 active:text-rose-500 transition-all">
                    <i class="ph-bold ph-x text-lg"></i>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div id="dialog-content" class="p-4 md:p-8 overflow-y-auto custom-scrollbar flex-1 space-y-4 bg-slate-50/50">
                <!-- Vocab injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-5 py-5 md:px-8 md:py-6 bg-white border-t border-slate-100 flex flex-col sm:flex-row justify-end items-center gap-3">
                <button id="btn-complete-day" class="w-full sm:w-auto px-10 py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="ph-bold ph-check-circle text-xl"></i> ท่องจำสำเร็จ!
                </button>
                <button onclick="closeDialog()" class="w-full sm:w-auto py-3 text-slate-400 font-bold text-sm">
                    ปิดหน้าต่าง
                </button>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        let appState = { completedDates: [] };

        function loadState() {
            const saved = localStorage.getItem('german_calendar_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('german_calendar_v1', JSON.stringify(appState));
        }

        const vocabPool = [
            { word: "Hallo", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "Hallo! Wie geht es dir? (สวัสดี! สบายดีไหม?)" },
            { word: "Danke", meaning: "ขอบคุณ", english: "Thank you", icon: "🙏", example: "Vielen Dank für deine Hilfe. (ขอบคุณมากสำหรับความช่วยเหลือ)" },
            { word: "Bitte", meaning: "ขอร้อง/ไม่เป็นไร", english: "Please/Welcome", icon: "✨", example: "Bitte schön! (ด้วยความยินดี!)" },
            { word: "Ja", meaning: "ใช่", english: "Yes", icon: "✅", example: "Ja, das stimmt. (ใช่ นั่นถูกต้องแล้ว)" },
            { word: "Nein", meaning: "ไม่", english: "No", icon: "❌", example: "Nein, danke. (ไม่ครับ ขอบคุณ)" },
            { word: "Wasser", meaning: "น้ำ", english: "Water", icon: "💧", example: "Ein Glas Wasser, bitte. (ขอน้ำหนึ่งแก้วครับ)" },
            { word: "Brot", meaning: "ขนมปัง", english: "Bread", icon: "🍞", example: "Frisches Brot riecht gut. (ขนมปังสดใหม่กลิ่นหอมจัง)" },
            { word: "Freund", meaning: "เพื่อน", english: "Friend", icon: "🤝", example: "Er ist mein bester Freund. (เขาคือเพื่อนที่ดีที่สุดของฉัน)" },
            { word: "Lernen", meaning: "เรียนรู้", english: "To learn", icon: "📖", example: "Ich lerne Deutsch. (ฉันกำลังเรียนภาษาเยอรมัน)" },
            { word: "Schön", meaning: "สวย/ดี", english: "Beautiful", icon: "🌸", example: "Das ist ein schöner Tag. (วันนี้เป็นวันที่สวยงาม)" },
            { word: "Heute", meaning: "วันนี้", english: "Today", icon: "📅", example: "Was machst du heute? (วันนี้คุณทำอะไร?)" },
            { word: "Morgen", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "⏭️", example: "Bis morgen! (เจอกันพรุ่งนี้!)" },
            { word: "Geld", meaning: "เงิน", english: "Money", icon: "💶", example: "Ich habe kein Geld. (ฉันไม่มีเงิน)" },
            { word: "Auto", meaning: "รถ", english: "Car", icon: "🚗", example: "Das Auto ist neu. (รถคันนี้ใหม่มาก)" },
            { word: "Essen", meaning: "กิน/อาหาร", english: "To eat", icon: "🍽️", example: "Ich möchte essen. (ฉันอยากทานอาหาร)" },
            { word: "Trinken", meaning: "ดื่ม", english: "To drink", icon: "🥤", example: "Wir trinken Saft. (พวกเราดื่มน้ำผลไม้)" },
            { word: "Groß", meaning: "ใหญ่", english: "Large", icon: "🐘", example: "Das Haus ist groß. (บ้านหลังนี้ใหญ่มาก)" },
            { word: "Klein", meaning: "เล็ก", english: "Small", icon: "🐭", example: "Der Hundเป็นตัวเล็ก. (สุนัขตัวนี้เล็ก)" },
            { word: "Schnell", meaning: "เร็ว", english: "Fast", icon: "⚡", example: "Lauf schnell! (วิ่งเร็วเข้า!)" },
            { word: "Langsam", meaning: "ช้า", english: "Slow", icon: "🐢", example: "Geh langsam. (เดินช้าๆ)" }
        ];

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="aspect-square md:p-4 rounded-xl md:rounded-3xl bg-slate-100/20 border border-dashed border-slate-200"></div>`;
            }

            let completedCount = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const done = appState.completedDates.includes(ds);
                const isT = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (done) completedCount++;

                let cls = "calendar-day relative flex flex-col items-center justify-center aspect-square rounded-2xl md:rounded-[2rem] border-2 cursor-pointer shadow-sm ";
                let inner = `<span class="text-lg md:text-2xl font-black ${isT ? 'text-white' : 'text-slate-800'}">${d}</span>`;

                if (done) {
                    cls += "bg-indigo-50 border-indigo-200 text-indigo-700";
                    inner += `<i class="ph-fill ph-seal-check text-indigo-500 text-xl md:text-3xl mt-1"></i>`;
                } else if (isT) {
                    cls += "bg-indigo-600 border-indigo-500 today-pulse shadow-lg";
                } else {
                    cls += "bg-white border-slate-100 active:border-indigo-300";
                    inner += `<i class="ph-duotone ph-castle text-slate-200 text-lg md:text-2xl mt-1"></i>`;
                }

                grid.innerHTML += `<div class="${cls}" onclick="openDayDialog(${year}, ${month}, ${d})">${inner}</div>`;
            }

            document.getElementById('summary-completed').innerText = completedCount;
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            content.innerHTML = '';

            vocabPool.forEach((v, i) => {
                content.innerHTML += `
                    <div class="p-5 bg-white rounded-2xl border-2 border-slate-50 flex gap-4 items-start shadow-sm">
                        <div class="w-10 h-10 bg-indigo-900 text-amber-400 rounded-xl flex items-center justify-center font-black text-sm shrink-0">
                            ${i + 1}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="text-lg font-black text-slate-800 truncate pr-2">${v.icon} ${v.word}</h4>
                                <button onclick="speak('${v.word}')" class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg active:bg-indigo-600 active:text-white shrink-0">
                                    <i class="ph-fill ph-speaker-high"></i>
                                </button>
                            </div>
                            <p class="text-sm font-bold text-indigo-600 mb-2">🇹🇭 ${v.meaning}</p>
                            <p class="text-xs text-slate-500 italic leading-relaxed border-l-2 border-amber-400 pl-2">
                                "${v.example}"
                            </p>
                        </div>
                    </div>
                `;
            });

            const btn = document.getElementById('btn-complete-day');
            if (isDone) {
                btn.innerHTML = `<i class="ph-bold ph-star text-amber-400"></i> ทบทวนแล้ว!`;
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-check-circle"></i> ท่องจำสำเร็จ!`;
                btn.onclick = markComplete;
            }

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speak(text) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=de&client=tw-ob`;
            const audio = new Audio(url);
            audio.play().catch(() => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'de-DE';
                    window.speechSynthesis.speak(u);
                }
            });
        }

        window.onload = () => { loadState(); renderCalendar(); };
    </script>
</body>
</html>
