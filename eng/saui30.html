<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ท่องซาอุฯ — Arabic Vocab Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            /* ธีมสีโอเอซิสทะเลทราย: ขาวทรายสว่าง - เขียวอ่อน */
            background: linear-gradient(135deg, #FDFBF7 0%, #E8F4EC 100%);
            background-color: #FDFBF7;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        h1, h2, h3, .font-english {
            font-family: 'Outfit', 'Sarabun', sans-serif; 
        }
        .font-target {
            /* ฟอนต์รองรับภาษาอาหรับสวยๆ */
            font-family: 'Tajawal', 'Sarabun', sans-serif; 
            word-break: keep-all;
        }
        
        /* Custom scrollbar for dialog - โทนทอง/ทราย */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #FDFBF7; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FCD34D; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #F59E0B; }
        
        /* Playful animations - optimized for smoothness */
        .calendar-day { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
        .calendar-day:hover { transform: translateY(-3px) rotate(1deg); box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.12), 0 4px 6px -2px rgba(5, 150, 105, 0.08); }
        .calendar-day:active { transform: translateY(0) scale(0.96); }
        
        .vocab-card { transition: all 0.2s ease-in-out; will-change: transform; }
        .vocab-card:hover { transform: translateY(-2px) scale(1.01); }

        /* เปลี่ยนสี Blob ให้เป็นสีทองทราย (Sand Gold) */
        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23FDE68A' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        /* Pulse animation for 'Today' - สีเขียวซาอุฯ */
        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.3); }
            70% { box-shadow: 0 0 0 8px rgba(5, 150, 105, 0); }
            100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }
        }
        .today-pulse { animation: softPulse 2s infinite; }
    </style>
</head>
<body class="text-slate-800 p-3 sm:p-4 md:p-8 pb-24 sm:pb-24 md:pb-32 min-h-screen flex flex-col items-center overflow-x-hidden">

    <div class="w-full max-w-4xl space-y-4 md:space-y-6">
        
        <!-- Header & Summary Section -->
        <div class="bg-white/80 backdrop-blur-lg rounded-3xl md:rounded-[2rem] p-5 md:p-8 shadow-xl shadow-amber-100/50 border border-white transform-gpu">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 md:gap-6">
                <!-- Title & Mascot -->
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-4xl sm:text-5xl md:text-6xl animate-bounce drop-shadow-md transform-gpu" style="animation-duration: 3s;">🐪</div>
                    <div>
                        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-700 to-emerald-500 mb-0.5 md:mb-1">
                            Daily Saudi Vocab
                        </h1>
                        <p class="text-slate-500 font-medium text-xs sm:text-sm md:text-base flex items-center gap-1">
                            ท่องศัพท์ภาษาอาหรับวันละ 20 คำ กับน้องอูฐ! 🌴 
                        </p>
                    </div>
                </div>

                <!-- Monthly Summary Card -->
                <div class="bg-gradient-to-tr from-amber-400 to-yellow-500 p-3 sm:p-4 md:p-5 rounded-2xl md:rounded-3xl w-full sm:w-auto flex items-center gap-4 md:gap-5 shadow-lg shadow-amber-200 text-white transform-gpu hover:scale-105 transition-transform duration-300">
                    <div class="bg-white/20 backdrop-blur-sm w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center text-2xl md:text-3xl shadow-inner border border-white/30 shrink-0">
                        🌟
                    </div>
                    <div>
                        <p class="text-[10px] md:text-xs font-bold uppercase tracking-wider text-amber-50 mb-0.5 md:mb-1">สรุปการเรียนเดือนนี้</p>
                        <p class="text-2xl md:text-3xl font-extrabold leading-none">
                            <span id="summary-completed">0</span>
                            <span class="text-lg md:text-xl font-medium text-amber-100">/ <span id="summary-total">30</span> วัน</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white/90 backdrop-blur-lg rounded-3xl md:rounded-[2.5rem] p-4 sm:p-6 md:p-8 shadow-xl shadow-slate-200/40 border border-white transform-gpu">
            
            <!-- Calendar Header (Month Navigation) -->
            <div class="flex flex-col sm:flex-row justify-between items-center mb-4 sm:mb-6 md:mb-8 gap-3 sm:gap-4">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="text-2xl md:text-3xl">📅</div>
                    <h2 id="month-year-display" class="text-xl sm:text-2xl md:text-3xl font-bold text-slate-800 tracking-wide">Month Year</h2>
                </div>
                
                <div class="flex gap-1 sm:gap-2 bg-slate-50 p-1 sm:p-1.5 rounded-xl md:rounded-2xl w-full sm:w-auto justify-center">
                    <button onclick="changeMonth(-1)" class="p-2 sm:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-emerald-50 hover:text-emerald-700 text-slate-500 transition-all active:scale-95 flex-1 sm:flex-none flex justify-center">
                        <i class="ph-bold ph-caret-left text-base sm:text-lg"></i>
                    </button>
                    <button onclick="goToToday()" class="px-4 py-2 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-emerald-50 hover:text-emerald-700 text-slate-700 font-bold transition-all active:scale-95 text-xs sm:text-sm flex-1 sm:flex-none">
                        กลับมาวันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 sm:p-3 rounded-lg md:rounded-xl bg-white shadow-sm hover:shadow hover:bg-emerald-50 hover:text-emerald-700 text-slate-500 transition-all active:scale-95 flex-1 sm:flex-none flex justify-center">
                        <i class="ph-bold ph-caret-right text-base sm:text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3 mb-2 sm:mb-3 text-center font-bold text-slate-400 text-[10px] sm:text-xs md:text-sm uppercase tracking-wider">
                <div class="text-rose-500">Sun</div>
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div>
                <div class="text-sky-500">Sat</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1 sm:gap-2 md:gap-3">
                <!-- Days will be generated by JS -->
            </div>
        </div>
        
        <!-- Footer info -->
        <div class="text-center text-slate-500 text-xs sm:text-sm font-medium pb-4">
            <p>💡 Tip: กดที่วันที่เพื่อเริ่มท่องศัพท์อาหรับได้เลย!</p>
        </div>

    </div>

    <!-- Bottom Navigation Bar (App-like) -->
    <nav class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 z-40 transform-gpu shadow-[0_-5px_15px_rgba(0,0,0,0.03)]" style="padding-bottom: env(safe-area-inset-bottom);">
        <div class="max-w-md mx-auto flex justify-around items-center px-4 py-2 md:py-3">
            <!-- ปุ่ม ปฏิทิน -->
            <!-- ใส่ URL หน้าปฏิทินแทนเครื่องหมาย # ได้เลย -->
            <a href="#" target="_blank" class="flex flex-col items-center justify-center text-emerald-600 transition-colors active:scale-95 w-20 py-1">
                <div class="relative">
                    <i class="ph-fill ph-calendar text-2xl md:text-3xl mb-0.5"></i>
                    <!-- จุดแจ้งเตือนสีทอง (แสดงว่าเป็นหน้าปัจจุบัน หรือมีอัปเดต) -->
                    <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-amber-400 rounded-full border-2 border-white"></span>
                </div>
                <span class="text-[10px] md:text-xs font-bold font-sarabun mt-0.5">ปฏิทิน</span>
            </a>
            
            <!-- ปุ่ม คุยสนทนา -->
            <!-- ใส่ URL หน้าคุยสนทนาแทนเครื่องหมาย # ได้เลย -->
            <a href="#" target="_blank" class="flex flex-col items-center justify-center text-slate-400 hover:text-emerald-500 transition-colors active:scale-95 w-20 py-1 group">
                <i class="ph-bold ph-chats-circle text-2xl md:text-3xl mb-0.5 group-hover:scale-110 transition-transform"></i>
                <span class="text-[10px] md:text-xs font-bold font-sarabun mt-0.5">คุยสนทนา</span>
            </a>
        </div>
    </nav>

    <!-- Dialog / Modal for Vocabulary -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <!-- Modal Content -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[95%] sm:w-[90%] max-w-3xl bg-[#FDFBF7] rounded-3xl md:rounded-[2.5rem] shadow-2xl flex flex-col max-h-[95vh] sm:max-h-[90vh] overflow-hidden border-2 md:border-4 border-white transform-gpu">
            
            <!-- Modal Header -->
            <div class="px-5 py-4 md:px-8 md:py-6 border-b border-amber-100 bg-white flex justify-between items-center relative z-10 shrink-0">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="text-3xl md:text-4xl">🐪</div>
                    <div>
                        <h3 id="dialog-title" class="text-xl sm:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-700 to-amber-500 leading-tight">วันที่ --/--/----</h3>
                        <p class="text-xs sm:text-sm text-slate-500 mt-0.5 md:mt-1 font-medium">เก็บศัพท์อาหรับกัน! (20 คำ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-slate-400 hover:text-emerald-600 bg-slate-50 hover:bg-amber-50 p-2 md:p-3 rounded-full transition-all active:scale-90 shrink-0">
                    <i class="ph-bold ph-x text-lg md:text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body (Scrollable Vocab List) -->
            <div id="dialog-content" class="p-3 sm:p-5 md:p-8 overflow-y-auto custom-scrollbar flex-1 space-y-3 sm:space-y-4 overscroll-contain">
                <!-- Vocab list will be injected here -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-4 py-3 md:px-8 md:py-5 border-t border-amber-100 bg-white flex flex-col sm:flex-row justify-between items-center gap-3 shrink-0">
                <div class="text-2xl md:text-3xl hidden sm:block">🕌</div>
                <div class="flex flex-row gap-2 sm:gap-3 w-full sm:w-auto">
                    <button onclick="closeDialog()" class="flex-1 sm:flex-none px-4 py-2.5 md:px-6 md:py-3 text-slate-600 font-bold hover:bg-slate-100 hover:text-slate-800 rounded-xl md:rounded-2xl transition-colors text-sm md:text-base text-center">
                        ปิดไว้ก่อน
                    </button>
                    <button id="btn-complete-day" class="flex-[2] sm:flex-none px-4 py-2.5 md:px-8 md:py-3 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white font-bold hover:from-emerald-700 hover:to-emerald-600 rounded-xl md:rounded-2xl shadow-lg shadow-emerald-600/30 transition-all active:scale-95 flex items-center justify-center gap-1.5 md:gap-2 text-sm md:text-lg">
                        <i class="ph-bold ph-check-circle text-lg md:text-xl"></i> ท่องเสร็จแล้ว!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & Variables ---
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        // --- State Management (Local Storage) ---
        let appState = {
            completedDates: [] 
        };

        function loadState() {
            const saved = localStorage.getItem('saudi_calendar_v1');
            if (saved) {
                appState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('saudi_calendar_v1', JSON.stringify(appState));
        }

        // --- Vocabulary Pool (ภาษาอาหรับ - ซาอุดีอาระเบีย) ---
        const vocabPool = [
            { word: "مرحباً (มัรฮาบัน)", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "مرحباً، كيف حالك؟ (สวัสดี สบายดีไหม?)" },
            { word: "شكراً (ชุกรอน)", meaning: "ขอบคุณ", english: "Thank you", icon: "🙏", example: "شكراً جزيلاً (ขอบคุณมากๆ)" },
            { word: "عفواً (อัฟวัน)", meaning: "ไม่เป็นไร / ขอโทษ", english: "Excuse me / You're welcome", icon: "🥺", example: "عفواً، أين الحمام؟ (ขอโทษครับ ห้องน้ำอยู่ไหน?)" },
            { word: "نعم (นะอัม)", meaning: "ใช่ / ครับ,ค่ะ", english: "Yes", icon: "👍", example: "نعم، أفهم (ใช่ ฉันเข้าใจ)" },
            { word: "لا (ลา)", meaning: "ไม่", english: "No", icon: "👎", example: "لا، شكراً (ไม่ ขอบคุณ)" },
            { word: "مع السلامة (มะอัสสะลามะฮ์)", meaning: "ลาก่อน", english: "Goodbye", icon: "👋", example: "مع السلامة، أراك لاحقاً (ลาก่อน ไว้เจอกัน)" },
            { word: "بكم هذا؟ (บิกัม ฮาซา?)", meaning: "ราคาเท่าไหร่?", english: "How much?", icon: "💰", example: "بكم هذا القميص؟ (เสื้อตัวนี้ราคาเท่าไหร่?)" },
            { word: "غالي جداً (ฆอลี ญิดดัน)", meaning: "แพงมาก", english: "Too expensive", icon: "💸", example: "هذا غالي جداً (อันนี้แพงมากเลย)" },
            { word: "رخيص (เราะคีส)", meaning: "ถูก (ราคา)", english: "Cheap", icon: "🏷️", example: "هذا السعر رخيص (ราคานี้ถูกมาก)" },
            { word: "ما اسمك؟ (มัสสุกะ?)", meaning: "คุณชื่ออะไร?", english: "What's your name?", icon: "📛", example: "معذرة، ما اسمك؟ (ขอโทษนะ คุณชื่ออะไร?)" },
            { word: "اسمي... (อิสมี...)", meaning: "ฉันชื่อ...", english: "My name is...", icon: "👤", example: "اسمي محمد (ฉันชื่อมูฮัมหมัด)" },
            { word: "كيف حالك؟ (กัยฟะ ฮาลุกะ?)", meaning: "สบายดีไหม?", english: "How are you?", icon: "😊", example: "أهلاً، كيف حالك؟ (สวัสดี สบายดีไหม?)" },
            { word: "أنا بخير (อะนา บิคอยร์)", meaning: "ฉันสบายดี", english: "I'm fine", icon: "💪", example: "أنا بخير، الحمد لله (ฉันสบายดี ขอบคุณพระเจ้า)" },
            { word: "هل أكلت؟ (ฮัล อะกัลตะ?)", meaning: "กินข้าวหรือยัง?", english: "Have you eaten?", icon: "🍽️", example: "هل أكلت الغداء؟ (กินข้าวมื้อเที่ยงหรือยัง?)" },
            { word: "لذيذ (ละซีซ)", meaning: "อร่อย", english: "Delicious", icon: "😋", example: "هذا الطعام لذيذ جداً (อาหารนี้อร่อยมาก)" },
            { word: "ماء (มาอ์)", meaning: "น้ำ", english: "Water", icon: "💧", example: "أريد ماء لو سمحت (ขอน้ำหน่อยครับ/ค่ะ)" },
            { word: "قهوة (เกาะฮ์วะฮ์)", meaning: "กาแฟ", english: "Coffee", icon: "☕", example: "أحب القهوة العربية (ฉันชอบกาแฟอาหรับ)" },

            { word: "ماذا؟ (มาซา?)", meaning: "อะไร?", english: "What?", icon: "❓", example: "ماذا تفعل؟ (คุณกำลังทำอะไร?)" },
            { word: "من؟ (มัน?)", meaning: "ใคร?", english: "Who?", icon: "👤", example: "من هذا الرجل؟ (ผู้ชายคนนี้คือใคร?)" },
            { word: "لماذا؟ (ลิมาซา?)", meaning: "ทำไม?", english: "Why?", icon: "🤔", example: "لماذا أنت متأخر؟ (ทำไมคุณถึงมาสาย?)" },
            { word: "حمام (ฮัมมาม)", meaning: "ห้องน้ำ", english: "Toilet", icon: "🚽", example: "أين الحمام؟ (ห้องน้ำอยู่ที่ไหน?)" },
            { word: "سوق (ซูก)", meaning: "ตลาด", english: "Market", icon: "🛒", example: "أريد الذهاب إلى السوق (ฉันอยากไปตลาด)" },
            { word: "مستشفى (มุสตัดช์ฟา)", meaning: "โรงพยาบาล", english: "Hospital", icon: "🏥", example: "أين أقرب مستشفى؟ (โรงพยาบาลที่ใกล้ที่สุดอยู่ไหน?)" },
            { word: "مطار (มะฏอร)", meaning: "สนามบิน", english: "Airport", icon: "✈️", example: "خذني إلى المطار (พาฉันไปสนามบินหน่อย)" },
            { word: "فندق (ฟุนดุก)", meaning: "โรงแรม", english: "Hotel", icon: "🏨", example: "ما اسم فندقك؟ (โรงแรมของคุณชื่ออะไร?)" },
            { word: "مطعم (มัฏอัม)", meaning: "ร้านอาหาร", english: "Restaurant", icon: "🍽️", example: "هذا المطعم جيد (ร้านอาหารนี้ดี)" },
            { word: "الحساب (อัลฮิซาบ)", meaning: "เช็คบิล", english: "Check bill", icon: "🧾", example: "الحساب لو سمحت (เช็คบิลด้วยครับ/ค่ะ)" },
            { word: "لا أفهم (ลา อัฟฮัม)", meaning: "ไม่เข้าใจ", english: "Don't understand", icon: "🤷", example: "أنا لا أفهم العربية جيداً (ฉันไม่เข้าใจภาษาอาหรับดีนัก)" },
            { word: "تكلم ببطء (ตะกัลลัม บิบุฏอ์)", meaning: "พูดช้าๆ", english: "Speak slowly", icon: "🐢", example: "من فضلك، تكلم ببطء (กรุณาพูดช้าลงหน่อย)" },
            { word: "أعد (อะอิด)", meaning: "พูดซ้ำ", english: "Repeat", icon: "🔁", example: "هل يمكنك أن تعيد؟ (คุณช่วยพูดซ้ำได้ไหม?)" },
            { word: "مشكلة (มุชกิละฮ์)", meaning: "ปัญหา", english: "Problem", icon: "⚠️", example: "لا مشكلة (ไม่มีปัญหา)" },
            { word: "يمين (ยะมีน)", meaning: "ขวา", english: "Right", icon: "➡️", example: "لف يمين (เลี้ยวขวา)" },
            { word: "يسار (ยะซาร)", meaning: "ซ้าย", english: "Left", icon: "⬅️", example: "لف يسار (เลี้ยวซ้าย)" },
            { word: "جميل (ญะมีล)", meaning: "สวย/หล่อ", english: "Beautiful/Handsome", icon: "✨", example: "هذا المكان جميل (สถานที่นี้สวยงาม)" },
            { word: "حار (ฮาร)", meaning: "ร้อน", english: "Hot", icon: "🥵", example: "الجو حار اليوم (วันนี้อากาศร้อน)" },
            { word: "بارد (บาริด)", meaning: "หนาว/เย็น", english: "Cold", icon: "🥶", example: "الجو بارد (อากาศเย็น)" },
            { word: "كبير (กะบีร)", meaning: "ใหญ่", english: "Big", icon: "🐘", example: "هذا بيت كبير (นี่คือบ้านหลังใหญ่)" },
            { word: "صغير (เศาะฆีร)", meaning: "เล็ก", english: "Small", icon: "🐁", example: "هذا قط صغير (นี่คือแมวตัวเล็ก)" },
            { word: "اليوم (อัลเยาม์)", meaning: "วันนี้", english: "Today", icon: "☀️", example: "ماذا سنفعل اليوم؟ (วันนี้เราจะทำอะไรกัน?)" },
            { word: "غداً (เฆาะดัน)", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "🌅", example: "سأراك غداً (ฉันจะเจอคุณพรุ่งนี้)" },
            { word: "سيارة (ซัยยาเราะฮ์)", meaning: "รถยนต์", english: "Car", icon: "🚗", example: "سيارتي جديدة (รถของฉันคันใหม่)" },
            { word: "مساعدة (มุซาอะดะฮ์)", meaning: "ช่วยเหลือ", english: "Help", icon: "🆘", example: "أحتاج إلى مساعدة (ฉันต้องการความช่วยเหลือ)" },
            { word: "تصبح على خير (ตุสบิฮ์ อะลา คอยร์)", meaning: "ราตรีสวัสดิ์", english: "Good night", icon: "🌙", example: "تصبح على خير، أحلاماً سعيدة (ราตรีสวัสดิ์ ฝันดีนะ)" },
            { word: "أحبك (อุฮิบบุกะ)", meaning: "ฉันรักคุณ", english: "I love you", icon: "❤️", example: "أنا أحبك (ฉันรักคุณ)" },
            { word: "ممتاز (มุมตาซ)", meaning: "ยอดเยี่ยม", english: "Excellent", icon: "🌟", example: "عمل ممتاز! (ทำงานได้ยอดเยี่ยม!)" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            const shuffled = shuffleArray(vocabPool);
            return shuffled.slice(0, Math.min(VOCAB_PER_SESSION, shuffled.length));
        }

        // --- Calendar Logic ---
        
        function getFormatDateString(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getDisplayDateString(year, month, day) {
            return `${day} ${MONTH_NAMES[month]} ${year}`;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="p-1 sm:p-2 md:p-4 rounded-xl md:rounded-[1.5rem] bg-amber-50/50 border border-dashed border-amber-200 opacity-40"></div>`;
            }

            let completedThisMonth = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = getFormatDateString(year, month, day);
                const isCompleted = appState.completedDates.includes(dateString);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                if (isCompleted) completedThisMonth++;

                // เบาและลื่นขึ้น: ลดขนาด min-height บนมือถือ
                let baseClasses = "calendar-day relative flex flex-col items-center justify-center p-2 sm:p-3 md:p-5 rounded-xl sm:rounded-[1.25rem] md:rounded-[1.5rem] border-2 cursor-pointer select-none min-h-[65px] sm:min-h-[85px] md:min-h-[110px] transform-gpu";
                
                let stateClasses = "";
                let indicatorHTML = "";

                if (isCompleted) {
                    stateClasses = "bg-amber-50 border-amber-200 text-amber-800 shadow-sm";
                    indicatorHTML = `
                        <div class="absolute -top-1.5 -right-1.5 md:-top-2 md:-right-2 w-5 h-5 md:w-7 md:h-7 bg-white rounded-full shadow border border-amber-200 flex items-center justify-center text-[10px] md:text-sm z-10 animate-bounce transform-gpu" style="animation-duration: 2s;">🌟</div>
                        <i class="ph-fill ph-check-circle text-amber-400 text-xl sm:text-2xl md:text-3xl mt-0.5 md:mt-1 opacity-60"></i>
                    `;
                } else if (isToday) {
                    stateClasses = "bg-gradient-to-b from-emerald-500 to-emerald-600 border-transparent text-white shadow-md shadow-emerald-600/40 today-pulse";
                    indicatorHTML = `
                        <span class="text-[9px] sm:text-[10px] md:text-xs font-bold bg-white/20 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full mt-1 sm:mt-2 backdrop-blur-sm text-white leading-none whitespace-nowrap">วันนี้</span>
                    `;
                } else {
                    stateClasses = "bg-white border-slate-200 text-slate-600 hover:border-emerald-400 hover:bg-emerald-50/30";
                    indicatorHTML = `<i class="ph-duotone ph-book-open text-slate-200 text-lg sm:text-2xl md:text-3xl mt-0.5 md:mt-1 group-hover:text-emerald-500 transition-colors"></i>`;
                }

                // Check for Sunday/Saturday colors
                const dayOfWeek = new Date(year, month, day).getDay();
                let textStyle = "font-extrabold text-lg sm:text-xl md:text-2xl font-english leading-none";
                if (!isToday && !isCompleted) {
                    if (dayOfWeek === 0) textStyle += " text-rose-500";
                    else if (dayOfWeek === 6) textStyle += " text-sky-500";
                }

                const cardHTML = `
                    <div class="${baseClasses} ${stateClasses} group" onclick="openDayDialog(${year}, ${month}, ${day})">
                        <span class="${textStyle}">${day}</span>
                        ${indicatorHTML}
                    </div>
                `;
                grid.innerHTML += cardHTML;
            }

            // Animate number change
            const completedEl = document.getElementById('summary-completed');
            completedEl.innerText = completedThisMonth;
            completedEl.classList.add('scale-150', 'text-yellow-200');
            setTimeout(() => completedEl.classList.remove('scale-150', 'text-yellow-200'), 300);
            
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        // --- Dialog & Interaction ---
        
        function openDayDialog(year, month, day) {
            selectedDateString = getFormatDateString(year, month, day);
            const displayDate = getDisplayDateString(year, month, day);
            const isCompleted = appState.completedDates.includes(selectedDateString);

            const dialog = document.getElementById('vocab-dialog');
            const title = document.getElementById('dialog-title');
            const content = document.getElementById('dialog-content');
            const btnComplete = document.getElementById('btn-complete-day');

            title.innerText = `วันที่ ${displayDate}`;

            const vocabList = getRandomVocab();
            content.innerHTML = '';
            
            vocabList.forEach((v, index) => {
                // ดึงเฉพาะตัวหนังสืออาหรับมาใช้เป็นเสียงอ่าน (ตัดส่วนวงเล็บคำอ่านภาษาไทยออก)
                const targetWordOnly = v.word.split(' (')[0].trim();

                const itemHTML = `
                    <div class="vocab-card p-4 sm:p-5 bg-white border-2 border-slate-100 rounded-2xl md:rounded-[2rem] hover:border-emerald-300 hover:shadow-lg hover:shadow-amber-100/50 transition-all flex flex-col sm:flex-row gap-3 sm:gap-4 items-start relative overflow-hidden group transform-gpu">
                        
                        <!-- Cute background blob -->
                        <div class="absolute -right-10 -bottom-10 w-24 h-24 sm:w-32 sm:h-32 bg-amber-50 rounded-full blur-xl sm:blur-2xl opacity-0 group-hover:opacity-100 transition-opacity transform-gpu"></div>

                        <div class="blob-bg text-amber-700 w-10 h-10 sm:w-14 sm:h-14 rounded-xl sm:rounded-2xl flex items-center justify-center font-extrabold text-lg sm:text-xl shrink-0 shadow-sm relative z-10 font-english">
                            ${index + 1}
                        </div>
                        
                        <div class="flex-1 relative z-10 w-full min-w-0">
                            <div class="flex justify-between items-start w-full">
                                <h4 class="text-lg sm:text-xl md:text-2xl font-extrabold text-slate-800 mb-1 sm:mb-2 flex flex-wrap items-center gap-1.5 sm:gap-2 font-target tracking-wide w-full pr-10 sm:pr-12" dir="auto">
                                    <span class="text-xl sm:text-2xl md:text-3xl drop-shadow-sm">${v.icon}</span> 
                                    <span class="text-emerald-800 text-xl sm:text-2xl md:text-3xl">${v.word.split(' (')[0]}</span>
                                    <span class="text-sm sm:text-lg md:text-xl text-slate-500 font-medium font-sarabun mt-0.5 sm:mt-0">(${v.word.split(' (')[1].replace(')','')} )</span>
                                </h4>
                                <button onclick="speakWord('${targetWordOnly}')" class="absolute top-0 right-0 bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white p-2 sm:p-2.5 rounded-lg sm:rounded-xl transition-colors shadow-sm shrink-0" title="ฟังเสียงอาหรับ">
                                    <i class="ph-fill ph-speaker-high text-base sm:text-lg"></i>
                                </button>
                            </div>
                            
                            <div class="flex flex-wrap gap-1.5 sm:gap-2 mb-2 sm:mb-3 mt-1">
                                <span class="text-emerald-700 font-bold bg-emerald-50 px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-md sm:rounded-lg text-[11px] sm:text-sm flex items-center gap-1 border border-emerald-100">
                                    🇹🇭 ${v.meaning}
                                </span>
                                <span class="text-sky-600 font-bold bg-sky-50 px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-md sm:rounded-lg text-[11px] sm:text-sm flex items-center gap-1 font-english border border-sky-100">
                                    🇬🇧 ${v.english}
                                </span>
                            </div>
                            
                            <div class="bg-amber-50/40 p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-amber-100/50 relative mt-2 sm:mt-3">
                                <i class="ph-fill ph-quotes text-amber-200/60 text-2xl sm:text-4xl absolute -top-1 sm:-top-2 -left-1"></i>
                                <p class="text-xs sm:text-sm md:text-base text-slate-600 relative z-10 font-target pl-3 sm:pl-4 leading-relaxed" dir="auto">
                                    ${v.example}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
                content.innerHTML += itemHTML;
            });

            if (isCompleted) {
                btnComplete.innerHTML = `<i class="ph-bold ph-star text-amber-300 text-lg md:text-xl"></i> ทบทวนเสร็จแล้ว (เยี่ยมมาก!)`;
                btnComplete.className = "flex-[2] sm:flex-none px-4 py-2.5 md:px-8 md:py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold hover:from-amber-600 hover:to-orange-600 rounded-xl md:rounded-2xl shadow-lg shadow-amber-500/30 transition-all active:scale-95 flex items-center justify-center gap-1.5 md:gap-2 text-sm md:text-lg transform-gpu";
                btnComplete.onclick = closeDialog; 
            } else {
                btnComplete.innerHTML = `<i class="ph-bold ph-check-circle text-lg md:text-xl"></i> ท่องเสร็จแล้ว!`;
                btnComplete.className = "flex-[2] sm:flex-none px-4 py-2.5 md:px-8 md:py-3 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white font-bold hover:from-emerald-700 hover:to-emerald-600 rounded-xl md:rounded-2xl shadow-lg shadow-emerald-600/30 transition-all active:scale-95 flex items-center justify-center gap-1.5 md:gap-2 text-sm md:text-lg transform-gpu";
                btnComplete.onclick = markDayAsComplete; 
            }

            dialog.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            const dialog = document.getElementById('vocab-dialog');
            dialog.classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedDateString = null;
        }

        function markDayAsComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                
                // Show cute alert
                const alert = document.createElement('div');
                alert.className = "fixed top-8 sm:top-10 left-1/2 transform -translate-x-1/2 bg-white px-4 py-3 sm:px-6 sm:py-4 rounded-full shadow-2xl flex items-center gap-2 sm:gap-3 z-[100] animate-bounce font-bold text-slate-800 border-2 border-amber-400 text-sm sm:text-base whitespace-nowrap transform-gpu";
                alert.innerHTML = `<span class="text-xl sm:text-2xl">🌟</span> ممتاز! (ยอดเยี่ยม) ได้ดาว 1 ดวง`;
                document.body.appendChild(alert);
                setTimeout(() => alert.remove(), 3000);

                renderCalendar(); 
            }
            closeDialog();
        }

        function speakWord(word) {
            // หยุดเสียง Web Speech API เดิมที่อาจจะค้างอยู่
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }

            // เปลี่ยน Endpoint เป็น translate.googleapis.com ซึ่งเสถียรกว่าและไม่ค่อยติดปัญหา Block/CORS
            const url = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=ar&q=${encodeURIComponent(word)}`;
            const audio = new Audio(url);
            
            audio.play().catch(error => {
                console.error("ไม่สามารถเล่นเสียงจาก Google TTS ได้ ลองใช้เสียงสำรอง:", error);
                // ระบบสำรอง: ใช้เสียงของเบราว์เซอร์ สำเนียงซาอุฯ (ar-SA)
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'ar-SA'; 
                    utterance.rate = 0.8; 
                    
                    // พยายามหาเสียงภาษาอาหรับในเครื่อง (เผื่อ OS ไม่รองรับ ar-SA ให้ใช้ ar แทน)
                    const voices = window.speechSynthesis.getVoices();
                    const arabicVoice = voices.find(voice => voice.lang.startsWith('ar'));
                    if (arabicVoice) {
                        utterance.voice = arabicVoice;
                    }
                    
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById('vocab-dialog').classList.contains('hidden')) {
                closeDialog();
            }
        });
    </script>
</body>
</html>
