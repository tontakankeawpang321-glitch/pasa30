<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ท่องโปแลนด์ — Daily Polish Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --pl-red: #dc2626;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background: #fdfcfc;
            background-image: radial-gradient(#fee2e2 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3, .font-heading {
            font-family: 'Montserrat', sans-serif; 
        }
        .font-polish {
            font-family: 'Poppins', sans-serif;
        }
        
        /* Smooth Scroll & Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fca5a5; border-radius: 10px; }
        
        /* Hardware Acceleration for smooth animations */
        .calendar-day, .vocab-card, .btn-interact {
            will-change: transform;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .calendar-day:active { transform: scale(0.92); opacity: 0.8; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        /* Prevent layout shift on grid */
        #calendar-grid {
            min-height: 300px;
        }
    </style>
</head>
<body class="text-slate-800 p-3 md:p-8 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-4 md:space-y-6">
        
        <!-- Header Section -->
        <header class="glass-panel rounded-[2rem] p-5 md:p-10 shadow-xl shadow-rose-100/40">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4 md:gap-6">
                    <div class="text-5xl md:text-7xl animate-float select-none">🕊️</div>
                    <div>
                        <h1 class="text-2xl md:text-5xl font-black text-red-600 tracking-tight">
                            Daily Polish
                        </h1>
                        <p class="text-slate-400 text-xs md:text-base font-semibold uppercase tracking-wider">
                            ฝึกวันละ 20 คำ 🇵🇱
                        </p>
                    </div>
                </div>

                <!-- Summary Badge -->
                <div class="bg-red-600 rounded-3xl p-0.5 w-full md:w-auto shadow-lg shadow-red-200">
                    <div class="bg-white/10 rounded-[1.4rem] px-6 py-3 flex items-center justify-between md:justify-start gap-4 text-white">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">🏆</span>
                            <span class="text-[10px] font-bold uppercase opacity-80 leading-none">ความสำเร็จ<br>เดือนนี้</span>
                        </div>
                        <p class="text-2xl font-black">
                            <span id="summary-completed">0</span><span class="text-sm opacity-60 font-medium"> / <span id="summary-total">31</span></span>
                        </p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Calendar Container -->
        <main class="glass-panel rounded-[2rem] md:rounded-[3rem] p-4 md:p-10 shadow-lg shadow-rose-100/20">
            
            <!-- Navigation -->
            <div class="flex justify-between items-center mb-6 md:mb-10">
                <h2 id="month-year-display" class="text-lg md:text-3xl font-black text-slate-800">Month Year</h2>
                
                <div class="flex gap-1.5 bg-slate-100 p-1 rounded-2xl">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center btn-interact active:bg-red-50 text-red-600">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-4 rounded-xl bg-white shadow-sm text-slate-600 font-bold text-xs btn-interact">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center btn-interact active:bg-red-50 text-red-600">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <!-- Days of Week -->
            <div class="grid grid-cols-7 gap-1 md:gap-4 mb-3 text-center">
                <div class="text-red-500 font-bold text-[10px] uppercase">S</div>
                <div class="text-slate-400 font-bold text-[10px] uppercase">M</div>
                <div class="text-slate-400 font-bold text-[10px] uppercase">T</div>
                <div class="text-slate-400 font-bold text-[10px] uppercase">W</div>
                <div class="text-slate-400 font-bold text-[10px] uppercase">T</div>
                <div class="text-slate-400 font-bold text-[10px] uppercase">F</div>
                <div class="text-blue-500 font-bold text-[10px] uppercase">S</div>
            </div>

            <!-- Calendar Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 md:gap-5">
                <!-- Auto-generated -->
            </div>
        </main>

        <footer class="text-center text-slate-400 text-[11px] font-medium pb-6">
            <p>Dzień dobry! ภาษาโปแลนด์ง่ายๆ ได้ทุกวัน 🇵🇱</p>
        </footer>
    </div>

    <!-- Vocab Dialog -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden transition-all">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeDialog()"></div>
        
        <div class="absolute bottom-0 md:top-1/2 md:left-1/2 md:transform md:-translate-x-1/2 md:-translate-y-1/2 w-full md:max-w-2xl bg-white rounded-t-[2.5rem] md:rounded-[3rem] shadow-2xl flex flex-col h-[90vh] md:h-auto md:max-h-[85vh] overflow-hidden">
            
            <!-- Handle for mobile drag visual -->
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mt-3 mb-1 md:hidden"></div>

            <div class="px-6 py-4 md:px-8 md:py-8 border-b border-rose-50 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-3xl md:text-4xl">📖</span>
                    <div>
                        <h3 id="dialog-title" class="text-lg md:text-2xl font-black text-slate-800 leading-tight">วันที่ --/--/----</h3>
                        <p class="text-red-500 font-bold text-[10px] md:text-sm">20 บทเรียนใหม่สำหรับคุณ</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-10 h-10 md:w-12 md:h-12 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center btn-interact">
                    <i class="ph-bold ph-x text-lg"></i>
                </button>
            </div>
            
            <div id="dialog-content" class="p-5 md:p-10 overflow-y-auto custom-scrollbar flex-1 space-y-4">
                <!-- Vocab cards -->
            </div>
            
            <div class="p-6 bg-white border-t border-rose-50 flex flex-col gap-3">
                <button id="btn-complete-day" class="w-full py-4 bg-red-600 text-white font-black rounded-2xl shadow-lg shadow-red-200 flex items-center justify-center gap-2 btn-interact">
                    เรียนเสร็จแล้ว! <i class="ph-bold ph-check"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date();
        let today = new Date();
        let selectedDateString = null;
        let appState = { completedDates: [] };

        const vocabPool = [
            { word: "Cześć (แชชตช์)", meaning: "สวัสดี / ลาก่อน", english: "Hi / Bye", icon: "👋", example: "Cześć! Jak się masz?" },
            { word: "Dzień dobry (เจียน โด๊บรี)", meaning: "สวัสดีตอนเช้า", english: "Good morning", icon: "☀️", example: "Dzień dobry, miłego dnia!" },
            { word: "Dobry wieczór (โด๊บรี เวยี-ชูร์)", meaning: "สวัสดีตอนเย็น", english: "Good evening", icon: "🌙", example: "Dobry wieczór państwu." },
            { word: "Dobranoc (โด๊บรา-นอตส์)", meaning: "ราตรีสวัสดิ์", english: "Good night", icon: "😴", example: "Dobranoc, słodkich snów." },
            { word: "Dziękuję (เจียน-กู-แย)", meaning: "ขอบคุณ", english: "Thank you", icon: "🙏", example: "Dziękuję bardzo za pomoc." },
            { word: "Proszę (โพร-แช)", meaning: "ได้โปรด / เชิญ", english: "Please", icon: "✨", example: "Proszę, usiądź tutaj." },
            { word: "Przepraszam (ปแช-ปรา-ชัม)", meaning: "ขอโทษ", english: "Sorry", icon: "🙇", example: "Przepraszam, gdzie jest toaleta?" },
            { word: "Tak (ตัก)", meaning: "ใช่", english: "Yes", icon: "✅", example: "Tak, to prawda." },
            { word: "Nie (เญีย)", meaning: "ไม่", english: "No", icon: "❌", example: "Nie, dziękuję." },
            { word: "Ile to kosztuje? (อี-แล ตอ กอช-ตู-แย?)", meaning: "ราคาเท่าไหร่?", english: "How much?", icon: "💰", example: "Przepraszam, ile to kosztuje?" },
            { word: "Smacznego! (สมัช-เน-กอ!)", meaning: "ทานให้อร่อยนะ", english: "Enjoy!", icon: "😋", example: "Obiad gotowy, smacznego!" },
            { word: "Na zdrowie! (นา สโดร-เวีย!)", meaning: "ชนแก้ว / สุขภาพดี", english: "Cheers!", icon: "🥂", example: "Wypijmy za to, na zdrowie!" },
            { word: "Kocham cię (โค-คัม แช)", meaning: "ฉันรักเธอ", english: "I love you", icon: "❤️", example: "Wiesz, że bardzo cię kocham." },
            { word: "Jak się nazywasz? (ยัก เซี๊ยะ นา-ซือ-วัช?)", meaning: "คุณชื่ออะไร?", english: "What is your name?", icon: "📛", example: "Cześć, jak się nazywasz?" },
            { word: "Nazywam się... (นา-ซือ-วัม เซี๊ยะ...)", meaning: "ฉันชื่อ...", english: "My name is...", icon: "👤", example: "Nazywam się Adam." },
            { word: "Skąd jesteś? (สกอนด์ แยส-เตช?)", meaning: "มาจากไหน?", english: "Where are you from?", icon: "🌍", example: "Skąd jesteś? Jestem z Tajlandii." },
            { word: "Nie rozumiem (เญีย โร-ซู-เมียม)", meaning: "ไม่เข้าใจ", english: "I don't understand", icon: "❓", example: "Przepraszam, nie rozumiem." },
            { word: "Pomocy! (ปอ-มอ-ซือ!)", meaning: "ช่วยด้วย!", english: "Help!", icon: "🆘", example: "Pomocy! Ukradli mi torbę!" },
            { word: "Gdzie jest...? (กเจ แยสท์...?)", meaning: "...อยู่ที่ไหน?", english: "Where is...?", icon: "📍", example: "Gdzie jest najbliższy sklep?" },
            { word: "Pyszne (ปึช-เน)", meaning: "อร่อยมาก", english: "Delicious", icon: "🍲", example: "To jedzenie jest pyszne!" },
            { word: "Dobrze (โด๊บ-แช)", meaning: "ดี / ตกลง", english: "Good / Well", icon: "👌", example: "Wszystko jest dobrze." },
            { word: "Kawa (คา-วา)", meaning: "กาแฟ", english: "Coffee", icon: "☕", example: "Chcesz kawę czy herbatę?" },
            { word: "Herbata (แอร์-บา-ตา)", meaning: "ชา", english: "Tea", icon: "🍵", example: "Herbata z cytryną, proszę." },
            { word: "Woda (โว-ดา)", meaning: "น้ำ", english: "Water", icon: "💧", example: "Poproszę szklankę wody." },
            { word: "Chleb (คล็บ)", meaning: "ขนมปัง", english: "Bread", icon: "🍞", example: "Kup świeży chleb rano." },
            { word: "Mleko (มแล-โก)", meaning: "นม", english: "Milk", icon: "🥛", example: "Mamy jeszcze mleko w lodówce?" },
            { word: "Szczęście (ชแชน-ชแช)", meaning: "ความสุข", english: "Happiness", icon: "🍀", example: "Życzę ci dużo szczęścia!" },
            { word: "Dom (ดอม)", meaning: "บ้าน", english: "Home", icon: "🏠", example: "Wreszcie w domu." },
            { word: "Sklep (สแกล็บ)", meaning: "ร้านค้า", english: "Shop", icon: "🛒", example: "Idę do sklepu po zakupy." },
            { word: "Dzisiaj (ดซี-ไช)", meaning: "วันนี้", english: "Today", icon: "📅", example: "Dzisiaj jest ładna pogoda." },
            { word: "Jutro (ยู-โทร)", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "⏭️", example: "Do zobaczenia jutro!" },
            { word: "Pieniądze (เปีย-เนียน-ดเซ)", meaning: "เงิน", english: "Money", icon: "💸", example: "Nie mam pieniędzy." }
        ];

        function loadState() {
            const saved = localStorage.getItem('polish_calendar_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('polish_calendar_v1', JSON.stringify(appState));
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="aspect-square rounded-2xl bg-slate-50 opacity-10"></div>`;
            }

            let completedCount = 0;
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isCompleted = appState.completedDates.includes(dateStr);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (isCompleted) completedCount++;

                let cardClass = "calendar-day aspect-square flex flex-col items-center justify-center rounded-2xl border-[1.5px] cursor-pointer ";
                let content = `<span class="text-sm md:text-xl font-black ${isToday ? 'text-white' : 'text-slate-700'}">${day}</span>`;

                if (isCompleted) {
                    cardClass += "bg-white border-red-500 shadow-sm";
                    content += `<i class="ph-fill ph-seal-check text-red-500 text-sm md:text-xl mt-0.5"></i>`;
                } else if (isToday) {
                    cardClass += "bg-red-600 border-red-600 shadow-md shadow-red-100";
                } else {
                    cardClass += "bg-white border-slate-100";
                }

                grid.innerHTML += `<div class="${cardClass}" onclick="openDay(${year}, ${month}, ${day})">${content}</div>`;
            }

            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function openDay(y, m, d) {
            selectedDateString = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            content.innerHTML = '';

            const sessionVocab = [...vocabPool].sort(() => 0.5 - Math.random()).slice(0, 10);
            
            sessionVocab.forEach((v, i) => {
                const cleanWord = v.word.split(' (')[0];
                content.innerHTML += `
                    <div class="vocab-card p-4 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-3">
                                <span class="text-xl">${v.icon}</span>
                                <h4 class="font-black text-slate-800 font-polish">${v.word}</h4>
                            </div>
                            <button onclick="speak('${cleanWord}')" class="w-9 h-9 bg-white text-slate-400 rounded-lg shadow-sm flex items-center justify-center btn-interact active:bg-red-600 active:text-white">
                                <i class="ph-fill ph-speaker-high"></i>
                            </button>
                        </div>
                        <div class="flex gap-2">
                            <span class="px-2 py-0.5 bg-white text-red-600 text-[10px] font-bold rounded border border-red-50">🇹🇭 ${v.meaning}</span>
                        </div>
                        <p class="text-[11px] text-slate-400 italic font-polish">"${v.example}"</p>
                    </div>
                `;
            });

            const btn = document.getElementById('btn-complete-day');
            btn.innerHTML = isDone ? `ทบทวนแล้ว <i class="ph-bold ph-star"></i>` : `เรียนเสร็จแล้ว! <i class="ph-bold ph-check"></i>`;
            btn.onclick = isDone ? closeDialog : markComplete;

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speak(text) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=pl&client=tw-ob`;
            new Audio(url).play().catch(() => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'pl-PL';
                    window.speechSynthesis.speak(u);
                }
            });
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        window.onload = () => {
            loadState();
            renderCalendar();
        };
    </script>
</body>
</html>
