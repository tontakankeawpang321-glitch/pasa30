<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahasa Indonesia — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #ef4444; /* Red */
            --secondary: #1e293b; /* Dark Slate */
            --accent: #f97316; /* Orange */
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff7ed 100%);
            background-color: #fffaf0;
            /* ลาย Batik เบาๆ พื้นหลัง */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fca5a5' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .calendar-day { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .calendar-day:hover { transform: scale(1.05); z-index: 10; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fee2e2; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f87171; border-radius: 10px; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .mascot-float { animation: float 4s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-6">
        
        <!-- Header Section -->

                    <div class="text-6xl md:text-7xl mascot-float">🐒</div>
                    <div>
                        <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-2">
                            Daily <span class="text-red-500">Bahasa</span>
                        </h1>
                        <p class="text-slate-500 font-semibold flex items-center gap-2">
                            <i class="ph-bold ph-map-pin text-orange-500"></i>

                    </div>
                </div>

                        🇮🇩
                    </div>
                    <div>
                        <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 mb-1">ความคืบหน้า</p>

                            <span class="text-lg font-bold text-slate-500">/ <span id="summary-total">31</span> วัน</span>

                </div>
            </div>
        </header>

        <!-- Calendar Card -->
        <main class="bg-white rounded-[3rem] p-6 md:p-10 shadow-2xl shadow-slate-200 border border-slate-50">
            
            <!-- Controls -->
            <div class="flex flex-col sm:flex-row justify-between items-center mb-10 gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-600">

                    </div>
                    <h2 id="month-year-display" class="text-2xl md:text-3xl font-black text-slate-800">Month Year</h2>
                </div>
                
                <div class="flex gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                    <button onclick="changeMonth(-1)" class="p-3 rounded-xl bg-white shadow-sm hover:bg-red-500 hover:text-white text-slate-600 transition-all">
                        <i class="ph-bold ph-arrow-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-6 py-2 rounded-xl bg-white shadow-sm hover:bg-slate-800 hover:text-white text-slate-800 font-bold transition-all text-sm uppercase tracking-wider">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-3 rounded-xl bg-white shadow-sm hover:bg-red-500 hover:text-white text-slate-600 transition-all">
                        <i class="ph-bold ph-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- Calendar Grid -->
            <div class="grid grid-cols-7 gap-3 md:gap-4 mb-4 text-center font-black text-slate-400 text-xs md:text-sm uppercase tracking-widest">
                <div class="text-red-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div class="text-blue-500">Sab</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-3 md:gap-4">
                <!-- JS generated -->
            </div>
        </main>
        
        <footer class="text-center pb-10">
            <p class="text-slate-400 font-medium">✨ เคล็ดลับ: กดที่วันที่เพื่อเริ่มสะสมคำศัพท์อินโดนีเซีย</p>

    <!-- Modal Dialog -->

        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        
        let appState = {
            completedDates: [] 
        };

            const saved = localStorage.getItem('indonesian_vocab_tracker_v1');
            if (saved) { appState = JSON.parse(saved); }
        }

            localStorage.setItem('indonesian_vocab_tracker_v1', JSON.stringify(appState));
        }

        function shuffle(array) {
            let s = [...array];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-4 rounded-3xl bg-slate-50 opacity-20 border border-slate-100"></div>`;
            }

            let completedCount = 0;
            for (let d = 1; d <= lastDate; d++) {
                const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isDone = appState.completedDates.includes(ds);
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (isDone) completedCount++;

                let cls = "calendar-day relative flex flex-col items-center justify-center p-4 rounded-[2rem] border-2 cursor-pointer min-h-[100px] shadow-sm";
                let inner = `<span class="text-2xl font-black">${d}</span>`;

                if (isDone) {
                    cls += " bg-red-50 border-red-200 text-red-600";
                    inner += `<i class="ph-fill ph-crown text-2xl mt-1 text-orange-400"></i>`;
                } else if (isToday) {
                    cls += " bg-slate-900 border-slate-900 text-white shadow-xl scale-110 z-10";
                    inner += `<span class="text-[10px] font-bold uppercase mt-1 text-red-400">Hari ini</span>`;
                } else {
                    cls += " bg-white border-slate-100 text-slate-400 hover:border-red-400 hover:text-red-500 hover:shadow-md";
                }

                grid.innerHTML += `<div class="${cls}" onclick="openDayDialog(${year}, ${month}, ${d})">${inner}</div>`;
            }

            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = lastDate;
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        function goToToday() { currentDate = new Date(); renderCalendar(); }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            const list = shuffle(vocabPool).slice(0, VOCAB_PER_SESSION);
            
            content.innerHTML = list.map((v, i) => `
                <div class="group p-6 bg-slate-50 rounded-[2rem] border-2 border-transparent hover:border-red-200 hover:bg-white transition-all">
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-3xl shadow-sm group-hover:shadow-md transition-all shrink-0">
                            ${v.icon}
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-2xl font-black text-slate-800">${v.word}</h4>
                                <button onclick="speak('${v.word.split(' (')[0]}')" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-red-500 hover:bg-red-500 hover:text-white transition-colors shadow-sm">
                                    <i class="ph-fill ph-speaker-high text-xl"></i>
                                </button>
                            </div>
                            <div class="flex gap-2 mb-4">
                                <span class="px-3 py-1 bg-red-100 text-red-700 rounded-lg text-sm font-bold">🇮🇩 ${v.meaning}</span>
                                <span class="px-3 py-1 bg-slate-200 text-slate-600 rounded-lg text-sm font-bold">🇬🇧 ${v.english}</span>
                            </div>
                            <div class="p-4 bg-white/50 rounded-2xl italic text-slate-500 text-sm border border-slate-100">
                                "${v.example}"
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            const btn = document.getElementById('btn-complete-day');
            if (isDone) {
                btn.innerHTML = `<i class="ph-bold ph-star text-2xl"></i> ทบทวนแล้ว!`;
                btn.className = "px-10 py-4 bg-orange-500 text-white font-black rounded-2xl shadow-xl shadow-orange-100 hover:bg-orange-600 transition-all flex items-center gap-3 text-lg";
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-check-circle text-2xl"></i> บันทึกการเรียน`;
                btn.className = "px-10 py-4 bg-red-500 text-white font-black rounded-2xl shadow-xl shadow-red-100 hover:bg-red-600 transition-all flex items-center gap-3 text-lg";
                btn.onclick = markComplete;
            }

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speak(text) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=id&client=tw-ob`;
            new Audio(url).play().catch(() => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'id-ID';
                    window.speechSynthesis.speak(u);
                }
            });
        }

        window.onload = () => { loadState(); renderCalendar(); };
    </script>
</body>
</html>
