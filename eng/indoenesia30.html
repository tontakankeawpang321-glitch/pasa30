<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahasa Indonesia — Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #ef4444;
            --secondary: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background: #fffaf0;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fca5a5' fill-opacity='0.08'%3E%3Cpath d='M20 18v-2h-2v2h-2v2h2v2h2v-2h2v-2h-2zm0-18V0h-2v2h-2v2h2v2h2V2h2V0h-2zM0 18v-2h-2v2h-2v2h2v2h2v-2h2v-2H0zM0 2V0H-2v2h-2v2h2v2h2V2h2V0H0z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            -webkit-tap-highlight-color: transparent;
        }

        .calendar-day { 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s;
            aspect-ratio: 1 / 1.1;
        }
        
        .calendar-day:active { transform: scale(0.92); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f87171; border-radius: 10px; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .mascot-float { animation: float 3s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* ป้องกันข้อความล้นบนมือถือ */
        .text-responsive {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-slate-800 p-3 md:p-6 min-h-screen flex flex-col items-center overflow-x-hidden">

    <div class="w-full max-w-2xl space-y-4">
        
        <!-- Header -->
        <header class="glass-card rounded-3xl p-5 md:p-8 shadow-xl shadow-red-100/30">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="text-5xl mascot-float select-none">🐒</div>
                    <div>
                        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900 leading-none">
                            Daily <span class="text-red-500">Bahasa</span>
                        </h1>
                        <p class="text-slate-500 text-xs md:text-sm font-semibold mt-1">อินโดนีเซีย 20 คำ/วัน</p>
                    </div>
                </div>

                <div class="bg-slate-900 px-4 py-3 rounded-2xl text-white shadow-lg flex items-center gap-3 border-t-2 border-red-500">
                    <div class="text-xl">🇮🇩</div>
                    <div class="leading-none">
                        <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">ความคืบหน้า</p>
                        <p class="text-xl font-black"><span id="summary-completed" class="text-red-400">0</span><span class="text-slate-500 text-sm">/<span id="summary-total">31</span></span></p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Calendar -->
        <main class="bg-white rounded-[2rem] p-4 md:p-6 shadow-xl shadow-slate-200/50 border border-slate-50">
            
            <!-- Month Controls -->
            <div class="flex justify-between items-center mb-6 px-1">
                <h2 id="month-year-display" class="text-xl md:text-2xl font-black text-slate-800">Month Year</h2>
                <div class="flex gap-1.5 bg-slate-50 p-1 rounded-xl border border-slate-100">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-lg bg-white shadow-sm hover:bg-red-50 text-slate-600 transition-all active:bg-red-500 active:text-white">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-3 py-1 rounded-lg bg-white shadow-sm font-bold text-xs uppercase tracking-tighter">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 rounded-lg bg-white shadow-sm hover:bg-red-50 text-slate-600 transition-all active:bg-red-500 active:text-white">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <!-- Week Header -->
            <div class="grid grid-cols-7 gap-1 md:gap-2 mb-2 text-center font-black text-slate-400 text-[10px] uppercase tracking-tighter">
                <div class="text-red-500">M</div><div>S</div><div>S</div><div>R</div><div>K</div><div>J</div><div class="text-blue-500">S</div>
            </div>

            <!-- Days Grid -->
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 md:gap-3">
                <!-- JS generated -->
            </div>
        </main>
        
        <footer class="text-center py-2">
            <p class="text-slate-400 text-[10px] md:text-xs font-medium">✨ แตะที่วันที่เพื่อเรียนรู้คำศัพท์</p>
        </footer>

    </div>

    <!-- Modal -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeDialog()"></div>
        
        <div class="relative w-full max-w-lg bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] shadow-2xl flex flex-col max-h-[92vh] overflow-hidden">
            <!-- Pull Bar for Mobile -->
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-3 sm:hidden"></div>

            <div class="px-6 py-5 border-b border-slate-50 flex justify-between items-start">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">🥥</div>
                    <div>
                        <h3 id="dialog-title" class="text-lg font-black text-slate-900 leading-tight">วันที่ --/--/----</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Mari Belajar! (มาเรียนกันเถอะ)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-slate-400 hover:text-red-500 transition-all active:scale-90">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            
            <div id="dialog-content" class="p-4 md:p-6 overflow-y-auto custom-scrollbar flex-1 space-y-3 bg-white">
                <!-- Vocab injected here -->
            </div>
            
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex flex-col sm:flex-row gap-3">
                <button id="btn-complete-day" class="w-full py-4 bg-red-500 text-white font-black rounded-2xl shadow-lg shadow-red-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
                    <i class="ph-bold ph-check-circle text-xl"></i> บันทึกการเรียน
                </button>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        let appState = { completedDates: [] };

        function loadState() {
            const saved = localStorage.getItem('indonesian_vocab_tracker_v1');
            if (saved) { appState = JSON.parse(saved); }
        }

        function saveState() {
            localStorage.setItem('indonesian_vocab_tracker_v1', JSON.stringify(appState));
        }

        const vocabPool = [
            { word: "Halo", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "Halo, selamat pagi!" },
            { word: "Terima kasih", meaning: "ขอบคุณ", english: "Thank you", icon: "🤝", example: "Terima kasih atas bantuannya." },
            { word: "Sama-sama", meaning: "ยินดีครับ/ค่ะ", english: "You're welcome", icon: "😊", example: "Sama-sama, senang bisa membantu." },
            { word: "Maaf", meaning: "ขอโทษ", english: "Sorry", icon: "🙏", example: "Maaf, saya terlambat." },
            { word: "Permisi", meaning: "ขออนุญาต", english: "Excuse me", icon: "🚶", example: "Permisi, boleh saya lewat?" },
            { word: "Apa kabar?", meaning: "สบายดีไหม?", english: "How are you?", icon: "✨", example: "Halo teman, apa kabar hari ini?" },
            { word: "Kabar baik", meaning: "สบายดี", english: "I'm fine", icon: "👍", example: "Kabar baik, terima kasih!" },
            { word: "Siapa nama Anda?", meaning: "คุณชื่ออะไร?", english: "What's your name?", icon: "📛", example: "Siapa nama Anda?" },
            { word: "Nama saya...", meaning: "ฉันชื่อ...", english: "My name is...", icon: "👤", example: "Nama saya Budi." },
            { word: "Berapa harganya?", meaning: "ราคาเท่าไหร่?", english: "How much?", icon: "💰", example: "Berapa harganya baju ini?" },
            { word: "Mahal sekali", meaning: "แพงมาก", english: "Too expensive", icon: "💸", example: "Wah, itu mahal sekali!" },
            { word: "Bisa kurang?", meaning: "ลดหน่อยได้ไหม?", english: "Discount?", icon: "📉", example: "Harganya bisa kurang sedikit?" },
            { word: "Saya mau makan", meaning: "ฉันอยากกินข้าว", english: "I want to eat", icon: "🍽️", example: "Saya lapar, saya mau makan." },
            { word: "Enak sekali", meaning: "อร่อยมาก", english: "Very delicious", icon: "😋", example: "Nasi goreng ini enak sekali!" },
            { word: "Pedas", meaning: "เผ็ด", english: "Spicy", icon: "🌶️", example: "Sambal ini sangat pedas!" },
            { word: "Minum", meaning: "ดื่ม", english: "Drink", icon: "🥤", example: "Saya mau minum air putih." },
            { word: "Kopi", meaning: "กาแฟ", english: "Coffee", icon: "☕", example: "Satu kopi susu, tolong." },
            { word: "Pasar", meaning: "ตลาด", english: "Market", icon: "🛒", example: "Ayo pergi ke pasar." },
            { word: "Dimana toilet?", meaning: "ห้องน้ำอยู่ไหน?", english: "Where's toilet?", icon: "🚽", example: "Permisi, dimana toilet?" },
            { word: "Cantik", meaning: "สวย", english: "Beautiful", icon: "🌸", example: "Pemandangan ini sangat cantik." },
            { word: "Selamat pagi", meaning: "สวัสดีตอนเช้า", english: "Good morning", icon: "☀️", example: "Selamat pagi, matahari terbit." },
            { word: "Selamat malam", meaning: "สวัสดีตอนกลางคืน", english: "Good night", icon: "🌙", example: "Selamat malam, selamat tidur." },
            { word: "Jalan-jalan", meaning: "ไปเที่ยว", english: "Sightseeing", icon: "🚲", example: "Besok kita jalan-jalan." },
            { word: "Pantai", meaning: "ชายหาด", english: "Beach", icon: "🏖️", example: "Pantai di Bali sangat indah." },
            { word: "Hati-hati", meaning: "ระวังตัวด้วย", english: "Be careful", icon: "⚠️", example: "Hati-hati di jalan ya!" },
            { word: "Semangat", meaning: "สู้ๆ", english: "Keep going", icon: "🔥", example: "Ayo tetap semangat belajar!" },
            { word: "Bagus", meaning: "ดี / เยี่ยม", english: "Good", icon: "👌", example: "Pekerjaan Anda sangat bagus." },
            { word: "Suka", meaning: "ชอบ", english: "Like", icon: "❤️", example: "Saya suka lagu Indonesia." },
            { word: "Tidak", meaning: "ไม่", english: "No", icon: "❌", example: "Tidak, saya tidak merokok." },
            { word: "Ya", meaning: "ใช่", english: "Yes", icon: "✅", example: "Ya, saya mengerti sekarang." },
            { word: "Kiri", meaning: "ซ้าย", english: "Left", icon: "⬅️", example: "Belok kiri setelah lampu." },
            { word: "Kanan", meaning: "ขวา", english: "Right", icon: "➡️", example: "Rumah saya di sebelah kanan." },
            { word: "Lurus", meaning: "ตรงไป", english: "Straight", icon: "⬆️", example: "Jalan lurus saja terus." },
            { word: "Tunggu", meaning: "รอ", english: "Wait", icon: "⏳", example: "Tunggu sebentar." },
            { word: "Sekarang", meaning: "ตอนนี้", english: "Now", icon: "⏰", example: "Kita berangkat sekarang." },
            { word: "Besok", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "📅", example: "Sampai jumpa besok!" },
            { word: "Cepat", meaning: "เร็ว", english: "Fast", icon: "⚡", example: "Jangan lari terlalu cepat." },
            { word: "Pelan-pelan", meaning: "ช้าๆ", english: "Slowly", icon: "🐢", example: "Bicara pelan-pelan." },
            { word: "Panas", meaning: "ร้อน", english: "Hot", icon: "🥵", example: "Hari ini sangat panas." },
            { word: "Dingin", meaning: "หนาว", english: "Cold", icon: "🥶", example: "Air ini sangat dingin." },
            { word: "Beli", meaning: "ซื้อ", english: "Buy", icon: "🛍️", example: "Saya ingin beli oleh-oleh." },
            { word: "Cinta", meaning: "รัก", english: "Love", icon: "🤟", example: "Saya cinta Indonesia." },
            { word: "Ganteng", meaning: "หล่อ", english: "Handsome", icon: "😎", example: "Aktor itu sangat ganteng." },
            { word: "Lucu", meaning: "น่ารัก/ตลก", english: "Cute", icon: "😆", example: "Kucing itu sangat lucu." },
            { word: "Haus", meaning: "หิวน้ำ", english: "Thirsty", icon: "🥤", example: "Saya haus sekali." },
            { word: "Mengerti", meaning: "เข้าใจ", english: "Understand", icon: "💡", example: "Apakah Anda mengerti?" },
            { word: "Belajar", meaning: "เรียน", english: "Learn", icon: "📚", example: "Mari kita belajar Bahasa." },
            { word: "Tidur", meaning: "นอน", english: "Sleep", icon: "😴", example: "Waktunya untuk tidur." },
            { word: "Hujan", meaning: "ฝนตก", english: "Rain", icon: "🌧️", example: "Di luar hujan deras." },
            { word: "Bantu", meaning: "ช่วย", english: "Help", icon: "🆘", example: "Tolong bantu saya." }
        ];

        function shuffle(a) {
            let s = [...a];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="rounded-xl bg-slate-50/50 opacity-10"></div>`;
            }

            let completedCount = 0;
            for (let d = 1; d <= lastDate; d++) {
                const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isDone = appState.completedDates.includes(ds);
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (isDone) completedCount++;

                let cls = "calendar-day relative flex flex-col items-center justify-center rounded-2xl border-2 cursor-pointer shadow-sm";
                let inner = `<span class="text-lg md:text-xl font-black">${d}</span>`;

                if (isDone) {
                    cls += " bg-red-50 border-red-200 text-red-600";
                    inner += `<i class="ph-fill ph-crown text-sm md:text-lg text-orange-400"></i>`;
                } else if (isToday) {
                    cls += " bg-slate-900 border-slate-900 text-white shadow-lg";
                    inner += `<span class="text-[8px] font-bold uppercase text-red-400">Today</span>`;
                } else {
                    cls += " bg-white border-slate-100 text-slate-400";
                }

                grid.innerHTML += `<div class="${cls}" onclick="openDayDialog(${year}, ${month}, ${d})">${inner}</div>`;
            }

            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = lastDate;
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        function goToToday() { currentDate = new Date(); renderCalendar(); }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            const list = shuffle(vocabPool).slice(0, VOCAB_PER_SESSION);
            
            content.innerHTML = list.map((v) => `
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex gap-4 active:bg-white transition-colors">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-2xl shadow-sm shrink-0">${v.icon}</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-slate-800">${v.word}</h4>
                            <button onclick="speak('${v.word}')" class="text-red-500 p-1 active:scale-125 transition-transform"><i class="ph-fill ph-speaker-high"></i></button>
                        </div>
                        <p class="text-xs text-slate-500 font-semibold mt-0.5">🇹🇭 ${v.meaning} | 🇬🇧 ${v.english}</p>
                        <p class="text-[10px] italic text-slate-400 mt-1">"${v.example}"</p>
                    </div>
                </div>
            `).join('');

            const btn = document.getElementById('btn-complete-day');
            if (isDone) {
                btn.innerHTML = `<i class="ph-bold ph-star text-lg"></i> ทบทวนแล้ว!`;
                btn.className = "w-full py-4 bg-orange-500 text-white font-black rounded-2xl shadow-lg shadow-orange-100 transition-all flex items-center justify-center gap-2 text-sm uppercase";
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-check-circle text-lg"></i> บันทึกการเรียน`;
                btn.className = "w-full py-4 bg-red-500 text-white font-black rounded-2xl shadow-lg shadow-red-100 transition-all flex items-center justify-center gap-2 text-sm uppercase";
                btn.onclick = markComplete;
            }

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('dialog-content').scrollTop = 0;
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speak(text) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=id&client=tw-ob`;
            new Audio(url).play().catch(() => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'id-ID';
                    window.speechSynthesis.speak(u);
                }
            });
        }

        window.onload = () => { loadState(); renderCalendar(); };
    </script>
</body>
</html>
