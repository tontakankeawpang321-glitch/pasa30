<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bahasa Indonesia — Daily App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #ef4444;
            --secondary: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background: #fffaf0;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fca5a5' fill-opacity='0.08'%3E%3Cpath d='M20 18v-2h-2v2h-2v2h2v2h2v-2h2v-2h-2zm0-18V0h-2v2h-2v2h2v2h2V2h2V0h-2zM0 18v-2h-2v2h-2v2h2v2h2v-2h2v-2H0zM0 2V0H-2v2h-2v2h2v2h2V2h2V0H0z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px; /* Space for Bottom Nav */
        }

        .calendar-day { 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            aspect-ratio: 1 / 1.1;
        }
        
        .calendar-day:active { transform: scale(0.92); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f87171; border-radius: 10px; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .mascot-float { animation: float 3s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .nav-item.active {
            color: var(--primary);
        }
    </style>
</head>
<body class="text-slate-800 p-3 md:p-6 min-h-screen flex flex-col items-center overflow-x-hidden">

    <div class="w-full max-w-2xl space-y-4">
        
        <!-- Header (Global) -->
        <header class="glass-card rounded-3xl p-5 shadow-xl shadow-red-100/30">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="text-4xl mascot-float select-none">🐒</div>
                    <div>
                        <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-slate-900 leading-none">
                            Daily <span class="text-red-500">Bahasa</span>
                        </h1>
                        <p class="text-slate-500 text-[10px] font-semibold mt-1">อินโดนีเซีย 20 คำ/วัน</p>
                    </div>
                </div>

                <div class="bg-slate-900 px-3 py-2 rounded-xl text-white shadow-lg flex items-center gap-2 border-t-2 border-red-500">
                    <div class="text-lg">🇮🇩</div>
                    <div class="leading-none">
                        <p class="text-[8px] font-bold uppercase tracking-wider text-slate-400 mb-0.5">Progress</p>
                        <p class="text-base font-black"><span id="summary-completed" class="text-red-400">0</span><span class="text-slate-500 text-xs">/<span id="summary-total">31</span></span></p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Calendar View -->
        <main class="bg-white rounded-[2rem] p-4 shadow-xl shadow-slate-200/50 border border-slate-50">
            <div class="flex justify-between items-center mb-6 px-1">
                <h2 id="month-year-display" class="text-xl font-black text-slate-800">Month Year</h2>
                <div class="flex gap-1 bg-slate-50 p-1 rounded-xl border border-slate-100">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-lg bg-white shadow-sm text-slate-600 active:bg-red-500 active:text-white"><i class="ph-bold ph-caret-left"></i></button>
                    <button onclick="goToToday()" class="px-3 py-1 rounded-lg bg-white shadow-sm font-bold text-[10px] uppercase">วันนี้</button>
                    <button onclick="changeMonth(1)" class="p-2 rounded-lg bg-white shadow-sm text-slate-600 active:bg-red-500 active:text-white"><i class="ph-bold ph-caret-right"></i></button>
                </div>
            </div>
            <div class="grid grid-cols-7 gap-1 mb-2 text-center font-black text-slate-400 text-[10px] uppercase">
                <div class="text-red-500">M</div><div>S</div><div>S</div><div>R</div><div>K</div><div>J</div><div class="text-blue-500">S</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5"></div>
        </main>

    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-100 px-6 py-3 flex justify-around items-center z-40 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <!-- ปุ่มปฏิทิน (สถานะ Active ตลอดเวลา) -->
        <div class="nav-item active flex flex-col items-center gap-1 transition-all">
            <i class="ph-fill ph-calendar-blank text-2xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">ปฏิทิน</span>
        </div>
        
        <!-- ปุ่มบทสนทนา (กดแล้วเด้งไปหน้าเว็บแปลภาษาอินโดนีเซียแบบหน้าต่างใหม่ทันที) -->
        <a href="https://translate.google.com/?sl=th&tl=id" target="_blank" rel="noopener noreferrer" class="nav-item flex flex-col items-center gap-1 transition-all text-slate-300 hover:text-red-500 active:scale-95">
            <i class="ph-fill ph-chats-circle text-2xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">บทสนทนา</span>
        </a>
    </nav>

    <!-- Modal (Vocab) -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-0">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeDialog()"></div>
        <div class="relative w-full max-w-lg bg-white rounded-t-[2.5rem] shadow-2xl flex flex-col max-h-[92vh] overflow-hidden">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-3 sm:hidden"></div>
            <div class="px-6 py-5 border-b border-slate-50 flex justify-between items-start">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">🥥</div>
                    <div>
                        <h3 id="dialog-title" class="text-lg font-black text-slate-900 leading-tight">วันที่ --/--/----</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Mari Belajar!</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl active:scale-90"><i class="ph-bold ph-x text-xl"></i></button>
            </div>
            <div id="dialog-content" class="p-4 overflow-y-auto custom-scrollbar flex-1 space-y-3 bg-white"></div>
            <div class="p-6 bg-slate-50 border-t border-slate-100">
                <button id="btn-complete-day" class="w-full py-4 bg-red-500 text-white font-black rounded-2xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-sm uppercase">
                    <i class="ph-bold ph-check-circle text-xl"></i> บันทึกการเรียน
                </button>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        let appState = { completedDates: [] };

        const vocabPool = [
            { word: "Halo", phonetic: "ฮาโล", meaning: "สวัสดี", english: "Hello", icon: "👋", example: "Halo, selamat pagi!" },
            { word: "Terima kasih", phonetic: "เตรีมา กาซี", meaning: "ขอบคุณ", english: "Thank you", icon: "🤝", example: "Terima kasih atas bantuannya." },
            { word: "Sama-sama", phonetic: "ซามา ซามา", meaning: "ยินดีครับ/ค่ะ", english: "You're welcome", icon: "😊", example: "Sama-sama, senang bisa membantu." },
            { word: "Maaf", phonetic: "มาอัฟ", meaning: "ขอโทษ", english: "Sorry", icon: "🙏", example: "Maaf, saya terlambat." },
            { word: "Permisi", phonetic: "เปอร์มีซี", meaning: "ขออนุญาต", english: "Excuse me", icon: "🚶", example: "Permisi, boleh saya lewat?" },
            { word: "Apa kabar?", phonetic: "อาปา กาบาร์?", meaning: "สบายดีไหม?", english: "How are you?", icon: "✨", example: "Halo teman, apa kabar hari ini?" },
            { word: "Kabar baik", phonetic: "กาบาร์ ไบก์", meaning: "สบายดี", english: "I'm fine", icon: "👍", example: "Kabar baik, terima kasih!" },
            { word: "Siapa nama Anda?", phonetic: "เซียปา นามา อันดา?", meaning: "คุณชื่ออะไร?", english: "What's your name?", icon: "📛", example: "Siapa nama Anda?" },
            { word: "Nama saya...", phonetic: "นามา ซายา...", meaning: "ฉันชื่อ...", english: "My name is...", icon: "👤", example: "Nama saya Budi." },
            { word: "Berapa harganya?", phonetic: "เบอราปา ฮาร์กานยา?", meaning: "ราคาเท่าไหร่?", english: "How much?", icon: "💰", example: "Berapa harganya baju ini?" },
            { word: "Mahal sekali", phonetic: "มาฮัล เซอกาลี", meaning: "แพงมาก", english: "Too expensive", icon: "💸", example: "Wah, itu mahal sekali!" },
            { word: "Bisa kurang?", phonetic: "บีซา กูรัง?", meaning: "ลดหน่อยได้ไหม?", english: "Discount?", icon: "📉", example: "Harganya bisa kurang sedikit?" },
            { word: "Saya mau makan", phonetic: "ซายา เมา มากัน", meaning: "ฉันอยากกินข้าว", english: "I want to eat", icon: "🍽️", example: "Saya lapar, saya mau makan." },
            { word: "Enak sekali", phonetic: "เอนัก เซอกาลี", meaning: "อร่อยมาก", english: "Very delicious", icon: "😋", example: "Nasi goreng ini enak sekali!" },
            { word: "Pedas", phonetic: "เปอดัส", meaning: "เผ็ด", english: "Spicy", icon: "🌶️", example: "Sambal ini sangat pedas!" },
            { word: "Minum", phonetic: "มีนุม", meaning: "ดื่ม", english: "Drink", icon: "🥤", example: "Saya mau minum air putih." },
            { word: "Kopi", phonetic: "โกปี", meaning: "กาแฟ", english: "Coffee", icon: "☕", example: "Satu kopi susu, tolong." },
            { word: "Pasar", phonetic: "ปาซาร์", meaning: "ตลาด", english: "Market", icon: "🛒", example: "Ayo pergi ke pasar." },
            { word: "Dimana toilet?", phonetic: "ดีมานา ตอยเลต?", meaning: "ห้องน้ำอยู่ไหน?", english: "Where's toilet?", icon: "🚽", example: "Permisi, dimana toilet?" },
            { word: "Cantik", phonetic: "จันติก", meaning: "สวย", english: "Beautiful", icon: "🌸", example: "Pemandangan ini sangat cantik." },
            { word: "Selamat pagi", phonetic: "เซอละมัต ปากี", meaning: "สวัสดีตอนเช้า", english: "Good morning", icon: "☀️", example: "Selamat pagi, matahari terbit." },
            { word: "Selamat malam", phonetic: "เซอละมัต มาลัม", meaning: "สวัสดีตอนกลางคืน", english: "Good night", icon: "🌙", example: "Selamat malam, selamat tidur." },
            { word: "Jalan-jalan", phonetic: "จาลัน-จาลัน", meaning: "ไปเที่ยว", english: "Sightseeing", icon: "🚲", example: "Besokเราไปเดินเล่นกัน." },
            { word: "Pantai", phonetic: "ปันไต", meaning: "ชายหาด", english: "Beach", icon: "🏖️", example: "Pantai di Bali sangat indah." },
            { word: "Hati-hati", phonetic: "ฮาตี-ฮาตี", meaning: "ระวังตัวด้วย", english: "Be careful", icon: "⚠️", example: "Hati-hati di jalan ya!" },
            { word: "Semangat", phonetic: "เซอมังงัต", meaning: "สู้ๆ", english: "Keep going", icon: "🔥", example: "Ayo tetap semangat belajar!" },
            { word: "Bagus", phonetic: "บากุส", meaning: "ดี / เยี่ยม", english: "Good", icon: "👌", example: "Pekerjaan Anda sangat bagus." },
            { word: "Suka", phonetic: "ซูกา", meaning: "ชอบ", english: "Like", icon: "❤️", example: "Saya suka lagu Indonesia." },
            { word: "Tidak", phonetic: "ตีดัก", meaning: "ไม่", english: "No", icon: "❌", example: "Tidak, saya tidak merokok." },
            { word: "Ya", phonetic: "ยา", meaning: "ใช่", english: "Yes", icon: "✅", example: "Ya, saya mengerti sekarang." },
            { word: "Kiri", phonetic: "กีรี", meaning: "ซ้าย", english: "Left", icon: "⬅️", example: "Belok kiriหลังจากไฟแดง." },
            { word: "Kanan", phonetic: "กานัน", meaning: "ขวา", english: "Right", icon: "➡️", example: "Rumah saya di sebelah kanan." },
            { word: "Lurus", phonetic: "ลูรุส", meaning: "ตรงไป", english: "Straight", icon: "⬆️", example: "Jalan lurus saja terus." },
            { word: "Tunggu", phonetic: "ตุงกู", meaning: "รอ", english: "Wait", icon: "⏳", example: "Tunggu sebentar." },
            { word: "Sekarang", phonetic: "เซอการัง", meaning: "ตอนนี้", english: "Now", icon: "⏰", example: "Kita berangkat sekarang." },
            { word: "Besok", phonetic: "เบอซก", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "📅", example: "Sampai jumpa besok!" },
            { word: "Cepat", phonetic: "เจอปัต", meaning: "เร็ว", english: "Fast", icon: "⚡", example: "Jangan lari terlalu cepat." },
            { word: "Pelan-pelan", phonetic: "เปอลัน-เปอลัน", meaning: "ช้าๆ", english: "Slowly", icon: "🐢", example: "Bicara pelan-pelan." },
            { word: "Panas", phonetic: "ปานัส", meaning: "ร้อน", english: "Hot", icon: "🥵", example: "Hari ini sangat panas." },
            { word: "Dingin", phonetic: "ดีงืน", meaning: "หนาว / เย็น", english: "Cold", icon: "🥶", example: "Airนี้เย็นมาก." },
            { word: "Beli", phonetic: "เบอลี", meaning: "ซื้อ", english: "Buy", icon: "🛍️", example: "Saya ingin beli oleh-oleh." },
            { word: "Cinta", phonetic: "จินตา", meaning: "รัก", english: "Love", icon: "🤟", example: "Saya cinta Indonesia." },
            { word: "Ganteng", phonetic: "กันเต็ง", meaning: "หล่อ", english: "Handsome", icon: "😎", example: "Aktorนั้นหล่อมาก." },
            { word: "Lucu", phonetic: "ลูจู", meaning: "น่ารัก/ตลก", english: "Cute", icon: "😆", example: "Kucingนั้นน่ารักมาก." },
            { word: "Haus", phonetic: "ฮาอุส", meaning: "หิวน้ำ", english: "Thirsty", icon: "🥤", example: "Saya haus sekali." },
            { word: "Mengerti", phonetic: "เมองือร์ตี", meaning: "เข้าใจ", english: "Understand", icon: "💡", example: "Apakah Anda mengerti?" },
            { word: "Belajar", phonetic: "เบอลาจาร์", meaning: "เรียน", english: "Learn", icon: "📚", example: "Mari kita belajar Bahasa." },
            { word: "Tidur", phonetic: "ตีดุร์", meaning: "นอน", english: "Sleep", icon: "😴", example: "Waktunya untuk tidur." },
            { word: "Hujan", phonetic: "ฮูจัน", meaning: "ฝนตก", english: "Rain", icon: "🌧️", example: "Di luar hujan deras." },
            { word: "Bantu", phonetic: "บันตู", meaning: "ช่วย", english: "Help", icon: "🆘", example: "Tolong bantu saya." }
        ];

        function shuffle(a) {
            let s = [...a];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="rounded-xl bg-slate-50/50 opacity-10"></div>`;

            let completedCount = 0;
            for (let d = 1; d <= lastDate; d++) {
                const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isDone = appState.completedDates.includes(ds);
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (isDone) completedCount++;

                let cls = "calendar-day relative flex flex-col items-center justify-center rounded-2xl border-2 cursor-pointer shadow-sm bg-white";
                let inner = `<span class="text-base font-black">${d}</span>`;

                if (isDone) { cls += " bg-red-50 border-red-200 text-red-600"; inner += `<i class="ph-fill ph-crown text-xs text-orange-400"></i>`; }
                else if (isToday) { cls += " bg-slate-900 border-slate-900 text-white shadow-lg"; inner += `<span class="text-[6px] font-bold uppercase text-red-400">Today</span>`; }
                else { cls += " border-slate-100 text-slate-400"; }

                grid.innerHTML += `<div class="${cls}" onclick="openDayDialog(${year}, ${month}, ${d})">${inner}</div>`;
            }
            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = lastDate;
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        function goToToday() { currentDate = new Date(); renderCalendar(); }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            document.getElementById('dialog-title').innerText = `${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            const list = shuffle(vocabPool).slice(0, VOCAB_PER_SESSION);
            
            content.innerHTML = list.map((v) => `
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex gap-4 active:bg-white transition-colors">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-2xl shadow-sm shrink-0">${v.icon}</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-slate-800 text-base">${v.word}</h4>
                            <button onclick="speak('${v.word}')" class="text-red-500 p-1 active:scale-125 transition-transform"><i class="ph-fill ph-speaker-high"></i></button>
                        </div>
                        <p class="text-[10px] text-red-500 font-bold -mt-1 mb-1">อ่านว่า: [ ${v.phonetic} ]</p>
                        <p class="text-[10px] text-slate-500 font-semibold">🇹🇭 ${v.meaning} | 🇬🇧 ${v.english}</p>
                        <p class="text-[9px] italic text-slate-400 mt-1">"${v.example}"</p>
                    </div>
                </div>
            `).join('');

            const btn = document.getElementById('btn-complete-day');
            btn.innerHTML = isDone ? `<i class="ph-bold ph-star text-lg"></i> ทบทวนแล้ว!` : `<i class="ph-bold ph-check-circle text-lg"></i> บันทึกการเรียน`;
            btn.onclick = isDone ? closeDialog : markComplete;
            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDialog() { document.getElementById('vocab-dialog').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        
        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                localStorage.setItem('indonesian_vocab_tracker_v1', JSON.stringify(appState));
                renderCalendar();
            }
            closeDialog();
        }

        // แก้ไขระบบเสียงจาก Google Translate URL เป็น Web Speech API
        function speak(text) {
            if ('speechSynthesis' in window) {
                // ยกเลิกเสียงที่กำลังพูดอยู่ (ถ้ามี)
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID'; // กำหนดให้เป็นภาษาอินโดนีเซีย
                
                window.speechSynthesis.speak(utterance);
            } else {
                console.error("เบราว์เซอร์นี้ไม่รองรับระบบ Speech Synthesis");
            }
        }

        window.onload = () => { 
            const saved = localStorage.getItem('indonesian_vocab_tracker_v1');
            if (saved) appState = JSON.parse(saved);
            renderCalendar(); 
        };
    </script>
</body>
</html>
