<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ท่องฮินดี — Hindi Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Jost:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --peacock-teal: #008080;
            --india-saffron: #FF9933;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f0fdfa 0%, #fff7ed 100%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        .font-english { font-family: 'Jost', sans-serif; }
        .font-hindi { font-family: 'Noto Sans Devanagari', sans-serif; line-height: 1.6; }

        /* Smooth Mobile Scrolling */
        .custom-scrollbar {
            -webkit-overflow-scrolling: touch;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00808055; border-radius: 10px; }

        /* Performance Optimized Animations */
        .calendar-day {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s ease;
            will-change: transform;
        }
        .calendar-day:active { transform: scale(0.92); }

        .india-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        @keyframes soft-pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0.3); }
            70% { box-shadow: 0 0 0 10px rgba(0, 128, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0); }
        }
        .today-pulse { animation: soft-pulse 2s infinite; }

        /* Layout Fix for very small screens */
        @media (max-width: 360px) {
            .day-text { font-size: 1rem !important; }
            .calendar-day { min-height: 70px !important; padding: 0.5rem !important; }
        }

        /* Bottom Nav shadow */
        .nav-shadow {
            box-shadow: 0 -4px 20px -5px rgba(0, 128, 128, 0.1);
        }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">

    <!-- Main Container with padding for bottom nav -->
    <div class="max-w-4xl mx-auto p-4 md:p-8 space-y-6 pb-28">
        <!-- Header -->
        <header class="india-card rounded-[2.5rem] p-6 shadow-xl shadow-teal-900/5 flex flex-col sm:flex-row items-center gap-6 border border-white/50">
            <div class="flex items-center gap-4 text-center sm:text-left">
                <div class="text-5xl md:text-7xl">🦚</div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-700 to-orange-500">
                        Namaste Hindi
                    </h1>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">เรียนฮินดีกับนกยูง 🇮🇳</p>
                </div>
            </div>

            <div class="sm:ml-auto w-full sm:w-auto bg-gradient-to-br from-teal-600 to-teal-800 p-4 rounded-3xl text-white shadow-lg flex items-center justify-between sm:justify-start gap-4">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl">🏆</div>
                <div>
                    <p class="text-[10px] opacity-70 font-bold uppercase leading-none">ความคืบหน้า</p>
                    <p class="text-xl font-black"><span id="summary-completed">0</span><span class="text-sm opacity-50"> / <span id="summary-total">30</span> วัน</span></p>
                </div>
            </div>
        </header>

        <!-- Calendar -->
        <main class="india-card rounded-[2.5rem] p-5 md:p-10 shadow-xl shadow-teal-900/5 border border-white/50">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                <h2 id="month-year-display" class="text-2xl font-black text-slate-800 flex items-center gap-2">
                    <i class="ph-bold ph-calendar-star text-teal-600"></i>
                    <span>Month Year</span>
                </h2>
                
                <div class="flex items-center gap-1 bg-slate-100/50 p-1.5 rounded-2xl w-full sm:w-auto justify-between sm:justify-start">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-sm active:bg-teal-600 active:text-white transition-all text-teal-600">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-4 py-2 font-bold text-slate-600 text-xs uppercase tracking-tighter">วันนี้</button>
                    <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white shadow-sm active:bg-teal-600 active:text-white transition-all text-teal-600">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-2 md:gap-4 mb-2 text-center text-[10px] font-black uppercase text-slate-400 tracking-wider">
                <div class="text-rose-400">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-sky-400">Sat</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-2 md:gap-4">
                <!-- Days Generated by JS -->
            </div>
        </main>

        <p class="text-center text-slate-400 text-[10px] md:text-xs font-medium italic">
            💡 กดที่วันที่เพื่อเปิดการ์ดคำศัพท์ | 🦚 แตะไอคอนลำโพงเพื่อฟังเสียง
        </p>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-xl border-t border-teal-50 px-6 py-3 pb-6 sm:pb-3 flex justify-around items-center nav-shadow">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center gap-1 text-teal-600 group">
            <div class="w-12 h-12 rounded-2xl bg-teal-50 flex items-center justify-center transition-all group-active:scale-90">
                <i class="ph-fill ph-calendar text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-widest">ปฏิทิน</span>
        </button>
        
        <a href="https://gemini.google.com" target="_blank" class="flex flex-col items-center gap-1 text-slate-400 hover:text-orange-500 group transition-colors">
            <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center transition-all group-active:scale-90 group-hover:bg-orange-50">
                <i class="ph-bold ph-chat-centered-text text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-widest">คุยสนทนา</span>
        </a>
    </nav>

    <!-- Mobile-Optimized Dialog -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-teal-900/60 backdrop-blur-sm" onclick="closeDialog()"></div>
        
        <div class="relative w-full max-w-2xl bg-white rounded-t-[2.5rem] sm:rounded-[3rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <!-- Header -->
            <div class="px-6 py-5 border-b flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🦚</span>
                    <h3 id="dialog-title" class="text-lg font-black text-teal-700 truncate max-w-[150px] sm:max-w-none">วันที่ --/--</h3>
                </div>
                <button onclick="closeDialog()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-500 active:bg-rose-100 active:text-rose-500">
                    <i class="ph-bold ph-x"></i>
                </button>
            </div>
            
            <!-- List Content -->
            <div id="dialog-content" class="p-4 md:p-8 overflow-y-auto custom-scrollbar flex-1 space-y-4">
                <!-- Vocab cards -->
            </div>
            
            <!-- Footer -->
            <div class="p-6 bg-slate-50 border-t shrink-0">
                <button id="btn-complete-day" class="w-full py-4 bg-teal-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
                    <i class="ph-bold ph-check-circle text-xl"></i>
                    <span>บันทึกความสำเร็จ!</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        
        let currentDate = new Date();
        let today = new Date();
        let selectedDateString = null;
        let appState = { completedDates: [] };

        // คำศัพท์ 50 คำ (คัดเฉพาะพื้นฐานและประโยคสั้น)
        const vocabPool = [
            { word: "नमस्ते (นมัสเต)", meaning: "สวัสดี", english: "Hello", icon: "🙏", example: "नमस्ते, आप कैसे हैं?" },
            { word: "धन्यवाद (ธัน-ยะ-วาท)", meaning: "ขอบคุณ", english: "Thank you", icon: "💐", example: "मदद के लिए धन्यवाद।" },
            { word: "हाँ (ฮาง)", meaning: "ใช่", english: "Yes", icon: "✅", example: "हाँ, मैं समझ गया।" },
            { word: "नहीं (นะ-ฮี)", meaning: "ไม่", english: "No", icon: "❌", example: "नहीं, मुझे नहीं चाहिए।" },
            { word: "सुप्रभात (ซู-พรา-พาท)", meaning: "อรุณสวัสดิ์", english: "Good Morning", icon: "☀️", example: "सुप्रभात! आपका दिन अच्छा हो।" },
            { word: "शुभ रात्रि (ชูบ รา-ตรี)", meaning: "ราตรีสวัสดิ์", english: "Good Night", icon: "🌙", example: "शुभ रात्रि, मीठे सपने।" },
            { word: "आप कैसे हैं? (อาป ไก-เซ แฮ็ง?)", meaning: "สบายดีไหม?", english: "How are you?", icon: "❓", example: "नमस्ते, आप कैसे हैं?" },
            { word: "मैं ठीक हूँ (แมง ตี๊ก ฮุง)", meaning: "ฉันสบายดี", english: "I'm fine", icon: "😊", example: "मैं ठीक हूँ, शुक्रिया।" },
            { word: "आपका नाम क्या है?", meaning: "คุณชื่ออะไร?", english: "Your name?", icon: "📛", example: "नमस्ते, आपका नाम क्या है?" },
            { word: "पानी (ปา-นี)", meaning: "น้ำ", english: "Water", icon: "💧", example: "मुझे पानी चाहिए।" },
            { word: "खाना (กา-นา)", meaning: "อาหาร", english: "Food", icon: "🍛", example: "खाना बहुत स्वादिष्ट है।" },
            { word: "चाय (ชาย)", meaning: "ชา", english: "Tea", icon: "☕", example: "एक कप चाय, प्लीज।" },
            { word: "बहुत (บะ-ฮุต)", meaning: "มาก", english: "Very", icon: "📈", example: "आज बहुत गर्मी है।" },
            { word: "सुंदर (ซุน-ดัร)", meaning: "สวย", english: "Beautiful", icon: "🌹", example: "यह बहुत सुंदर है।" },
            { word: "घर (กัร)", meaning: "บ้าน", english: "Home", icon: "🏠", example: "मैं घर जा रहा हूँ।" },
            { word: "समय (ซะ-มัย)", meaning: "เวลา", english: "Time", icon: "⏰", example: "क्या समय हुआ है?" },
            { word: "सीขना (ซีค-นา)", meaning: "เรียนรู้", english: "Learn", icon: "🎓", example: "मैं हिंदी सीख रहा हूँ।" },
            { word: "दोस्त (โดสต์)", meaning: "เพื่อน", english: "Friend", icon: "👫", example: "वह मेरा दोस्त है।" },
            { word: "शुभकामनाएं", meaning: "โชคดีนะ", english: "Best wishes", icon: "🍀", example: "आपको शुभकामनाएं।" },
            { word: "जल्दी (จัล-ดี)", meaning: "เร็วๆ", english: "Quickly", icon: "🏃", example: "जल्दी आओ!" },
            { word: "माफ कीजिए", meaning: "ขอโทษ", english: "Sorry", icon: "🙇", example: "माफ कीजिए, मुझे देर हो गई।" },
            { word: "अलविदा", meaning: "ลาก่อน", english: "Goodbye", icon: "👋", example: "फिर मिलेंगे, अलविदा।" },
            { word: "कितना?", meaning: "เท่าไหร่?", english: "How much?", icon: "💰", example: "इसका दाम कितना है?" },
            { word: "स्वाद", meaning: "รสชาติ", english: "Taste", icon: "👅", example: "इसका स्वाद अच्छा है।" },
            { word: "मदद", meaning: "ช่วย", english: "Help", icon: "🆘", example: "क्या आप मेरी मदद करेंगे?" }
        ];

        function loadState() {
            const saved = localStorage.getItem('hindi_mobile_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('hindi_mobile_v1', JSON.stringify(appState));
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').querySelector('span').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-2 rounded-2xl bg-teal-50/10 border border-dashed border-teal-100 opacity-20"></div>`;
            }

            let completed = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const ds = `${year}-${month+1}-${d}`;
                const done = appState.completedDates.includes(ds);
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (done) completed++;

                let stateCls = done ? "bg-white border-teal-500 text-teal-700 shadow-sm" : 
                               isToday ? "bg-teal-600 border-transparent text-white today-pulse" : 
                               "bg-white border-slate-100 text-slate-600";

                grid.innerHTML += `
                    <div class="calendar-day relative flex flex-col items-center justify-center p-2 rounded-2xl border-2 cursor-pointer min-h-[80px] md:min-h-[100px] ${stateCls}" 
                         onclick="openDayDialog(${year}, ${month}, ${d})">
                        <span class="text-xl font-black font-english day-text">${d}</span>
                        ${done ? '<div class="absolute -top-1 -right-1 text-xs">🦚</div>' : ''}
                        ${isToday && !done ? '<span class="text-[8px] font-bold uppercase mt-1">Today</span>' : ''}
                    </div>`;
            }

            document.getElementById('summary-completed').innerText = completed;
            document.getElementById('summary-total').innerText = daysInMonth;
        }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${m+1}-${d}`;
            const done = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `ภารกิจวันที่ ${d} ${MONTH_NAMES[m]}`;
            const content = document.getElementById('dialog-content');
            content.innerHTML = '';

            const list = [...vocabPool].sort(() => 0.5 - Math.random()).slice(0, VOCAB_PER_SESSION);
            list.forEach((v, i) => {
                const wordOnly = v.word.split(' (')[0];
                content.innerHTML += `
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100 flex gap-4 items-start active:bg-white active:shadow-md transition-all">
                        <div class="w-8 h-8 shrink-0 bg-teal-100 text-teal-700 rounded-lg flex items-center justify-center text-xs font-black font-english">${i+1}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2">
                                <h4 class="text-lg font-black text-slate-800 font-hindi truncate">${v.icon} ${v.word}</h4>
                                <button onclick="speak('${wordOnly}')" class="w-8 h-8 flex items-center justify-center bg-white border rounded-full text-teal-600 active:bg-teal-600 active:text-white shrink-0">
                                    <i class="ph-fill ph-speaker-high"></i>
                                </button>
                            </div>
                            <div class="flex flex-wrap gap-1.5 mt-2">
                                <span class="text-[10px] font-bold bg-white px-2 py-1 rounded-md border text-teal-700">🇹🇭 ${v.meaning}</span>
                                <span class="text-[10px] font-bold bg-white px-2 py-1 rounded-md border text-blue-700 font-english">${v.english}</span>
                            </div>
                            <p class="mt-3 text-xs text-slate-400 font-hindi italic truncate">"${v.example}"</p>
                        </div>
                    </div>`;
            });

            const btn = document.getElementById('btn-complete-day');
            if (done) {
                btn.innerHTML = `<i class="ph-bold ph-check"></i> ทบทวนเรียบร้อยแล้ว`;
                btn.className = "w-full py-4 bg-slate-200 text-slate-500 font-black rounded-2xl";
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-check-circle"></i> บันทึกความสำเร็จ!`;
                btn.className = "w-full py-4 bg-teal-600 text-white font-black rounded-2xl shadow-lg active:scale-95";
                btn.onclick = markComplete;
            }

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speak(text) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=hi&client=tw-ob`;
            new Audio(url).play().catch(() => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'hi-IN'; u.rate = 0.9;
                    window.speechSynthesis.speak(u);
                }
            });
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        function goToToday() { currentDate = new Date(); renderCalendar(); }

        window.onload = () => { loadState(); renderCalendar(); };
    </script>
</body>
</html>
