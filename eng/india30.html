<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท่องฮินดี — Hindi Calendar Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Jost:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --india-saffron: #FF9933;
            --india-white: #FFFFFF;
            --india-green: #138808;
            --india-blue: #000080;
            --peacock-teal: #008080;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f0fdfa 0%, #fff7ed 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        h1, h2, h3, .font-english {
            font-family: 'Jost', 'Sarabun', sans-serif; 
        }

        .font-hindi {
            font-family: 'Noto Sans Devanagari', 'Sarabun', sans-serif;
            line-height: 1.6;
        }

        /* Mandala Background Decoration */
        .mandala-bg {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23008080' fill-opacity='0.05' d='M100,0 A100,100 0 1,1 100,200 A100,100 0 1,1 100,0 M100,20 L100,180 M20,100 L180,100 M43,43 L157,157 M43,157 L157,43' stroke='%23008080' stroke-width='1'/%3E%3C/svg%3E");
            z-index: -1;
            opacity: 0.5;
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f0fdfa; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #008080; border-radius: 10px; border: 2px solid #f0fdfa; }
        
        .calendar-day { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .calendar-day:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 15px 30px -10px rgba(0, 128, 128, 0.2); }

        .india-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 128, 128, 0.1);
        }

        @keyframes pulse-teal {
            0% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 128, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 128, 128, 0); }
        }
        .today-pulse { animation: pulse-teal 2.5s infinite; }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8">
    <div class="mandala-bg"></div>
    
    <div class="max-w-5xl mx-auto space-y-8">
        <!-- Header Section -->
        <header class="india-card rounded-[3rem] p-6 md:p-10 shadow-2xl shadow-teal-100/50 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-6">
                <div class="text-6xl md:text-7xl animate-bounce drop-shadow-xl" style="animation-duration: 4s;">🦚</div>
                <div>
                    <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-600 via-emerald-500 to-orange-500">
                        Namaste Hindi
                    </h1>
                    <p class="text-slate-500 font-bold mt-2 flex items-center gap-2">
                        <span class="bg-teal-100 text-teal-600 px-3 py-1 rounded-full text-xs uppercase">National Bird Mission</span>
                        ฝึกภาษากับนกยูงแสนสวย วันละ 20 คำ! 🇮🇳
                    </p>
                </div>
            </div>

            <div class="bg-gradient-to-br from-teal-600 to-indigo-700 p-6 rounded-[2.5rem] w-full md:w-72 shadow-xl shadow-teal-200 text-white transform hover:rotate-2 transition-transform">
                <div class="flex items-center gap-4">
                    <div class="bg-white/20 w-12 h-12 rounded-2xl flex items-center justify-center text-2xl">🕉️</div>
                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-teal-100">ความสำเร็จเดือนนี้</p>
                        <p class="text-3xl font-black">
                            <span id="summary-completed">0</span><span class="text-lg opacity-60"> / <span id="summary-total">30</span></span>
                        </p>
                    </div>
                </div>
                <div class="mt-4 h-1.5 bg-white/10 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-orange-400 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Calendar Section -->
        <main class="india-card rounded-[3rem] p-6 md:p-10 shadow-2xl shadow-teal-100/30">
            <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-teal-600 rounded-2xl flex items-center justify-center shadow-lg shadow-teal-200">
                        <i class="ph-bold ph-calendar-blank text-white text-2xl"></i>
                    </div>
                    <h2 id="month-year-display" class="text-3xl font-black text-slate-800 tracking-tight">Month Year</h2>
                </div>
                
                <div class="flex items-center gap-2 bg-teal-50 p-2 rounded-3xl">
                    <button onclick="changeMonth(-1)" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white shadow-sm hover:bg-teal-600 hover:text-white transition-all active:scale-90 text-teal-600">
                        <i class="ph-bold ph-caret-left"></i>
                    </button>
                    <button onclick="goToToday()" class="px-6 py-2.5 rounded-2xl bg-white shadow-sm hover:bg-teal-100 font-bold text-slate-700 transition-all active:scale-95 text-sm uppercase tracking-tighter">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white shadow-sm hover:bg-teal-600 hover:text-white transition-all active:scale-90 text-teal-600">
                        <i class="ph-bold ph-caret-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-3 md:gap-5 mb-4 text-center font-black text-teal-300 text-xs uppercase tracking-[0.2em]">
                <div class="text-rose-500">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class="text-blue-500">Sat</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-3 md:gap-5">
                <!-- JS generated days -->
            </div>
        </main>

        <footer class="text-center text-slate-400 font-medium pb-10">
            <p>กดที่วันที่เพื่อเริ่มเรียนรู้คำศัพท์ใหม่ๆ กับนกยูง 🦚✨</p>
        </footer>
    </div>

    <!-- Dialog -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-teal-900/40 backdrop-blur-md transition-opacity" onclick="closeDialog()"></div>
        
        <div class="relative w-full max-w-4xl bg-[#fdfdfd] rounded-[3.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] flex flex-col max-h-[92vh] overflow-hidden border-[6px] border-white">
            <!-- Modal Header -->
            <div class="px-8 md:px-12 py-8 bg-white border-b border-teal-50 flex justify-between items-center relative z-10">
                <div class="flex items-center gap-5">
                    <div class="text-5xl">🦚</div>
                    <div>
                        <h3 id="dialog-title" class="text-2xl md:text-3xl font-black text-teal-700">วันที่ --/--/----</h3>
                        <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-1">Daily Vocabulary Mission</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="w-12 h-12 flex items-center justify-center bg-slate-100 hover:bg-rose-50 hover:text-rose-500 rounded-2xl transition-all">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div id="dialog-content" class="p-6 md:p-12 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                <!-- Vocab list -->
            </div>
            
            <!-- Modal Footer -->
            <div class="px-10 py-8 bg-white border-t border-teal-50 flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3 text-teal-400 font-bold italic">
                    <i class="ph-fill ph-lightbulb text-2xl"></i>
                    <span>เคล็ดลับ: ฟังเสียงและออกเสียงตามนกยูงนะ!</span>
                </div>
                <button id="btn-complete-day" class="w-full md:w-auto px-10 py-4 bg-gradient-to-r from-teal-600 to-indigo-600 text-white font-black rounded-[2rem] shadow-xl shadow-teal-500/40 hover:scale-105 transition-all active:scale-95 flex items-center justify-center gap-3 text-lg">
                    <i class="ph-bold ph-seal-check text-2xl"></i> 
                    <span>ภารกิจเสร็จสิ้น!</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        let currentDate = new Date();
        let today = new Date();
        let selectedDateString = null;
        let appState = { completedDates: [] };

        const vocabPool = [
            { word: "नमस्ते (นมัสเต)", meaning: "สวัสดี", english: "Hello / Greetings", icon: "🙏", example: "नमस्ते, आप कैसे हैं? (สวัสดีครับ คุณเป็นอย่างไรบ้าง?)" },
            { word: "धन्यवाद (ธัน-ยะ-วาท)", meaning: "ขอบคุณ", english: "Thank you", icon: "💐", example: "आपकी मदद के लिए धन्यवाद। (ขอบคุณสำหรับความช่วยเหลือของคุณ)" },
            { word: "शुक्रिया (ชู-กรี-ยา)", meaning: "ขอบคุณ (แบบกันเอง)", english: "Thank you", icon: "🤝", example: "बहुत-बहुत शुक्रिया! (ขอบคุณมากๆ เลย!)" },
            { word: "हाँ (ฮาง)", meaning: "ใช่ / ครับ / ค่ะ", english: "Yes", icon: "✅", example: "हाँ, मैं आऊंगा। (ใช่ ฉันจะไป)" },
            { word: "नहीं (นะ-ฮี)", meaning: "ไม่", english: "No", icon: "❌", example: "नहीं, मुझे नहीं पता। (ไม่ ฉันไม่รู้)" },
            { word: "क्षमा कीजिए (กะ-มา กี-จี-เย)", meaning: "ขออภัย / ขอโทษ", english: "Excuse me / Sorry", icon: "🙇", example: "क्षमा कीजिए, क्या आप मेरी मदद कर सकते हैं? (ขอโทษนะคะ ช่วยฉันหน่อยได้ไหม?)" },
            { word: "सुप्रभात (ซู-พรา-พาท)", meaning: "อรุณสวัสดิ์", english: "Good Morning", icon: "☀️", example: "सुप्रभात! आपका दिन अच्छा हो। (อรุณสวัสดิ์! ขอให้เป็นวันที่ดีนะ)" },
            { word: "शुभ रात्रि (ชูบ รา-ตรี)", meaning: "ราตรีสวัสดิ์", english: "Good Night", icon: "🌙", example: "शुभ रात्रि, मीठे सपने। (ราตรีสวัสดิ์ ฝันดีนะ)" },
            { word: "अलविदा (อัล-วี-ดา)", meaning: "ลาก่อน", english: "Goodbye", icon: "👋", example: "अभी के लिए अलविदा। (ตอนนี้ต้องลาก่อนนะ)" },
            { word: "फिर मिलेंगे (ฟีร์ มิ-เลง-เก)", meaning: "แล้วพบกันใหม่", english: "See you again", icon: "🔁", example: "कल फिर मिलेंगे। (พรุ่งนี้พบกันใหม่)" },
            { word: "आप कैसे हैं? (อาป ไก-เซ แฮ็ง?)", meaning: "คุณสบายดีไหม?", english: "How are you?", icon: "❓", example: "नमस्ते सर, आप कैसे हैं? (สวัสดีครับท่าน สบายดีไหมครับ?)" },
            { word: "मैं ठीक हूँ (แมง ตี๊ก ฮุง)", meaning: "ฉันสบายดี", english: "I am fine", icon: "😊", example: "मैं ठीक हूँ, शुक्रिया। (ฉันสบายดี ขอบคุณครับ)" },
            { word: "आपका नाम क्या है? (อาป-กา นาม กยา แฮ?)", meaning: "คุณชื่ออะไร?", english: "What is your name?", icon: "📛", example: "नमस्ते, आपका नाम क्या है? (สวัสดีครับ คุณชื่ออะไรครับ?)" },
            { word: "मेरा नाम... है (เม-รา นาม... แฮ)", meaning: "ฉันชื่อ...", english: "My name is...", icon: "👤", example: "मेरा नाम राहुल है। (ฉันชื่อราหุล)" },
            { word: "जी हाँ (จี ฮาง)", meaning: "ใช่ (สุภาพมาก)", english: "Yes (Polite)", icon: "✨", example: "जी हाँ, बिल्कुल। (ครับ ได้แน่นอนครับ)" },
            { word: "सुनिए (ซู-นิ-เย)", meaning: "ฟังนะ / นี่คุณ", english: "Listen / Excuse me", icon: "👂", example: "सुनिए, स्टेशन कहाँ है? (นี่คุณ สถานีรถไฟไปทางไหน?)" },
            { word: "कहाँ (กะ-ฮาง)", meaning: "ที่ไหน", english: "Where", icon: "📍", example: "बाजार कहाँ है? (ตลาดอยู่ที่ไหน?)" },
            { word: "कितना (กิต-นา)", meaning: "เท่าไหร่", english: "How much", icon: "💰", example: "इसका दाम कितना है? (อันนี้ราคาเท่าไหร่?)" },
            { word: "महँगा (มะ-หัง-กา)", meaning: "แพง", english: "Expensive", icon: "💸", example: "यह बहुत महँगा है। (นี่มันแพงมากเลย)" },
            { word: "सस्ता (สัส-ตา)", meaning: "ถูก (ราคา)", english: "Cheap", icon: "🏷️", example: "क्या कुछ सस्ता है? (มีอะไรที่ถูกกว่านี้ไหม?)" },
            { word: "पानी (ปา-นี)", meaning: "น้ำ", english: "Water", icon: "💧", example: "मुझे पानी चाहिए। (ฉันต้องการน้ำ)" },
            { word: "खाना (กา-นา)", meaning: "อาหาร / กิน", english: "Food / Eat", icon: "🍛", example: "खाना बहुत स्वादिष्ट है। (อาหารอร่อยมาก)" },
            { word: "चาย (ชาย)", meaning: "ชา (ไช)", english: "Tea", icon: "☕", example: "एक कप चाय, प्लीज। (ขอชาถ้วยหนึ่งครับ)" },
            { word: "दूध (ดูด)", meaning: "นม", english: "Milk", icon: "🥛", example: "गरम दूध पीना अच्छा है। (ดื่มนมอุ่นๆ มันดีนะ)" },
            { word: "चीनी (ชี-นี)", meaning: "น้ำตาล", english: "Sugar", icon: "🍬", example: "चाय में चीनी कम डालना। (ใส่น้ำตาลในชาน้อยๆ หน่อย)" },
            { word: "स्वादिष्ट (สวา-ดิช-ตะ)", meaning: "อร่อย", english: "Delicious", icon: "😋", example: "यह मिठाई बहुत स्वादिष्ट है। (ขนมหวานนี้อร่อยมาก)" },
            { word: "बहुत (บะ-ฮุต)", meaning: "มาก", english: "Very / A lot", icon: "📈", example: "आज बहुत गर्मी है। (วันนี้ร้อนมาก)" },
            { word: "कम (กัม)", meaning: "น้อย", english: "Little / Less", icon: "📉", example: "नमक कम है। (เกลือน้อยไปหน่อย)" },
            { word: "दोस्त (โดสต์)", meaning: "เพื่อน", english: "Friend", icon: "👫", example: "वह मेरा सबसे अच्छा दोस्त है। (เขาเป็นเพื่อนที่ดีที่สุดของฉัน)" },
            { word: "प्यार (ปยาร)", meaning: "รัก", english: "Love", icon: "❤️", example: "मुझे तुमसे प्यार है। (ฉันรักคุณ)" },
            { word: "खुश (คุช)", meaning: "มีความสุข", english: "Happy", icon: "😃", example: "मैं आज बहुत खुश हूँ। (วันนี้ฉันมีความสุขมาก)" },
            { word: "दुखी (ดู-คี)", meaning: "เศร้า", english: "Sad", icon: "😢", example: "वह क्यों दुखी है? (ทำไมเขาถึงเศร้าล่ะ?)" },
            { word: "सुंदर (ซุน-ดัร)", meaning: "สวย / หล่อ", english: "Beautiful", icon: "🌹", example: "यह जगह बहुत सुंदर है। (สถานที่นี้สวยงามมาก)" },
            { word: "बड़ा (บะ-ดา)", meaning: "ใหญ่", english: "Big", icon: "🐘", example: "यह घर बहुत बड़ा है। (บ้านหลังนี้ใหญ่มาก)" },
            { word: "छोटा (โช-ตา)", meaning: "เล็ก", english: "Small", icon: "🐭", example: "मेरा फोन छोटा है। (โทรศัพท์ของฉันเครื่องเล็ก)" },
            { word: "नया (นะ-ยา)", meaning: "ใหม่", english: "New", icon: "🆕", example: "मेरे पास नयी कार है। (ฉันมีรถคันใหม่)" },
            { word: "पुराना (ปู-รา-นา)", meaning: "เก่า", english: "Old", icon: "🏺", example: "यह मंदिर बहुत पुराना है। (วัดนี้เก่าแก่มาก)" },
            { word: "घर (กัร)", meaning: "บ้าน", english: "Home", icon: "🏠", example: "मैं घर जा रहा हूँ। (ฉันกำลังกลับบ้าน)" },
            { word: "दुकान (ดู-กาน)", meaning: "ร้านค้า", english: "Shop", icon: "🏪", example: "दुकान खुली है। (ร้านเปิดอยู่)" },
            { word: "मदद (มะ-ดัด)", meaning: "ช่วยเหลือ", english: "Help", icon: "🆘", example: "क्या आप मेरी मदद करेंगे? (คุณจะช่วยฉันไหม?)" },
            { word: "रास्ता (ราส-ตา)", meaning: "ทาง / ถนน", english: "Way / Path", icon: "🛣️", example: "सही रास्ता कौन सा है? (ทางที่ถูกต้องคือทางไหน?)" },
            { word: "समय (ซะ-มัย)", meaning: "เวลา", english: "Time", icon: "⏰", example: "क्या समय हुआ है? (เวลาเท่าไหร่แล้ว?)" },
            { word: "आज (อัจ)", meaning: "วันนี้", english: "Today", icon: "📅", example: "आज छुट्टी है। (วันนี้เป็นวันหยุด)" },
            { word: "कल (กัล)", meaning: "พรุ่งนี้ / เมื่อวาน", english: "Tomorrow / Yesterday", icon: "⏳", example: "कल मैं दिल्ली जाऊंगा। (พรุ่งนี้ฉันจะไปเดลี)" },
            { word: "अस्पताल (อัส-ปะ-ตาล)", meaning: "โรงพยาบาล", english: "Hospital", icon: "🏥", example: "पास में अस्पताल कहाँ है? (โรงพยาบาลที่ใกล้ที่สุดอยู่ไหน?)" },
            { word: "होटल (โฮ-เทิล)", meaning: "โรงแรม", english: "Hotel", icon: "🏨", example: "क्या यहाँ कोई होटल है? (แถวนี้มีโรงแรมไหม?)" },
            { word: "ठीक है (ตีก แฮ)", meaning: "ตกลง / โอเค", english: "Okay", icon: "👌", example: "ठीक है, मैं समझ गया। (โอเค ฉันเข้าใจแล้ว)" },
            { word: "समझना (สะ-มัช-นา)", meaning: "เข้าใจ", english: "Understand", icon: "💡", example: "क्या आप समझे? (คุณเข้าใจไหม?)" },
            { word: "बोलนา (โบล-นา)", meaning: "พูด", english: "Speak", icon: "🗣️", example: "धीरे बोलिए। (กรุณาพูดช้าๆ)" },
            { word: "ซีคนา (ซีค-นา)", meaning: "เรียนรู้", english: "Learn", icon: "🎓", example: "मैं हिंदी सीख रहा हूँ। (ฉันกำลังเรียนภาษาฮินดี)" }
        ];

        function loadState() {
            const saved = localStorage.getItem('hindi_calendar_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('hindi_calendar_v1', JSON.stringify(appState));
        }

        function shuffle(array) {
            let s = [...array];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [s[i], s[j]] = [s[j], s[i]];
            }
            return s;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-4 rounded-3xl bg-teal-50/20 border border-dashed border-teal-100 opacity-30"></div>`;
            }

            let completedCount = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const done = appState.completedDates.includes(ds);
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (done) completedCount++;

                let cls = "calendar-day relative flex flex-col items-center justify-center p-4 rounded-3xl border-2 cursor-pointer select-none min-h-[100px]";
                let stateCls = done ? "bg-white border-teal-500 text-teal-700 shadow-lg shadow-teal-50" : 
                               isToday ? "bg-gradient-to-br from-teal-600 to-emerald-500 border-transparent text-white shadow-xl shadow-teal-200 today-pulse" : 
                               "bg-white border-slate-50 text-slate-600 hover:border-teal-200";

                grid.innerHTML += `
                    <div class="${cls} ${stateCls}" onclick="openDayDialog(${year}, ${month}, ${d})">
                        <span class="text-2xl font-black font-english">${d}</span>
                        ${done ? '<div class="absolute -top-2 -right-2 bg-orange-500 text-white rounded-full p-1 shadow-lg text-[10px]">🦚</div>' : ''}
                        ${isToday && !done ? '<span class="text-[10px] mt-1 font-bold opacity-80 uppercase tracking-tighter">Today</span>' : ''}
                        ${!isToday && !done ? '<i class="ph-duotone ph-sparkle text-teal-100 text-xl mt-1"></i>' : ''}
                    </div>`;
            }

            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = daysInMonth;
            const prog = (completedCount / daysInMonth) * 100;
            document.getElementById('progress-bar').style.width = prog + '%';
        }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            
            document.getElementById('dialog-title').innerText = `วันที่ ${d} ${MONTH_NAMES[m]} ${y}`;
            const content = document.getElementById('dialog-content');
            content.innerHTML = '';

            const list = shuffle(vocabPool).slice(0, VOCAB_PER_SESSION);
            list.forEach((v, i) => {
                const wordOnly = v.word.split(' (')[0];
                content.innerHTML += `
                    <div class="group bg-white p-6 md:p-8 rounded-[2.5rem] border-2 border-teal-50 hover:border-teal-300 hover:shadow-2xl hover:shadow-teal-50 transition-all relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
                             <i class="ph ph-feather text-8xl"></i>
                        </div>
                        <div class="flex flex-col md:flex-row gap-6 items-start relative z-10">
                            <div class="w-14 h-14 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center font-black text-xl shrink-0 font-english shadow-inner">
                                ${i + 1}
                            </div>
                            <div class="flex-1 w-full">
                                <div class="flex justify-between items-start">
                                    <h4 class="text-2xl md:text-3xl font-black text-slate-800 mb-3 font-hindi flex items-center gap-3">
                                        <span class="text-4xl drop-shadow-sm">${v.icon}</span> ${v.word}
                                    </h4>
                                    <button onclick="speak('${wordOnly}')" class="w-12 h-12 bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded-2xl transition-all shadow-sm flex items-center justify-center">
                                        <i class="ph-fill ph-speaker-high text-xl"></i>
                                    </button>
                                </div>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    <span class="bg-teal-50 text-teal-700 px-4 py-2 rounded-xl text-sm font-bold border border-teal-100 flex items-center gap-2">
                                        🇹🇭 ${v.meaning}
                                    </span>
                                    <span class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-xl text-sm font-bold border border-indigo-100 font-english">
                                        🇬🇧 ${v.english}
                                    </span>
                                </div>
                                <div class="mt-5 p-5 bg-slate-50 rounded-2xl border-l-4 border-teal-400">
                                    <p class="text-slate-500 font-hindi italic text-lg leading-relaxed">"${v.example}"</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            const btn = document.getElementById('btn-complete-day');
            if (isDone) {
                btn.innerHTML = `<i class="ph-bold ph-heart text-2xl"></i> ทบทวนแล้ว (เก่งมากนกยูงภูมิใจ!)`;
                btn.className = "w-full md:w-auto px-10 py-4 bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-black rounded-[2rem] shadow-xl shadow-indigo-500/40 hover:scale-105 transition-all active:scale-95 flex items-center justify-center gap-3 text-lg";
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-seal-check text-2xl"></i> ภารกิจเสร็จสิ้น!`;
                btn.className = "w-full md:w-auto px-10 py-4 bg-gradient-to-r from-teal-600 to-indigo-600 text-white font-black rounded-[2rem] shadow-xl shadow-teal-500/40 hover:scale-105 transition-all active:scale-95 flex items-center justify-center gap-3 text-lg";
                btn.onclick = markComplete;
            }

            document.getElementById('vocab-dialog').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            content.scrollTop = 0;
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
                // Alert Toast
                const toast = document.createElement('div');
                toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl z-[100] font-black animate-bounce flex items-center gap-3 border-2 border-teal-500";
                toast.innerHTML = `🌟 शानदार! (ยอดเยี่ยม!) นกยูงมอบรางวัลให้คุณ 1 ดวง`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
            closeDialog();
        }

        function speak(text) {
            const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=hi&client=tw-ob`);
            audio.play().catch(() => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'hi-IN';
                    u.rate = 0.9;
                    window.speechSynthesis.speak(u);
                }
            });
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        function goToToday() { currentDate = new Date(); renderCalendar(); }

        window.onload = () => { loadState(); renderCalendar(); };
    </script>
</body>
</html>
