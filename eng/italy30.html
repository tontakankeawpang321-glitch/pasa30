<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Italian — ปฏิทินเรียนภาษาอิตาลี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Montserrat', 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #fffcf2 0%, #fff7ed 100%);
            background-color: #fffcf2;
            background-image: radial-gradient(#fbbf24 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, .font-serif {
            font-family: 'Playfair Display', serif; 
        }
        .font-target {
            font-family: 'Montserrat', sans-serif;
            word-break: keep-all;
        }
        
        /* Custom scrollbar - optimized */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff7ed; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        
        /* GPU Accelerated Animations */
        .calendar-day { 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
            will-change: transform;
        }
        @media (hover: hover) {
            .calendar-day:hover { transform: scale(1.03); z-index: 10; box-shadow: 0 10px 15px -5px rgba(0, 0, 0, 0.1); }
        }
        .calendar-day:active { transform: scale(0.95); }
        
        .vocab-card { transition: transform 0.2s ease, border-color 0.2s ease; }

        .blob-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23FEE2E2' d='M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.4,-46.3C91,-33.5,97.2,-18.1,97.1,-3.1C97,12,90.6,26.7,81.3,39.4C72,52.2,59.8,63.1,45.8,71.3C31.8,79.5,15.9,85.1,0.2,84.7C-15.5,84.4,-31,78.2,-45.1,69.9C-59.2,61.6,-71.9,51.2,-81.1,38.2C-90.3,25.2,-96,9.6,-95.2,-5.7C-94.4,-21.1,-87.1,-36,-76.3,-47.9C-65.5,-59.8,-51.2,-68.6,-36.8,-75.4C-22.4,-82.2,-7.9,-87,3.9,-93.8C15.7,-100.6,30.6,-83.6,44.7,-76.4Z' transform='translate(100 100)' /%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .today-pulse { animation: pulse-red 2s infinite; }

        /* Bottom Nav shadow */
        .nav-shadow {
            box-shadow: 0 -4px 20px -5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="text-stone-800 p-3 sm:p-6 md:p-8 min-h-screen flex flex-col items-center pb-24 sm:pb-32">

    <div class="w-full max-w-4xl space-y-4 sm:space-y-8">
        
        <!-- Header & Summary Section -->
        <div class="bg-white rounded-[1.5rem] sm:rounded-[2.5rem] p-5 sm:p-10 shadow-xl shadow-stone-200 border border-stone-100 overflow-hidden relative">
            <div class="absolute top-0 left-0 w-1 sm:w-2 h-full bg-emerald-600"></div>
            <div class="absolute top-0 right-0 w-1 sm:w-2 h-full bg-rose-600"></div>
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-8 relative z-10">
                <div class="flex items-center gap-4 sm:gap-6">
                    <div class="text-4xl sm:text-7xl animate-bounce drop-shadow-lg" style="animation-duration: 4s;">👨‍🍳</div>
                    <div>
                        <h1 class="text-2xl sm:text-5xl font-black text-stone-900 mb-0.5 sm:mb-2 leading-tight">
                            Daily Italian
                        </h1>
                        <p class="text-stone-500 font-semibold text-xs sm:text-base flex items-center gap-1.5">
                            <span class="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded text-[10px] sm:text-xs">Imparare</span>
                            ท่องศัพท์วันละ 20 คำ กับเชฟอิตาเลียน! 🇮🇹
                        </p>
                    </div>
                </div>

                <div class="bg-stone-900 p-4 sm:p-6 rounded-[1.2rem] sm:rounded-[2rem] w-full sm:w-auto flex items-center gap-4 sm:gap-6 shadow-lg text-white">
                    <div class="bg-rose-500 w-10 h-10 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl flex items-center justify-center text-xl sm:text-3xl shadow-md">
                        🇮🇹
                    </div>
                    <div>
                        <p class="text-[8px] sm:text-[10px] font-bold uppercase tracking-[0.1em] sm:tracking-[0.2em] text-stone-400 mb-0.5 sm:mb-1">Obiettivo</p>
                        <p class="text-xl sm:text-4xl font-black leading-none">
                            <span id="summary-completed" class="text-emerald-400">0</span>
                            <span class="text-sm sm:text-xl font-light text-stone-500">/ <span id="summary-total">30</span></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar Section -->
        <div class="bg-white rounded-[1.5rem] sm:rounded-[3rem] p-4 sm:p-10 shadow-xl shadow-stone-200 border border-stone-100">
            
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 sm:mb-10 gap-4 sm:gap-6 text-center sm:text-left">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 sm:w-12 sm:h-12 bg-rose-50 rounded-xl sm:rounded-2xl flex items-center justify-center text-xl sm:text-2xl">🗓️</div>
                    <h2 id="month-year-display" class="text-xl sm:text-4xl font-black text-stone-800 tracking-tight">Month Year</h2>
                </div>
                
                <div class="flex gap-2 sm:gap-3 bg-stone-50 p-1.5 sm:p-2 rounded-2xl sm:rounded-3xl border border-stone-100">
                    <button onclick="changeMonth(-1)" class="p-2 sm:p-3 rounded-xl sm:rounded-2xl bg-white shadow-sm hover:bg-rose-500 hover:text-white text-stone-600 transition-all">
                        <i class="ph-bold ph-arrow-left text-lg sm:text-xl"></i>
                    </button>
                    <button onclick="goToToday()" class="px-3 sm:px-6 py-2 rounded-xl sm:rounded-2xl bg-white shadow-sm text-stone-800 font-bold text-[10px] sm:text-sm uppercase tracking-wider">
                        วันนี้
                    </button>
                    <button onclick="changeMonth(1)" class="p-2 sm:p-3 rounded-xl sm:rounded-2xl bg-white shadow-sm hover:bg-rose-500 hover:text-white text-stone-600 transition-all">
                        <i class="ph-bold ph-arrow-right text-lg sm:text-xl"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1 sm:gap-4 mb-4 text-center font-black text-stone-400 text-[9px] sm:text-sm uppercase tracking-wider">
                <div class="text-rose-500">Dom</div>
                <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div>
                <div class="text-emerald-600">Sab</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 sm:gap-5">
                <!-- Generated by JS -->
            </div>
        </div>
        
        <div class="text-center text-stone-400 text-[10px] sm:text-sm font-semibold uppercase tracking-widest pb-6">
            <p>Fatto con ❤️ in Italia | สู้ๆ นะนักเรียน!</p>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-stone-100 flex justify-around items-center px-4 py-3 pb-safe z-40 nav-shadow">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-emerald-600 group">
            <div class="p-1 sm:p-2 rounded-2xl bg-emerald-50 group-active:scale-90 transition-transform">
                <i class="ph-fill ph-calendar-blank text-2xl sm:text-3xl"></i>
            </div>
            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest">ปฏิทิน</span>
        </button>
        
        <a href="https://example.com/conversation" target="_blank" class="flex flex-col items-center gap-1 text-stone-400 hover:text-rose-500 group">
            <div class="p-1 sm:p-2 rounded-2xl bg-transparent group-active:scale-90 transition-transform">
                <i class="ph-fill ph-chats-circle text-2xl sm:text-3xl"></i>
            </div>
            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest">คุยสนทนา</span>
        </a>
    </nav>

    <!-- Modal -->
    <div id="vocab-dialog" class="fixed inset-0 z-50 hidden flex items-center justify-center">
        <div class="absolute inset-0 bg-stone-900/60 backdrop-blur-sm" onclick="closeDialog()"></div>
        
        <div class="relative w-[92%] sm:w-[95%] max-w-4xl bg-white rounded-[1.5rem] sm:rounded-[3rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="px-5 sm:px-10 py-5 sm:py-8 border-b border-stone-100 bg-white flex justify-between items-center">
                <div class="flex items-center gap-3 sm:gap-6">
                    <div class="text-3xl sm:text-5xl">🍕</div>
                    <div>
                        <h3 id="dialog-title" class="text-lg sm:text-3xl font-black text-stone-900 leading-tight">Giorno --</h3>
                        <p class="text-[10px] sm:text-base text-stone-500 font-medium">คำศัพท์วันนี้ (Vocabolario)</p>
                    </div>
                </div>
                <button onclick="closeDialog()" class="text-stone-400 bg-stone-100 p-2 sm:p-4 rounded-full">
                    <i class="ph-bold ph-x text-lg sm:text-2xl"></i>
                </button>
            </div>
            
            <div id="dialog-content" class="p-4 sm:p-10 overflow-y-auto custom-scrollbar flex-1 space-y-4 sm:space-y-6 bg-stone-50/50">
                <!-- Generated by JS -->
            </div>
            
            <div class="px-5 sm:px-10 py-5 sm:py-8 border-t border-stone-100 bg-white flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="text-4xl hidden sm:block">🍦</div>
                <div class="flex gap-3 w-full sm:w-auto">
                    <button onclick="closeDialog()" class="flex-1 sm:flex-none px-6 py-3 text-stone-500 font-bold text-sm sm:text-base">ปิด</button>
                    <button id="btn-complete-day" class="flex-1 sm:flex-none px-6 sm:px-10 py-3 sm:py-4 bg-stone-900 text-white font-bold rounded-xl sm:rounded-2xl flex items-center justify-center gap-2 text-sm sm:text-lg">
                        <i class="ph-bold ph-check-circle text-xl sm:text-2xl text-emerald-400"></i> Finito!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const VOCAB_PER_SESSION = 20;
        const MONTH_NAMES = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        
        let currentDate = new Date(); 
        let today = new Date(); 
        let selectedDateString = null; 
        let appState = { completedDates: [] };

        function loadState() {
            const saved = localStorage.getItem('italian_calendar_v1');
            if (saved) appState = JSON.parse(saved);
        }

        function saveState() {
            localStorage.setItem('italian_calendar_v1', JSON.stringify(appState));
        }

        // Vocabulary Pool
        const vocabPool = [
            { word: "Ciao (เชา)", meaning: "สวัสดี / ลาก่อน", english: "Hello / Goodbye", icon: "👋", example: "Ciao! Come stai? (สวัสดี! สบายดีไหม?)" },
            { word: "Grazie (กราตเซีย)", meaning: "ขอบคุณ", english: "Thank you", icon: "🙏", example: "Grazie mille per l'aiuto. (ขอบคุณมากๆ สำหรับความช่วยเหลือ)" },
            { word: "Buongiorno (บวนจอร์โน)", meaning: "สวัสดีตอนเช้า", english: "Good morning", icon: "☀️", example: "Buongiorno a tutti! (สวัสดีตอนเช้าทุกคน!)" },
            { word: "Buonasera (บวนนาเซรา)", meaning: "สวัสดีตอนเย็น", english: "Good evening", icon: "🌆", example: "Buonasera, vorrei un tavolo. (สวัสดีตอนเย็นครับ ขอโต๊ะหนึ่งที่)" },
            { word: "Per favore (เปร์ ฟาวอเร)", meaning: "ได้โปรด / กรุณา", english: "Please", icon: "🥺", example: "Un caffè, per favore. (ขอกาแฟแก้วหนึ่งครับ)" },
            { word: "Prego (เปรโก)", meaning: "ไม่เป็นไร / เชิญครับ", english: "You're welcome / Please (go ahead)", icon: "🤲", example: "Grazie! - Prego. (ขอบคุณ! - ไม่เป็นไรครับ)" },
            { word: "Sì (ซี)", meaning: "ใช่", english: "Yes", icon: "✅", example: "Sì, parlo un po' d'italiano. (ใช่ ฉันพูดอิตาลีได้นิดหน่อย)" },
            { word: "No (โน)", meaning: "ไม่", english: "No", icon: "❌", example: "No, non capisco. (ไม่ ฉันไม่เข้าใจ)" },
            { word: "Mi scusi (มี สกูซี)", meaning: "ขอโทษ (สุภาพ)", english: "Excuse me", icon: "🙇", example: "Mi scusi, dov'è il bagno? (ขอโทษนะคะ ห้องน้ำอยู่ที่ไหน?)" },
            { word: "Dov'è...? (โดเว...)", meaning: "อยู่ที่ไหน...?", english: "Where is...?", icon: "📍", example: "Dov'è la stazione? (สถานีรถไฟอยู่ที่ไหน?)" },
            { word: "Quanto costa? (กวนโต กอสตา?)", meaning: "ราคาเท่าไหร่?", english: "How much is it?", icon: "💰", example: "Quanto costa questo gelato? (ไอศกรีมนี้ราคาเท่าไหร่?)" },
            { word: "Il conto (อิล กอนโต)", meaning: "เช็คบิล", english: "The bill", icon: "🧾", example: "Il conto, per favore. (เก็บเงินด้วยครับ)" },
            { word: "Acqua (อักกวา)", meaning: "น้ำ", english: "Water", icon: "💧", example: "Vorrei un bicchiere d'acqua. (ฉันขอเสนอตัวรับน้ำเปล่าสักแก้ว)" },
            { word: "Vino (วีโน)", meaning: "ไวน์", english: "Wine", icon: "🍷", example: "Un bicchiere di vino rosso, grazie. (ไวน์แดงหนึ่งแก้ว ขอบคุณครับ)" },
            { word: "Pane (ปาเน)", meaning: "ขนมปัง", english: "Bread", icon: "🥖", example: "Il pane è fresco. (ขนมปังสดใหม่มาก)" },
            { word: "Pasta (ปัสตา)", meaning: "พาสต้า", english: "Pasta", icon: "🍝", example: "Amo la pasta italiana. (ฉันรักพาสต้าอิตาลี)" },
            { word: "Pizza (ปิซซ่า)", meaning: "พิซซ่า", english: "Pizza", icon: "🍕", example: "Una pizza Margherita, per favore. (ขอพิซซ่ามาร์เกริต้าหนึ่งที่ครับ)" },
            { word: "Gelato (เจลาโต)", meaning: "ไอศกรีมเจลาโต", english: "Gelato", icon: "🍦", example: "Prendiamo un gelato! (ไปกินเจลาโตกันเถอะ!)" },
            { word: "Caffè (กัฟเฟ่)", meaning: "กาแฟ", english: "Coffee", icon: "☕", example: "Un caffè espresso, per favore. (ขอเอสเปรสโซหนึ่งที่ครับ)" },
            { word: "Bello / Bella (เบลโล / เบลลา)", meaning: "สวย / หล่อ", english: "Beautiful / Handsome", icon: "✨", example: "Che bella città! (ช่างเป็นเมืองที่สวยงามอะไรอย่างนี้!)" },
            { word: "Amore (อามอเร)", meaning: "ความรัก", english: "Love", icon: "❤️", example: "Ti amo, amore mio. (ฉันรักเธอ ยอดรักของฉัน)" },
            { word: "Famiglia (ฟามิลเลีย)", meaning: "ครอบครัว", english: "Family", icon: "🏠", example: "La mia famiglia è grande. (ครอบครัวของฉันใหญ่มาก)" },
            { word: "Amico / Amica (อามีโก / อามีกา)", meaning: "เพื่อน", english: "Friend", icon: "🤝", example: "Lui è il mio migliore amico. (เขาคือเพื่อนที่ดีที่สุดของฉัน)" },
            { word: "Mangiare (มันจาเร)", meaning: "กิน", english: "To eat", icon: "🍴", example: "Voglio mangiare qualcosa di buono. (ฉันอยากกินอะไรอร่อยๆ สักหน่อย)" },
            { word: "Bere (เบเร)", meaning: "ดื่ม", english: "To drink", icon: "🥤", example: "Cosa vuoi bere? (คุณอยากดื่มอะไรไหม?)" },
            { word: "Andare (อันดาเร)", meaning: "ไป", english: "To go", icon: "🚶", example: "Andiamo al cinema. (พวกเราไปดูหนังกันเถอะ)" },
            { word: "Vedere (เวเดเร)", meaning: "เห็น / ดู", english: "To see", icon: "👀", example: "Voglio vedere il Colosseo. (ฉันอยากเห็นโคลอสเซียม)" },
            { word: "Dormire (ดอร์มีเร)", meaning: "นอน", english: "To sleep", icon: "😴", example: "Ho bisogno di dormire. (ฉันต้องนอนแล้วล่ะ)" },
            { word: "Parlo (ปาร์โล)", meaning: "ฉันพูด", english: "I speak", icon: "🗣️", example: "Parlo un po' di italiano. (ฉันพูดอิตาลีได้นิดหน่อย)" },
            { word: "Capisco (กาปิสโก)", meaning: "ฉันเข้าใจ", english: "I understand", icon: "💡", example: "Ora capisco tutto. (ตอนนี้ฉันเข้าใจทุกอย่างแล้ว)" },
            { word: "Aiuto! (อายูโต!)", meaning: "ช่วยด้วย!", english: "Help!", icon: "🆘", example: "Aiuto! Ho perso il portafoglio. (ช่วยด้วย! ฉันทำกระเป๋าตังค์หาย)" },
            { word: "Oggi (ออจจี)", meaning: "วันนี้", english: "Today", icon: "📅", example: "Oggi è una bella giornata. (วันนี้เป็นวันที่ดีวันหนึ่ง)" },
            { word: "Domani (โดมานี)", meaning: "พรุ่งนี้", english: "Tomorrow", icon: "🌅", example: "A domani! (เจอกันพรุ่งนี้นะ!)" },
            { word: "Stazione (สตัตซิโอเน)", meaning: "สถานี", english: "Station", icon: "🚉", example: "La stazione è vicina. (สถานีรถไฟอยู่ใกล้ๆ นี้)" },
            { word: "Aeroporto (อาเอโรปอร์โต)", meaning: "สนามบิน", english: "Airport", icon: "✈️", example: "L'aeroporto di Roma è grande. (สนามบินที่โรมใหญ่มาก)" },
            { word: "Treno (เตรโน)", meaning: "รถไฟ", english: "Train", icon: "🚆", example: "Il treno parte alle dieci. (รถไฟออกตอนสิบโมง)" },
            { word: "Piazza (ปิอัซซา)", meaning: "จัตุรัส", english: "Square", icon: "🏛️", example: "Ci vediamo in piazza. (เจอกันที่จัตุรัสนะ)" },
            { word: "Chiesa (เกียซา)", meaning: "โบสถ์", english: "Church", icon: "⛪", example: "Questa chiesa è antica. (โบสถ์แห่งนี้เก่าแก่มาก)" },
            { word: "Mare (มาเร)", meaning: "ทะเล", english: "Sea", icon: "🌊", example: "Andiamo al mare? (พวกเราไปทะเลกันไหม?)" },
            { word: "Sole (โซเล)", meaning: "ดวงอาทิตย์", english: "Sun", icon: "☀️", example: "C'è un bel sole oggi. (วันนี้แดดดีมาก)" },
            { word: "Luna (ลูนา)", meaning: "ดวงจันทร์", english: "Moon", icon: "🌙", example: "Guarda la luna! (ดูดวงจันทร์สิ!)" },
            { word: "Tempo (เตมโป)", meaning: "เวลา / อากาศ", english: "Time / Weather", icon: "🕒", example: "Non ho tempo oggi. (Non ho tempo oggi.)" },
            { word: "Soldi (โซลดี้)", meaning: "เงิน", english: "Money", icon: "💸", example: "Non ho molti soldi. (ฉันไม่มีเงินเยอะหรอกนะ)" },
            { word: "Lavoro (ลาโวโร)", meaning: "งาน", english: "Work", icon: "💼", example: "Vado al lavoro. (ฉันไปทำงานก่อนนะ)" },
            { word: "Scuola (สกูโอลา)", meaning: "โรงเรียน", english: "School", icon: "🏫", example: "I bambini vanno a scuola. (เด็กๆ ไปโรงเรียน)" },
            { word: "Libro (ลีโบร)", meaning: "หนังสือ", english: "Book", icon: "📖", example: "Leggo un libro interessante. (ฉันกำลังอ่านหนังสือที่น่าสนใจอยู่)" },
            { word: "Città (ชิตตา)", meaning: "เมือง", english: "City", icon: "🏙️", example: "Roma è una città eterna. (โรมคือเมืองนิรันดร์)" },
            { word: "Italia (อิตาเลีย)", meaning: "ประเทศอิตาลี", english: "Italy", icon: "🇮🇹", example: "L'Italia è famosa per l'arte. (อิตาลีมีชื่อเสียงด้านศิลปะ)" },
            { word: "Arrivederci (อาร์ริเวเดร์ชิ)", meaning: "ลาก่อน (ทางการ)", english: "Goodbye (formal)", icon: "👋", example: "Arrivederci, a presto! (ลาก่อน แล้วพบกันใหม่เร็วๆ นี้!)" },
            { word: "Buon appetito (บวน อัปเปตีโต)", meaning: "ทานให้อร่อยนะ", english: "Enjoy your meal", icon: "🍽️", example: "Buon appetito a tutti! (ขอให้ทุกคนทานให้อร่อยนะ!)" }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomVocab() {
            return shuffleArray(vocabPool).slice(0, VOCAB_PER_SESSION);
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('month-year-display').innerText = `${MONTH_NAMES[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="aspect-square rounded-lg sm:rounded-[1.5rem] bg-stone-50/30"></div>`;
            }

            let completedCount = 0;
            for (let day = 1; day <= totalDays; day++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const isDone = appState.completedDates.includes(dStr);
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                if (isDone) completedCount++;

                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day aspect-square flex flex-col items-center justify-center p-1 rounded-[1rem] sm:rounded-[2rem] border-2 cursor-pointer select-none text-center ${isDone ? 'bg-emerald-50 border-emerald-100 text-emerald-800' : isToday ? 'bg-rose-500 border-transparent text-white shadow-lg today-pulse' : 'bg-white border-stone-100 text-stone-700'}`;
                dayEl.onclick = () => openDayDialog(year, month, day);
                dayEl.innerHTML = `<span class="text-sm sm:text-2xl font-black">${day}</span>${isDone ? '<div class="text-[8px] sm:text-[10px] font-black uppercase tracking-tighter mt-0.5 sm:mt-1">Done!</div>' : ''}`;
                grid.appendChild(dayEl);
            }

            document.getElementById('summary-completed').innerText = completedCount;
            document.getElementById('summary-total').innerText = totalDays;
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderCalendar();
        }

        function goToToday() {
            currentDate = new Date();
            renderCalendar();
        }

        function openDayDialog(y, m, d) {
            selectedDateString = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isDone = appState.completedDates.includes(selectedDateString);
            const dialog = document.getElementById('vocab-dialog');
            document.getElementById('dialog-title').innerText = `Giorno ${d} ${MONTH_NAMES[m]}`;
            
            const content = document.getElementById('dialog-content');
            content.innerHTML = '';
            
            getRandomVocab().forEach((v, idx) => {
                const wordOnly = v.word.split(' (')[0];
                content.innerHTML += `
                    <div class="vocab-card p-4 sm:p-6 bg-white border border-stone-100 rounded-[1.2rem] sm:rounded-[2rem] flex flex-col sm:flex-row gap-4 sm:gap-6 items-start">
                        <div class="blob-bg text-rose-500 w-10 h-10 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center font-black text-sm sm:text-xl shrink-0">
                            ${idx + 1}
                        </div>
                        <div class="flex-1 w-full">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="text-lg sm:text-2xl font-black text-stone-900 font-target">${v.icon} ${v.word}</h4>
                                <button onclick="speakWord('${wordOnly}')" class="bg-stone-100 p-2 sm:p-3 rounded-xl active:scale-90"><i class="ph-fill ph-speaker-high text-lg"></i></button>
                            </div>
                            <div class="flex flex-wrap gap-2 mb-3">
                                <span class="text-[10px] sm:text-xs font-bold bg-emerald-50 text-emerald-700 px-2 py-1 rounded-lg">🇹🇭 ${v.meaning}</span>
                                <span class="text-[10px] sm:text-xs font-bold bg-stone-100 text-stone-500 px-2 py-1 rounded-lg">🇬🇧 ${v.english}</span>
                            </div>
                            <p class="text-[11px] sm:text-sm text-stone-600 bg-stone-50 p-3 rounded-xl italic leading-relaxed">"${v.example}"</p>
                        </div>
                    </div>
                `;
            });

            const btn = document.getElementById('btn-complete-day');
            if (isDone) {
                btn.innerHTML = `<i class="ph-bold ph-star text-yellow-400"></i> Bravissimo!`;
                btn.onclick = closeDialog;
            } else {
                btn.innerHTML = `<i class="ph-bold ph-check-circle text-emerald-400"></i> Finito!`;
                btn.onclick = markComplete;
            }

            dialog.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            content.scrollTop = 0;
        }

        function closeDialog() {
            document.getElementById('vocab-dialog').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function markComplete() {
            if (selectedDateString && !appState.completedDates.includes(selectedDateString)) {
                appState.completedDates.push(selectedDateString);
                saveState();
                renderCalendar();
            }
            closeDialog();
        }

        function speakWord(w) {
            const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(w)}&tl=it&client=tw-ob`);
            audio.play().catch(() => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(w);
                    u.lang = 'it-IT';
                    u.rate = 0.9;
                    window.speechSynthesis.speak(u);
                }
            });
        }

        window.onload = () => { loadState(); renderCalendar(); };
    </script>
</body>
</html>
